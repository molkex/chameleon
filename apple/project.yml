name: Chameleon
options:
  bundleIdPrefix: com.madfrog.vpn
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release
  developmentLanguage: en

knownRegions:
  - en
  - ru
  - Base

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.22"
    CURRENT_PROJECT_VERSION: "25"
    DEVELOPMENT_TEAM: "99W3C374T2"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  Chameleon:
    type: application
    platform: iOS
    sources:
      - path: ChameleonVPN
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn
        INFOPLIST_FILE: ChameleonVPN/Info.plist
        CODE_SIGN_ENTITLEMENTS: ChameleonVPN/ChameleonVPN.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_BITCODE: false
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: PacketTunnel
      - framework: Frameworks/Libbox.xcframework
        embed: false
      - sdk: libresolv.tbd
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn.tunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        ENABLE_BITCODE: false
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - framework: Frameworks/Libbox.xcframework
        embed: false
      - sdk: UIKit.framework
      - sdk: libresolv.tbd

  ChameleonMac:
    type: application
    platform: macOS
    sources:
      - path: ChameleonVPN
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "*.entitlements"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn.mac
        PRODUCT_NAME: MadFrog
        INFOPLIST_FILE: ChameleonMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: ChameleonMac/ChameleonMac.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - target: PacketTunnelMac
      - framework: Frameworks/Libbox.xcframework
        embed: true
      - sdk: libresolv.tbd
      - sdk: NetworkExtension.framework
      - sdk: SystemConfiguration.framework
      - sdk: CoreText.framework
      - sdk: CoreWLAN.framework
      - sdk: IOKit.framework
      - sdk: CoreLocation.framework
      - sdk: AppKit.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: ApplicationServices.framework
      - sdk: UserNotifications.framework
      - sdk: libbsm.tbd

  PacketTunnelMac:
    type: app-extension
    platform: macOS
    sources:
      - path: PacketTunnel
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "*.entitlements"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn.mac.tunnel
        PRODUCT_NAME: PacketTunnelMac
        INFOPLIST_FILE: PacketTunnelMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnelMac/PacketTunnelMac.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - framework: Frameworks/Libbox.xcframework
        embed: false
      - sdk: libresolv.tbd
      - sdk: NetworkExtension.framework
      - sdk: SystemConfiguration.framework
      - sdk: CoreText.framework
      - sdk: CoreWLAN.framework
      - sdk: IOKit.framework
      - sdk: CoreLocation.framework
      - sdk: AppKit.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: ApplicationServices.framework
      - sdk: UserNotifications.framework
      - sdk: libbsm.tbd
