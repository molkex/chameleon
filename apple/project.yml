name: Chameleon
options:
  bundleIdPrefix: com.madfrog.vpn
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release
  developmentLanguage: en

knownRegions:
  - en
  - ru
  - Base

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.14"
    CURRENT_PROJECT_VERSION: "16"
    DEVELOPMENT_TEAM: "99W3C374T2"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  Chameleon:
    type: application
    platform: iOS
    sources:
      - path: ChameleonVPN
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn
        INFOPLIST_FILE: ChameleonVPN/Info.plist
        CODE_SIGN_ENTITLEMENTS: ChameleonVPN/ChameleonVPN.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_BITCODE: false
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: PacketTunnel
      - framework: Frameworks/Libbox.xcframework
        embed: false

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn.tunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        ENABLE_BITCODE: false
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - framework: Frameworks/Libbox.xcframework
        embed: false
      - sdk: UIKit.framework
