# Chameleon VPN — Production Configuration (DE node)

server:
  host: "0.0.0.0"
  port: 8000

database:
  url: "${DATABASE_URL}"
  max_conns: 25
  min_conns: 5
  max_conn_lifetime: "1h"

redis:
  url: "${REDIS_URL}"

auth:
  jwt_secret: "${JWT_SECRET}"
  jwt_access_ttl: "24h"
  jwt_refresh_ttl: "720h"
  apple_bundle_id: "com.chameleonvpn.app"

vpn:
  listen_port: 2096
  client_mtu: 1400
  dns_remote: "https://1.1.1.1/dns-query"
  dns_direct: "https://8.8.8.8/dns-query"
  urltest_interval: "3m"
  clash_api_port: 9090

  reality:
    private_key: "${REALITY_PRIVATE_KEY}"
    public_key: "${REALITY_PUBLIC_KEY}"
    short_ids:
      - ""
      - "0018e1ec"
      - "2802649f"
    snis:
      default: "ads.x5.ru"

  servers: []
  # Servers are loaded from the database (vpn_servers table).

cluster:
  enabled: false
  node_id: "de-1"
  sync_interval: "30s"
  reconcile_interval: "5m"
  pubsub_channel: "chameleon:sync"
  peers: []

rate_limit:
  mobile_per_minute: 60
  admin_per_minute: 120
