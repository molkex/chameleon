# Chameleon VPN — Production Configuration Template
#
# This file is a TEMPLATE. deploy.sh generates the final config.yaml
# with node-specific values (node_id, SNI, peers, cors_origins).
#
# All secrets come from environment variables (set in .env by deploy.sh).

server:
  host: "0.0.0.0"
  port: 8000
  # cors_origins set by deploy.sh per node

database:
  url: "${DATABASE_URL}"
  max_conns: 25
  min_conns: 5
  max_conn_lifetime: "1h"

redis:
  url: "${REDIS_URL}"

auth:
  jwt_secret: "${JWT_SECRET}"
  jwt_access_ttl: "24h"
  jwt_refresh_ttl: "720h"
  apple_bundle_id: "com.madfrog.vpn"

vpn:
  listen_port: 2096
  client_mtu: 1400
  dns_remote: "https://1.1.1.1/dns-query"
  dns_direct: "https://8.8.8.8/dns-query"
  urltest_interval: "3m"
  clash_api_port: 9090
  user_api_port: 15380
  user_api_secret: "${USER_API_SECRET}"

  reality:
    # Keys loaded from vpn_servers DB table at startup (per-node).
    # Env var fallback: REALITY_PRIVATE_KEY, REALITY_PUBLIC_KEY (deprecated).
    private_key: "${REALITY_PRIVATE_KEY}"
    public_key: "${REALITY_PUBLIC_KEY}"
    short_ids:
      - ""
      - "0018e1ec"
      - "2802649f"
      - "3651cbce"
      - "76b9a282"
      - "9573cd02"
      - "dfc3e9ec"
      - "fb4dae0a"
      - "fe3c770e"
      - "bfc55eeb"
    snis:
      default: "ads.adfox.ru"

  servers: []
  # Servers are loaded from the database (vpn_servers table).

cluster:
  enabled: true
  # node_id and peers set by deploy.sh per node
  node_id: ""
  secret: "${CLUSTER_SECRET}"
  sync_interval: "30s"
  reconcile_interval: "5m"
  pubsub_channel: "chameleon:sync"
  peers: []

rate_limit:
  mobile_per_minute: 60
  admin_per_minute: 120

payments:
  apple:
    bundle_id: "com.madfrog.vpn"
    allow_sandbox: true

  freekassa:
    enabled: true
    shop_id:  "${FREEKASSA_SHOP_ID}"
    api_key:  "${FREEKASSA_API_KEY}"
    secret1:  "${FREEKASSA_SECRET1}"
    secret2:  "${FREEKASSA_SECRET2}"
    base_url: "https://api.fk.life/v1"
    public_url: "https://madfrog.online"
    ip_whitelist:
      - "168.119.157.136"
      - "168.119.60.227"
      - "178.154.197.79"
      - "51.250.54.238"

  plans:
    - id: "m1"
      title: "1 месяц на 1 📱"
      days: 30
      price_rub: 229
      badge: ""
    - id: "m3"
      title: "3 месяца на 1 📱"
      days: 90
      price_rub: 599
      badge: "Хит"
    - id: "m6"
      title: "6 месяцев на 1 📱"
      days: 180
      price_rub: 1099
      badge: "Выгодно"
    - id: "m12"
      title: "12 месяцев на 1 📱"
      days: 365
      price_rub: 1999
      badge: "Максимум"

  trial:
    enabled: true
    days: 3
