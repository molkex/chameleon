server {
    listen 80 default_server;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API — proxy to chameleon backend (host network)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Subscription links
    location /sub/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin SPA
    location /admin/app/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/app/index.html;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none';" always;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location = /admin { return 301 /admin/app/; }
    location = /admin/ { return 301 /admin/app/; }

    # Marketing landing (madfrog.online / mdfrog.site root)
    location = / {
        root /usr/share/nginx/html/landing;
        try_files /index.html =404;
    }
    location = /favicon.svg {
        root /usr/share/nginx/html/landing;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Legal pages (privacy + terms of use, required for App Store + FK)
    location = /privacy {
        root /usr/share/nginx/html/landing;
        try_files /privacy.html =404;
        default_type text/html;
    }
    location = /terms {
        root /usr/share/nginx/html/landing;
        try_files /terms.html =404;
        default_type text/html;
    }
}
