# ============================================================================
# Chameleon VPN — Docker Compose (single autonomous node)
# ============================================================================
# Each node runs: chameleon (Go backend) + singbox + postgres + redis + nginx
# sing-box is managed by chameleon via config writes + docker signals.
# ============================================================================

services:
  # ---------- Go backend ----------
  chameleon:
    build: .
    container_name: chameleon
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./config.yaml:/etc/chameleon/config.yaml:ro
      - singbox-config:/etc/singbox
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=postgres://chameleon:${DB_PASSWORD}@localhost:5432/chameleon?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@localhost:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - REALITY_PRIVATE_KEY=${REALITY_PRIVATE_KEY}
      - REALITY_PUBLIC_KEY=${REALITY_PUBLIC_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------- sing-box (VPN engine) ----------
  singbox:
    image: ghcr.io/sagernet/sing-box:v1.13.6
    container_name: singbox
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
    volumes:
      - singbox-config:/etc/singbox:ro
    command: ["run", "-c", "/etc/singbox/singbox-config.json"]
    # NOTE: no depends_on chameleon — singbox must NOT restart when chameleon redeploys,
    # otherwise all VPN connections drop. Start singbox manually or via deploy.sh on first setup.

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: chameleon-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: chameleon
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: chameleon
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chameleon"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: chameleon-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Nginx (reverse proxy + admin SPA) ----------
  nginx:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: chameleon-nginx
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      chameleon:
        condition: service_healthy

volumes:
  pgdata:
    name: chameleon-pgdata
    external: true
  redisdata:
    name: chameleon-redisdata
    external: true
  singbox-config:
    name: chameleon-singbox-config
