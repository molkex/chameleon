name: MadFrogVPN
options:
  bundleIdPrefix: com.madfrog.vpn
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release
  developmentLanguage: en

knownRegions:
  - en
  - ru
  - Base

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.31"
    # Build 89 was rejected under Guideline 2.3 with "the
    # UIRequiredDeviceCapabilities key … will not install on the
    # device used in review". Build 90 ships the same binary plus
    # an explicit UIRequiredDeviceCapabilities=[arm64] declaration
    # in MadFrogVPN/Info.plist (was previously auto-derived by
    # Xcode 26 SDK, which the App Review tooling appears to be
    # unhappy with).
    CURRENT_PROJECT_VERSION: "109"
    DEVELOPMENT_TEAM: "99W3C374T2"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"
  # Sentry (crash reporting). EU region — see docs/decisions/0007-sentry-eu-crash-reporting.md.
  # Linked into MadFrogVPN (iOS) + MadFrogVPNMac only — NOT the PacketTunnel
  # extensions (NE process has a ~15 MB memory limit and Sentry is non-trivial;
  # crashes inside the tunnel are still surfaced as app-level errors when the
  # extension dies and the main app handles the NEVPNStatus transition).
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    minVersion: "8.0.0"
    maxVersion: "9.0.0"

targets:
  MadFrogVPN:
    type: application
    platform: iOS
    sources:
      - path: MadFrogVPN
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      # SUPPORT-CHAT P2: bundle the chat web widget (canonical: clients/widget)
      # so SupportChatView's WKWebView can load it. Same "write-once" file that
      # will later be hosted at chat.madfrog.online.
      - path: ../widget/index.html
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn
        INFOPLIST_FILE: MadFrogVPN/Info.plist
        CODE_SIGN_ENTITLEMENTS: MadFrogVPN/MadFrogVPN.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_BITCODE: false
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: PacketTunnel
      - target: MadFrogWidget
      - framework: Frameworks/Libbox.xcframework
        embed: false
      - sdk: libresolv.tbd
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: Sentry
        product: Sentry

  # Widget extension — pulls in Constants.swift + WidgetVPNSnapshot.swift
  # (App Group snapshot reader) and VPNControlIntents.swift (the AppIntents
  # that drive the Control Center toggle + interactive button). Lean — does
  # NOT include the rest of Shared/ because most of it imports Libbox /
  # MetricKit which a widget process should not link.
  MadFrogWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: MadFrogWidget
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "*.entitlements"
      - path: Shared/Constants.swift
      - path: Shared/WidgetVPNSnapshot.swift
      - path: Shared/VPNControlIntents.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn.widget
        INFOPLIST_FILE: MadFrogWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: MadFrogWidget/MadFrogWidget.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        ENABLE_BITCODE: false
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: AppIntents.framework
      - sdk: NetworkExtension.framework

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn.tunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        ENABLE_BITCODE: false
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - framework: Frameworks/Libbox.xcframework
        embed: false
      - sdk: UIKit.framework
      - sdk: libresolv.tbd

  MadFrogVPNMac:
    type: application
    platform: macOS
    sources:
      - path: MadFrogVPN
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "*.entitlements"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      # SUPPORT-CHAT P2: bundle the chat web widget (see iOS target).
      - path: ../widget/index.html
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn.mac
        PRODUCT_NAME: MadFrogVPN
        INFOPLIST_FILE: MadFrogVPNMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: MadFrogVPNMac/MadFrogVPNMac.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - target: PacketTunnelMac
      - framework: Frameworks/Libbox.xcframework
        embed: true
      - sdk: libresolv.tbd
      - sdk: NetworkExtension.framework
      - sdk: SystemConfiguration.framework
      - sdk: CoreText.framework
      - sdk: CoreWLAN.framework
      - sdk: IOKit.framework
      - sdk: CoreLocation.framework
      - sdk: AppKit.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: ApplicationServices.framework
      - sdk: UserNotifications.framework
      - sdk: libbsm.tbd
      # MadFrogVPNMac shares MadFrogVPN/ sources with iOS, including
      # GoogleAuthCoordinator.swift which imports GoogleSignIn.
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: Sentry
        product: Sentry

  PacketTunnelMac:
    type: app-extension
    platform: macOS
    sources:
      - path: PacketTunnel
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "*.entitlements"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madfrog.vpn.mac.tunnel
        PRODUCT_NAME: PacketTunnelMac
        INFOPLIST_FILE: PacketTunnelMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnelMac/PacketTunnelMac.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - framework: Frameworks/Libbox.xcframework
        embed: false
      - sdk: libresolv.tbd
      - sdk: NetworkExtension.framework
      - sdk: SystemConfiguration.framework
      - sdk: CoreText.framework
      - sdk: CoreWLAN.framework
      - sdk: IOKit.framework
      - sdk: CoreLocation.framework
      - sdk: AppKit.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: ApplicationServices.framework
      - sdk: UserNotifications.framework
      - sdk: libbsm.tbd

  MadFrogVPNTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/UnitTests
    dependencies:
      - target: MadFrogVPN
      # CrashReporterSanitizeTests imports Sentry directly to build
      # Event/User/Request fixtures. Without this, the test target
      # cannot see Sentry's module map at compile time even though
      # the host app links it at runtime.
      - package: Sentry
        product: Sentry
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MadFrogVPN.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MadFrogVPN"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TARGETED_DEVICE_FAMILY: "1"
        # Auto-generate Info.plist for the test bundle. Without this,
        # `xcodebuild test` fails with "Cannot code sign because the target
        # does not have an Info.plist file" when running on a simulator
        # that requires signing (iOS 17+ simulators all do).
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: "com.madfrog.vpn.tests"
    scheme:
      testTargets:
        - MadFrogVPNTests
      gatherCoverageData: true
      coverageTargets:
        - MadFrogVPN
