<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>MadFrog · Поддержка</title>
<!--
  SUPPORT-CHAT P1 — hosted chat widget (ADR 0011). Self-contained, no build step:
  served at chat.madfrog.online and embedded via WKWebView in the iOS/macOS app
  (P2). Talks to the backend built in P0:
    GET  /api/v1/mobile/support/chat-token   (host app already has the access token)
    GET  /api/v1/mobile/support/messages?since=<id>
    POST /api/v1/mobile/support/messages   {text}
    GET  /api/v1/mobile/support/stream?token=<chat-token>   (SSE)

  The native app injects auth + theme + lang via:
    window.initChat({ apiBase, accessToken, theme: 'neon'|'calm', lang: 'ru'|'en' })
  Opened standalone with no initChat() call → PREVIEW mode (sample conversation),
  so designers/PMs can see the UX without a live token.
-->
<style>
  :root {
    /* neon theme (default — matches the app hero) */
    --bg-0:#05140d; --bg-1:#0b2018; --bg-card:#0f1b15; --bg-card-2:#12241b;
    --accent:#7cff6b; --accent-dim:#3a7a33; --pink:#ff4d9d;
    --txt:#eafff0; --txt-dim:#8aa595; --line:rgba(124,255,107,.14);
    --bubble-user:linear-gradient(135deg,#7cff6b,#46d36a); --bubble-user-txt:#05140d;
    --bubble-agent:#16241d; --shadow:0 8px 30px rgba(0,0,0,.45);
    --radius:20px;
  }
  :root[data-theme="calm"]{
    --bg-0:#0a0e14; --bg-1:#0d131c; --bg-card:#121922; --bg-card-2:#161f2a;
    --accent:#5cc8ff; --accent-dim:#2a6f96; --pink:#ff7eb6;
    --txt:#eef3f8; --txt-dim:#8696a8; --line:rgba(92,200,255,.14);
    --bubble-user:linear-gradient(135deg,#5cc8ff,#3aa0e6); --bubble-user-txt:#04121c;
    --bubble-agent:#1a2533;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 90% at 50% -10%,var(--bg-1),var(--bg-0) 60%);
    color:var(--txt); display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  /* ── header ── */
  header{
    display:flex; align-items:center; gap:12px; padding:14px 18px;
    padding-top:max(14px,env(safe-area-inset-top));
    border-bottom:1px solid var(--line); background:rgba(5,20,13,.6);
    backdrop-filter:blur(12px); position:relative; z-index:2;
  }
  .logo{font-size:26px; filter:drop-shadow(0 0 8px var(--accent))}
  .htitle{font-weight:800; font-size:17px; letter-spacing:.2px}
  .hsub{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--txt-dim); margin-top:1px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .dot.off{background:#6b6b6b;box-shadow:none}
  .spacer{flex:1}
  .theme-btn{background:none;border:1px solid var(--line);color:var(--txt-dim);
    border-radius:10px;padding:6px 10px;font-size:12px;cursor:pointer}
  /* ── messages ── */
  main{flex:1; overflow-y:auto; padding:18px 14px 8px; display:flex; flex-direction:column; gap:10px;
    scroll-behavior:smooth; -webkit-overflow-scrolling:touch}
  .msg{max-width:82%; padding:10px 14px; border-radius:18px; font-size:15px; line-height:1.4;
    word-wrap:break-word; animation:pop .18s ease-out}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.user{align-self:flex-end; background:var(--bubble-user); color:var(--bubble-user-txt);
    border-bottom-right-radius:6px; font-weight:560}
  .msg.agent{align-self:flex-start; background:var(--bubble-agent); color:var(--txt);
    border-bottom-left-radius:6px; border:1px solid var(--line)}
  .msg.system{align-self:center; background:none; color:var(--txt-dim); font-size:12.5px; text-align:center; max-width:90%}
  .time{display:block; font-size:10.5px; opacity:.6; margin-top:4px; font-variant-numeric:tabular-nums}
  .msg.user .time{text-align:right}
  .daysep{align-self:center;color:var(--txt-dim);font-size:11px;letter-spacing:.5px;text-transform:uppercase;margin:6px 0}
  /* ── attachments ── */
  .att-img{display:block; max-width:220px; max-height:280px; width:auto; border-radius:12px;
    cursor:pointer; object-fit:cover}
  .att-file{display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit;
    background:var(--bg-card-2); border:1px solid var(--line); border-radius:12px; padding:9px 12px; max-width:240px}
  .msg.user .att-file{background:rgba(5,20,13,.18); border-color:rgba(5,20,13,.18)}
  .att-file .ic{font-size:22px; flex:none}
  .att-file .meta{display:flex; flex-direction:column; min-width:0}
  .att-file .nm{font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .att-file .sz{font-size:11px; opacity:.7; margin-top:1px; font-variant-numeric:tabular-nums}
  .att-cap{margin-top:6px}
  .att-cap.above{margin-top:0; margin-bottom:8px}
  .msg.uploading{opacity:.55}
  .msg.uploading .att-img,.msg.uploading .att-file{filter:saturate(.7)}
  .msg.failed{opacity:.7}
  .upspin{display:inline-block; width:13px; height:13px; margin-left:6px; vertical-align:-2px;
    border:2px solid currentColor; border-top-color:transparent; border-radius:50%;
    animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* ── attach button ── */
  .attach{flex:none; width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
    background:none; color:var(--txt-dim); font-size:19px; display:grid; place-items:center;
    margin-bottom:2px; transition:transform .12s, color .12s}
  .attach:hover{color:var(--accent)}
  .attach:active{transform:scale(.9)}
  .attach:disabled{opacity:.4; cursor:default}
  /* ── composer ── */
  footer{padding:10px 12px; padding-bottom:max(10px,env(safe-area-inset-bottom));
    border-top:1px solid var(--line); background:rgba(5,20,13,.6); backdrop-filter:blur(12px)}
  .composer{display:flex; align-items:flex-end; gap:8px; background:var(--bg-card);
    border:1px solid var(--line); border-radius:24px; padding:6px}
  textarea{flex:1; background:none; border:none; color:var(--txt); font:inherit; font-size:15px;
    resize:none; outline:none; max-height:120px; padding:8px 0; line-height:1.35}
  textarea::placeholder{color:var(--txt-dim)}
  .send{flex:none; width:40px; height:40px; border-radius:50%; border:none; cursor:pointer;
    background:var(--bubble-user); color:var(--bubble-user-txt); font-size:18px; font-weight:700;
    display:grid; place-items:center; transition:transform .12s, opacity .12s}
  .send:disabled{opacity:.4; cursor:default}
  .send:not(:disabled):active{transform:scale(.9)}
  .typing{align-self:flex-start;display:flex;gap:4px;padding:12px 16px;background:var(--bubble-agent);
    border:1px solid var(--line);border-radius:18px;border-bottom-left-radius:6px}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--txt-dim);animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .banner{text-align:center;font-size:12px;color:var(--pink);padding:6px}
</style>
</head>
<body>
  <header>
    <div class="logo">🐸</div>
    <div>
      <div class="htitle" id="t-title">Поддержка MadFrog</div>
      <div class="hsub"><span class="dot" id="conn-dot"></span><span id="conn-text">на связи</span></div>
    </div>
    <div class="spacer"></div>
    <button class="theme-btn" id="theme-toggle">тема</button>
  </header>

  <main id="messages" aria-live="polite"></main>
  <div class="banner" id="banner" hidden></div>

  <footer>
    <form class="composer" id="composer">
      <button class="attach" id="attach" type="button" aria-label="Прикрепить файл">📎</button>
      <input type="file" id="file" accept="image/*,application/pdf,text/plain" hidden>
      <textarea id="input" rows="1" placeholder="Опишите проблему…" maxlength="4000" autocomplete="off"></textarea>
      <button class="send" id="send" type="submit" aria-label="Отправить">↑</button>
    </form>
  </footer>

<script>
(function () {
  "use strict";

  // ── i18n ──
  const STR = {
    ru:{title:"Поддержка MadFrog",online:"на связи",offline:"нет связи",connecting:"подключение…",
        placeholder:"Опишите проблему…",welcome:"Здравствуйте! Опишите, что случилось — ответим как можно скорее.",
        sendErr:"Не отправилось. Проверьте связь и попробуйте ещё раз.",today:"Сегодня",yesterday:"Вчера",
        fileTooBig:"Файл слишком большой (макс. 10 МБ).",fileBadType:"Такой тип файла не поддерживается."},
    en:{title:"MadFrog Support",online:"online",offline:"offline",connecting:"connecting…",
        placeholder:"Describe your issue…",welcome:"Hi! Tell us what happened — we'll reply as soon as we can.",
        sendErr:"Couldn't send. Check your connection and try again.",today:"Today",yesterday:"Yesterday",
        fileTooBig:"File is too large (max 10 MB).",fileBadType:"This file type isn't supported."},
  };

  // Mirror of the backend allowlist (validate client-side for a friendly error).
  const ALLOWED_MIME = new Set(["image/jpeg","image/png","image/heic","image/webp","image/gif","application/pdf","text/plain"]);
  const MAX_SIZE = 10485760;   // 10 MiB

  const cfg = { apiBase:"", accessToken:null, theme:"neon", lang:"ru", chatToken:null };
  let lastId = 0, sse = null, L = STR.ru, sending = false;
  const seenIds = new Set();   // every server id we've rendered — dedupes the SSE echo of our own sends, history overlap, and reconnect replay

  const $ = id => document.getElementById(id);
  const msgsEl = $("messages");

  function applyLang(){
    L = STR[cfg.lang] || STR.ru;
    document.documentElement.lang = cfg.lang;
    $("t-title").textContent = L.title;
    $("input").placeholder = L.placeholder;
    setConn(connState);
  }
  function applyTheme(){ document.documentElement.setAttribute("data-theme", cfg.theme); }

  let connState = "connecting";
  function setConn(s){
    connState = s;
    $("conn-dot").classList.toggle("off", s!=="online");
    $("conn-text").textContent = s==="online"?L.online : s==="offline"?L.offline : L.connecting;
  }

  function fmtTime(d){ return d.toLocaleTimeString(cfg.lang==="ru"?"ru-RU":"en-US",{hour:"2-digit",minute:"2-digit"}); }
  function humanSize(b){ if(!b) return "0 KB"; return b<1048576 ? (b/1024).toFixed(b<10240?1:0)+" KB" : (b/1048576).toFixed(b<10485760?1:0)+" MB"; }

  // ── day separators ── (insert a "Сегодня / Вчера / 4 июня" divider when the
  // day rolls over between consecutive messages; lastDayKey survives reconnects
  // because deduped messages return before this runs)
  let lastDayKey = null;
  function dayKey(d){ return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
  function dayLabel(d){
    const now=new Date(), y=new Date(); y.setDate(now.getDate()-1);
    if(dayKey(d)===dayKey(now)) return L.today;
    if(dayKey(d)===dayKey(y)) return L.yesterday;
    return d.toLocaleDateString(cfg.lang==="ru"?"ru-RU":"en-US",{day:"numeric",month:"long"});
  }
  function maybeDaySeparator(d){
    const k=dayKey(d);
    if(k===lastDayKey) return;
    lastDayKey=k;
    const sep=document.createElement("div"); sep.className="daysep"; sep.textContent=dayLabel(d);
    msgsEl.appendChild(sep);
  }

  function addMessage(m, animate=true){
    if (m.id){
      if (seenIds.has(m.id)) return null;          // already rendered (SSE echo / history overlap / reconnect replay)
      seenIds.add(m.id);
      lastId = Math.max(lastId, m.id);
    }
    const when = m.created_at ? new Date(m.created_at) : new Date();
    if (m.sender!=="system") maybeDaySeparator(when);
    const el = document.createElement("div");
    el.className = "msg " + (m.sender==="user"||m.sender==="local"?"user":m.sender==="system"?"system":"agent");
    if(!animate) el.style.animation="none";
    if (m.attachment){
      renderAttachment(el, m.attachment, m.body);   // image + caption, or file chip
    } else {
      el.textContent = m.body;
    }
    if (m.sender!=="system"){
      const t=document.createElement("span"); t.className="time";
      t.textContent=fmtTime(when);
      el.appendChild(t);
    }
    msgsEl.appendChild(el);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return el;
  }

  // Build attachment markup inside a bubble. `src` overrides the link (used for the
  // local object-URL preview before upload completes); falls back to att.url.
  function renderAttachment(el, att, body, src){
    const url = src || att.url;
    const isImg = (att.mime||"").startsWith("image/");
    let cap = null;
    if (body && body.trim()){
      cap = document.createElement("div");
      cap.className = "att-cap" + (isImg ? "" : " above");
      cap.textContent = body;
    }
    // Files: caption ABOVE the chip so "text + attached file" reads as ONE
    // message (e.g. the diagnostic snapshot + singbox.log), not two bubbles.
    if (cap && !isImg) el.appendChild(cap);
    if (isImg){
      const img=document.createElement("img"); img.className="att-img";
      img.loading="lazy"; if(url) img.src=url;
      if(att.url && !src) img.addEventListener("click", ()=>window.open(att.url,"_blank","noopener"));
      el.appendChild(img);
    } else {
      const a=document.createElement(att.url?"a":"div"); a.className="att-file";
      if(att.url){ a.href=att.url; a.target="_blank"; a.rel="noopener"; }
      const ic=document.createElement("span"); ic.className="ic"; ic.textContent="📄"; a.appendChild(ic);
      const meta=document.createElement("span"); meta.className="meta";
      const nm=document.createElement("span"); nm.className="nm"; nm.textContent=att.name||"file";
      const sz=document.createElement("span"); sz.className="sz"; sz.textContent=humanSize(att.size);
      meta.appendChild(nm); meta.appendChild(sz); a.appendChild(meta);
      el.appendChild(a);
    }
    // Images: caption BELOW the image (conventional).
    if (cap && isImg) el.appendChild(cap);
  }

  function banner(text){ const b=$("banner"); if(!text){b.hidden=true;return;} b.textContent=text; b.hidden=false; }

  // ── networking ──
  async function api(path, opts){
    const r = await fetch(cfg.apiBase + path, Object.assign({
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+cfg.accessToken },
    }, opts));
    if(!r.ok) throw new Error("HTTP "+r.status);
    return r.status===204?null:r.json();
  }

  async function loadHistory(){
    const data = await api("/api/v1/mobile/support/messages?since="+lastId);
    const msgs = data.messages||[];
    msgs.forEach(m=>addMessage(m,false));
    return msgs.length;
  }

  // SSE-CHATTOKEN-REMINT (2026-06-17): the chat-token in the stream URL has a
  // 10-min TTL. EventSource's BUILT-IN auto-reconnect reuses the SAME URL, so
  // once the token expires every retry 401s and the chat silently dies (you had
  // to re-open the app). We drive reconnection ourselves — close the dead
  // stream and re-enter openStream(), which mints a FRESH token — with
  // exponential backoff so a real outage doesn't hammer the server.
  let reconnectTimer = null;
  let reconnectDelay = 1000;
  function scheduleReconnect(){
    if(PREVIEW || reconnectTimer) return;
    reconnectTimer = setTimeout(()=>{
      reconnectTimer = null;
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      openStream();
    }, reconnectDelay);
  }

  async function openStream(){
    if(reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer = null; }
    try{
      const tok = await api("/api/v1/mobile/support/chat-token");
      cfg.chatToken = tok.token;
    }catch(e){ setConn("offline"); scheduleReconnect(); return; }
    if(sse){ sse.close(); sse = null; }
    sse = new EventSource(cfg.apiBase + "/api/v1/mobile/support/stream?token="+encodeURIComponent(cfg.chatToken)+"&since="+lastId);
    sse.onopen = ()=>{ setConn("online"); reconnectDelay = 1000; };  // healthy → reset backoff
    sse.onmessage = ev=>{ try{ addMessage(JSON.parse(ev.data)); }catch(_){} };
    sse.onerror = ()=>{
      // Don't trust EventSource's stale-token retry — own the reconnect so the
      // token is re-minted on the next open.
      setConn("connecting");
      if(sse){ sse.close(); sse = null; }
      scheduleReconnect();
    };
  }

  async function send(text){
    if(sending || !text.trim()) return;
    sending = true; $("send").disabled = true;
    const optimistic = addMessage({sender:"local", body:text, created_at:new Date()});   // optimistic, no id yet
    try{
      if(PREVIEW){ previewReply(text); }
      else {
        const saved = await api("/api/v1/mobile/support/messages",{method:"POST",body:JSON.stringify({text})});
        // Reconcile with the SSE echo of our own message (backend re-broadcasts it
        // to this thread's stream). Race-proof either way:
        if (saved && saved.id){
          if (seenIds.has(saved.id)){
            if (optimistic) optimistic.remove();              // echo already rendered it → drop the optimistic bubble
          } else {
            seenIds.add(saved.id);                            // claim the id → addMessage dedupes the echo
            lastId = Math.max(lastId, saved.id);
            if (optimistic && saved.created_at){
              const t = optimistic.querySelector(".time");
              if (t) t.textContent = fmtTime(new Date(saved.created_at));
            }
          }
        }
      }
      banner("");
    }catch(e){ banner(L.sendErr); }
    finally{ sending=false; $("send").disabled=false; }
  }

  async function sendAttachment(file){
    if(sending || !file) return;
    if(file.size > MAX_SIZE){ banner(L.fileTooBig); return; }
    if(!ALLOWED_MIME.has(file.type)){ banner(L.fileBadType); return; }
    sending = true; $("send").disabled = true; $("attach").disabled = true;
    banner("");
    const att = { mime:file.type, name:file.name, size:file.size };
    const objUrl = att.mime.startsWith("image/") ? URL.createObjectURL(file) : null;

    // optimistic bubble (no id yet) — local preview + uploading state
    const optimistic = document.createElement("div");
    optimistic.className = "msg user uploading";
    renderAttachment(optimistic, att, "", objUrl);
    const t=document.createElement("span"); t.className="time";
    t.innerHTML = fmtTime(new Date()) + '<span class="upspin"></span>';
    optimistic.appendChild(t);
    msgsEl.appendChild(optimistic);
    msgsEl.scrollTop = msgsEl.scrollHeight;

    try{
      if(PREVIEW){
        // standalone preview: just settle the bubble, no real upload
        optimistic.classList.remove("uploading");
        const spin=optimistic.querySelector(".upspin"); if(spin) spin.remove();
        previewReply(file.name);
        return;
      }
      const pre = await api("/api/v1/mobile/support/attachments/presign",
        {method:"POST",body:JSON.stringify({filename:file.name, mime:file.type, size:file.size})});
      const put = await fetch(pre.upload_url, {method:"PUT", headers:{"Content-Type":file.type}, body:file});
      if(!put.ok) throw new Error("PUT "+put.status);
      const saved = await api("/api/v1/mobile/support/messages",
        {method:"POST",body:JSON.stringify({text:"", attachment_key:pre.key, attachment_mime:file.type, attachment_name:file.name, attachment_size:file.size})});
      // Reconcile with the SSE echo, mirroring send()'s logic.
      if (saved && saved.id){
        if (seenIds.has(saved.id)){
          optimistic.remove();                                // echo already rendered it → drop the optimistic bubble
        } else {
          seenIds.add(saved.id);                              // claim the id → addMessage dedupes the echo
          lastId = Math.max(lastId, saved.id);
          // upgrade the optimistic bubble to the real one (real GET url, drop uploading state)
          optimistic.classList.remove("uploading");
          if (saved.attachment){
            const img = optimistic.querySelector(".att-img");
            const chip = optimistic.querySelector(".att-file");
            if (img && saved.attachment.url){
              img.src = saved.attachment.url;
              img.addEventListener("click", ()=>window.open(saved.attachment.url,"_blank","noopener"));
            } else if (chip && saved.attachment.url){
              // swap the placeholder chip for the real one (now a clickable link)
              const holder = document.createElement("div");
              renderAttachment(holder, saved.attachment, "");
              chip.replaceWith(holder.firstChild);
            }
          }
          const ts = optimistic.querySelector(".time");
          if (ts) ts.textContent = fmtTime(saved.created_at?new Date(saved.created_at):new Date());
        }
      }
      banner("");
    }catch(e){
      banner(L.sendErr);
      optimistic.classList.remove("uploading"); optimistic.classList.add("failed");
      const spin=optimistic.querySelector(".upspin"); if(spin) spin.remove();
    }
    finally{
      sending=false; $("send").disabled=false; $("attach").disabled=false;
      if(objUrl) URL.revokeObjectURL(objUrl);
    }
  }

  // ── composer UX ──
  const input = $("input");
  function autoGrow(){ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,120)+"px"; }
  input.addEventListener("input", autoGrow);
  input.addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); $("composer").requestSubmit(); }});
  // SSE-CHATTOKEN-REMINT: returning to the chat (app foreground / tab visible)
  // re-opens a dead/closed stream right away instead of waiting out the backoff.
  document.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState==="visible" && !PREVIEW && (!sse || sse.readyState===2)){
      reconnectDelay = 1000;
      openStream();
    }
  });
  $("composer").addEventListener("submit", e=>{ e.preventDefault(); const v=input.value; input.value=""; autoGrow(); send(v); });
  $("theme-toggle").addEventListener("click", ()=>{ cfg.theme=cfg.theme==="neon"?"calm":"neon"; applyTheme(); });
  $("attach").addEventListener("click", ()=>{ $("file").click(); });
  $("file").addEventListener("change", e=>{ const f=e.target.files&&e.target.files[0]; e.target.value=""; if(f) sendAttachment(f); });

  // ── public bridge for the native app ──
  window.initChat = function(opts){
    Object.assign(cfg, opts||{});
    applyTheme(); applyLang();
    PREVIEW = false;
    setConn("connecting");
    loadHistory().then(n=>{
      // first open (no history): greet instead of showing a blank void
      if(n===0) addMessage({sender:"system",body:L.welcome,created_at:new Date()},false);
      return openStream();
    }).catch(()=>{
      // Backend unreachable (e.g. an RU network block on api.madfrog.online) —
      // DON'T leave a blank black void. Render the greeting + a clear offline
      // notice, then still openStream() so its backoff retry (and the
      // visibilitychange re-open) recovers the chat once the network clears.
      setConn("offline");
      if(!msgsEl.children.length){
        addMessage({sender:"system",body:L.welcome,created_at:new Date()},false);
        addMessage({sender:"system",body:(cfg.lang==='en'
          ? "No connection to support right now. Your message will be sent as soon as the network is back."
          : "Нет связи с поддержкой. Сообщение отправится, как только появится сеть."),created_at:new Date()},false);
      }
      openStream();
    });
  };

  // ── PREVIEW mode (opened standalone, no initChat) ──
  let PREVIEW = true;
  function previewReply(userText){
    setConn("online");
    const t=document.createElement("div"); t.className="typing"; t.innerHTML="<span></span><span></span><span></span>";
    msgsEl.appendChild(t); msgsEl.scrollTop=msgsEl.scrollHeight;
    setTimeout(()=>{ t.remove(); addMessage({sender:"agent",body:"Спасибо, передал! Сейчас посмотрю по вашему аккаунту 👀",created_at:new Date()}); }, 1100);
  }
  function startPreview(){
    applyTheme(); applyLang(); setConn("online");
    addMessage({sender:"agent",body:L.welcome,created_at:new Date(Date.now()-3600e3)},false);
    addMessage({sender:"user",body:"После обновления на маке слетел аккаунт на триал 😩",created_at:new Date(Date.now()-3500e3)},false);
    addMessage({sender:"agent",body:"Это известный момент с keychain — фикс уже в TestFlight (1.0.30). Обнови сборку и зайди через «Войти с Apple» — подписка вернётся, она привязана к Apple ID.",created_at:new Date(Date.now()-3400e3)},false);
  }

  // boot: PREVIEW unless the host calls initChat() within a tick.
  setTimeout(()=>{ if(PREVIEW) startPreview(); }, 50);
})();
</script>
