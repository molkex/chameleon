known-issues:
  - id: telegram-media-slow
    severity: major
    description: |
      TG media (photos/videos) slow because urltest elected nl-direct-nl2
      which can't route to TG media CDN 91.105.192.0/22. Backend 60.4
      adds geoip-telegram route rule pinning TG traffic at _telegram_route
      (DE-capable leg). Awaiting field verification.
    status-update: RESOLVED 2026-05-14 — backend 60.5, field log shows 118 TG CDN conns via de-via-msk
    next-action: none

  - id: throttle-cycle-90s
    severity: major
    description: |
      nl-via-msk through MSK relay throttles around 90 s of bulk flow.
      TunnelStallProbe detects (Phase 1.C), fallback fires in ~9 ms.
      Build 60-62: urltest re-elected the same throttled outbound
      because the small re-probe passes. Build 63 adds penalty-aware
      fallback (Phase 1.D) — currently-selected outbound is penalised
      60s and a non-penalised peer is pinned via selectOutbound.
    status-update: MITIGATED 2026-05-14 — build 64 penalty fallback verified (penalise+selectOutbound+revert). Throttle still occurs ~every 2min but switch is instant. Full fix = phase-1.e or phase-1-smart-group.
    next-action: none

  - id: ios-extension-cache
    severity: minor
    description: |
      iOS may keep an old PacketTunnel extension binary cached even after
      main-app TestFlight update. Symptom: build N+1 installed in
      Settings, but field log shows build N behaviour. Toggling
      Settings → VPN → MadFrog off/on or reinstalling fixes it.
    next-action: document-in-troubleshooting

  - id: simulator-app-group-entitlement
    severity: minor
    description: |
      iOS Simulator can't acquire `group.com.madfrog.vpn` App Group
      entitlement without a real provisioning profile. xcodebuild test
      crashes on Constants.swift line 74. Pre-existing, unrelated to
      tunnel code.
    next-action: use-on-device-testflight-for-tests
