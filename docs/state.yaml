known-issues:
  - id: throttle-cycle-90s
    severity: major
    description: |
      nl-via-msk through MSK relay throttles around 90 s of bulk flow.
      TunnelStallProbe detects (Phase 1.C), fallback fires in ~9 ms,
      but urltest re-elects the same throttled outbound seconds later
      because the small re-probe passes. User perceives ~5-7 s pauses
      every ~90 s.
    next-action: phase-1.d-penalty-score
    workaround: none

  - id: ios-extension-cache
    severity: minor
    description: |
      iOS may keep an old PacketTunnel extension binary cached even after
      main-app TestFlight update. Symptom: build N+1 installed in
      Settings, but field log shows build N behaviour. Toggling
      Settings → VPN → MadFrog off/on or reinstalling fixes it.
    next-action: document-in-troubleshooting

  - id: simulator-app-group-entitlement
    severity: minor
    description: |
      iOS Simulator can't acquire `group.com.madfrog.vpn` App Group
      entitlement without a real provisioning profile. xcodebuild test
      crashes on Constants.swift line 74. Pre-existing, unrelated to
      tunnel code.
    next-action: use-on-device-testflight-for-tests
