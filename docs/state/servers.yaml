# servers.yaml — canonical list of servers in the Chameleon mesh.
#
# Update whenever a server is added, removed, or its role changes.
# THIS FILE is canonical for the server mesh. (The old
# infrastructure/topology.yaml was retired 2026-06-01 — server facts live here,
# VPN client-config shape moved to ../arch/vpn.md.)

verified: 2026-06-01
spof_warning: |
  VPN-exit failover added 2026-05-30: GRA (OVH Gravelines) is a 2nd
  VLESS-Reality+Hysteria2 exit — if NL's VPN IP is RKN-blocked, clients
  auto-switch via the Auto urltest group. BUT backend/API/Postgres are
  still single-NL: if the whole NL box dies, the service still goes down.
  Full backend/DB standby (cluster replica on GRA) is the next step.

# Production VPN node — sole authority for /api/* and /vpn (sing-box).
nl:
  status: production
  ip: 147.45.252.234                  # MAIN IP — inbound (clients connect here :443), SSH, DNS, relays. DO NOT DELETE.
  egress_ip: 72.56.79.25              # added 2026-05-31: user-traffic EGRESS source-bound here (clean US-geo, vs RU on main IP). See incidents/2026-05-31-geo-leak-nl-exit.md
  hosting: Timeweb
  location: Netherlands
  geo_note: |
    Main IP 147.45.252.234 geolocates as RUSSIA in whoer/Google/MaxMind (Timeweb =
    Russian owner) → blocked Gemini etc. Fix: VPN egress source-bound to the additional
    IP 72.56.79.25 (TW-Cloud pool but reads US) via singbox direct outbound
    inet4_bind_address (config egress_bind_ip). Inbound stays on the main IP.
    IP persisted via systemd unit vpn-egress-ip.service.
  role:
    - vpn_node           # sing-box VLESS Reality on :443/tcp (inbound on main IP, egress via 72.56.79.25)
    - api_backend        # chameleon Go binary, :80 + :443 nginx
    - admin_spa          # /admin/app via nginx
    - ss_ws_router       # singbox-ss-ws container — separate prod (user's router), do NOT touch
  ssh: root@147.45.252.234
  domain_apex: madfrog.online        # CF-proxied → here
  domain_api: api.madfrog.online     # via MSK relay (not CF) → here:80

# 2nd VPN exit (failover for NL) — added 2026-05-30. VPN-only: no backend/DB
# here yet, current users baked into singbox config (see project_gra_node_bringup
# memory). Reachable from RU (~50ms), Reality SNI ads.adfox.ru verified live.
gra:
  status: production
  ip: 54.38.243.162
  hostname: vps-57941bff.vps.ovh.net
  hosting: OVH
  location: Gravelines, France
  spec: 6 vCPU / 12 GB / 100 GB, ~1 Gbit/s, €9.99/mo
  role:
    - vpn_node           # sing-box VLESS Reality :443/tcp + Hysteria2 :443/udp
  ssh: debian@54.38.243.162   # key auth (claude-code-ssh-key), root via sudo
  vpn_servers_key: gra1       # row in NL Postgres vpn_servers, country_code=FR
  user_sync: live             # 2026-05-31: NL backend RelayUserSyncer now pushes
                              # the active VLESS Reality user set to gra1 every 30s
                              # + on each registration (vpn_servers.user_api_url =
                              # http://54.38.243.162:15380). User API rebound to
                              # 0.0.0.0:15380, ufw-restricted to NL (147.45.252.234)
                              # + bearer (USER_API_SECRET). Hysteria2 leg still
                              # baked-only (not User-API-managed). See
                              # incidents/2026-05-31-gra-france-user-sync.md

waw:
  status: production          # LIVE 2026-06-28 — 3rd exit (Poland) in /config for ALL users
  ip: 217.182.74.70
  ipv6: 2001:41d0:623:677::1
  hostname: vps-c2c3ed1c.vps.ovh.net
  hosting: OVH (Warsaw WAW2, Poland) — VPS-3 2027, 6 vCPU/12 GB/100 GB, ~€12.24/mo, auto-renew ON
  ssh: debian@217.182.74.70   # key auth (claude-code-ssh-key), root via sudo; password stale post-rebuild
  role:
    - vpn_node                # sing-box-fork VLESS Reality :443/tcp + Hysteria2 :443/udp (clone of GRA)
    - warm_standby            # NL-RED-01 / ADR 0012 — Postgres replication NOT yet set up (separate task)
  vpn_servers_key: waw1       # NL Postgres vpn_servers row, country_code=PL, is_active=true (2026-06-28)
  reality_pubkey: WlpKYeCDkiOhuwdwxvJiN-tEkWMlj0YII44k58iabz8   # own keypair (secrets CHAMELEON_WAW_REALITY_*)
  user_sync: live             # RelayUserSyncer pushes active roster to user_api http://217.182.74.70:15380
                              # (ufw NL/MSK/SPB-only, bearer USER_API_SECRET). Verified WAW==GRA user count.
                              # e2e-verified 2026-06-28: throwaway VLESS client exits via 217.182.74.70.
  todo:
    - relay chains waw-via-msk / ru-spb-waw for RU-whitelist users (optional; direct leg already live)
    - Postgres streaming replication NL→WAW (the standby half — ADR 0012, playbooks/nl-failover.md)

# Russian-side relay fronting api.madfrog.online for RU users behind GFW,
# AND a VPN relay: nginx fronts the API, sing-box runs the relay chains.
msk_relay:
  status: production
  ip: 217.198.5.52
  hosting: Timeweb MSK
  location: Moscow, RU
  role: api_relay + vpn_relay
  upstream: nl:80
  fronts: api.madfrog.online
  dns: A record points to msk_relay directly (NOT Cloudflare)
  # sing-box relay chains (VLESS Reality inbound → userspace WireGuard → exit).
  # relay_exit_peers rows + box /etc/sing-box/config.json. See
  # incidents/2026-06-01-fr-relay-legs.md.
  chains:
    2097: nl2:443    # nl-via-msk  (inbound vless-nl → wg-nl → NL)
    2099: gra1:443   # fr-via-msk  (inbound vless-fr → wg-fr → GRA/France) [2026-06-01]

# Secondary TCP relay for cases where direct NL :443 from RU is blocked.
# nginx forwards every former-DE port to NL after 2026-05-27 rewrite.
spb_relay:
  status: production
  ip: 185.218.0.43
  hosting: unknown (provider unclear — see playbooks/spb-relay-audit.md when written)
  location: Saint Petersburg, RU
  role: tcp_relay
  forwards:
    443:  nl:443
    2096: nl:443
    2098: nl:443        # ru-spb-nl  (SPB→NL whitelist-bypass)
    2099: gra1:443      # ru-spb-fr  (SPB→FR whitelist-bypass) [2026-06-01]
    80:   nl:80         # Host=api.madfrog.online
  config_source: infrastructure/spb-relay/   # mirror of /etc/nginx/* on the box

