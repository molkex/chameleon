# Russian-side relay fronting api.madfrog.online for RU users behind GFW,
# AND a VPN relay: nginx fronts the API, sing-box runs the relay chains.
msk_relay:
  status: production
  ip: 217.198.5.52
  hosting: Timeweb MSK
  cost_monthly: 530 RUB   # verified 2026-07-11 (user-provided, from Timeweb panel)
  location: Moscow, RU
  role: api_relay + vpn_relay   # ⭐ the SINGLE API ingress — "who is primary" = where this upstream points
  upstream: WAW 217.182.74.70:8000   # 2026-06-29 failover flipped it from nl:80 (api.madfrog.online + decoy-adfox)
  fronts: api.madfrog.online
  dns: A record points to msk_relay directly (NOT Cloudflare)
  # sing-box relay chains (VLESS Reality inbound → userspace WireGuard → exit).
  # relay_exit_peers rows + box /etc/sing-box/config.json. See
  # incidents/2026-06-01-fr-relay-legs.md.
  chains:
    2097: nl2:443    # nl-via-msk  (inbound vless-nl → wg-nl → NL)
    2100: waw1:443   # pl-via-msk — added 2026-07-12. Different transport than the other chains
      # ON PURPOSE: inbound vless-pl (Reality, same key material as the vless-de/nl/fr siblings)
      # → OUTBOUND hy2-waw (Hysteria2/QUIC, NOT WireGuard) → WAW's existing hysteria2-in inbound
      # (:443/udp, the same one client UDP-fallback legs already use — reused rather than
      # standing up a new WireGuard server on WAW). Root cause this chain fixes: a real device's
      # direct path to WAW (217.182.74.70:443) was reproducibly unreachable (`dial tcp
      # 217.182.74.70:443: i/o timeout`, confirmed across 2 sessions hours apart) while WAW
      # itself was independently confirmed healthy (accepting connections from other vantages,
      # <50ms from SPB) — i.e. degraded specifically on that device's path, with WAW being the
      # ONLY exit that had zero relay fallback (NL already had nl-via-msk). urltest now races
      # pl-direct-waw1 vs pl-via-msk automatically inside the "🇵🇱 Польша" group — no client
      # change needed. E2E-verified from a real client (SOCKS5 through vless-pl → hy2-waw →
      # WAW → api.ipify.org returned 217.182.74.70, google.com 200 OK). Relay credential: a
      # dedicated non-expiring `users` row (vpn_username='relay-msk-waw', id 159383, never a
      # real device) — its UUID had to be manually baked into WAW's hysteria2-in user list (see
      # known_bug above) since the normal auto-refresh path is broken. relay_exit_peers row id 4
      # (msk/waw1/2100/vless-pl) — its wg_* columns are unused N/A placeholders for this row;
      # those columns aren't consumed by any Go code path (grepped), they're WireGuard-specific
      # descriptive metadata from the schema's original design, harmless to leave inert here.
    2099: gra1:443   # fr-via-msk — ⚠️ INERT since 2026-07-11 (GRA decommissioned, sing-box
      # stopped on the far end). Inbound still configured in MSK's /etc/sing-box/config.json
      # (not in repo); harmless, not yet pruned. [chain added 2026-06-01]
    2096: STALE — vless-de → wg-de → 162.19.242.30 (RETIRED DE)   # ⚠️ found live 2026-07-11,
      # NOT pruned when DE retired 2026-05-25. Silent black hole for any client with this leg
      # still cached. TODO: confirm zero traffic in connection logs, then remove.
      # See audits/2026-07-11-network-mesh-stability-audit.md.

# Secondary TCP relay for cases where direct NL :443 from RU is blocked.
# nginx forwards every former-DE port to NL after 2026-05-27 rewrite.
spb_relay:
  status: DEGRADED — non-functional   # ⚠️ 2026-07-11: TCP handshakes accept on every port
    # (22/80/2098/2099/8443) but zero application data returns on any of them (confirmed both
    # from outside and from MSK) — consistent with the hosting DDoS-proxy answering for a hung
    # box. SSH also hangs at banner exchange. Recovery needs the SprintHost control panel, not
    # SSH. See audits/2026-07-11-network-mesh-stability-audit.md.
  ip: 185.218.0.43
  hosting: SprintHost (provider confirmed 2026-07-11; account registered under info@razblokirator.ru)
  cost_monthly: 140 RUB   # verified 2026-07-11 (user-provided)
  location: Saint Petersburg, RU
  role: tcp_relay
  forwards:
    443:  nl:443
    2096: nl:443
    2098: nl:443        # ru-spb-nl  (SPB→NL whitelist-bypass)
    # 2099→gra1:443 (ru-spb-fr) REMOVED 2026-07-11 — GRA decommissioned, port freed.
    80:   nl:80         # Host=api.madfrog.online — ⚠️ STALE even once SPB itself recovers: NL's
                         # nginx/backend role is INACTIVE post-failover (see nl.role above), so
                         # this fallback target needs to become WAW, not just "SPB is back up".
                         # infrastructure/spb-relay/api-proxy.conf mirror confirms this is the
                         # live (stale) config, not just a doc drift.
  config_source: infrastructure/spb-relay/   # mirror of /etc/nginx/* on the box — itself stale,
    # see the :80 forward note above
  value_unproven: |
    Cost is trivial (140 ₽/mo) so this was never really a "cut it to save money" question — the
    real question is whether the RU whitelist-bypass path it provides is worth keeping fixed.
    Existing per-leg auth telemetry (app_events.properties->>'leg') fired only 3x in 90 days
    (2 decoy, 1 primary) — too thin to prove or disprove value; mostly reveals the telemetry
    itself under-fires. Plan: recover via SprintHost panel → verify leg telemetry actually fires
    → after a few weeks, check the decoy-vs-primary win distribution before deciding fix-vs-retire.

