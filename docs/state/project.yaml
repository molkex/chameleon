# ── Are we going the right way? ─────────────────────────────────────────────
assessment: |
  PAUSED, deliberately, and for good reason. The redundancy saga from June is
  resolved — NL had a THIRD outage-and-recovery cycle (2026-07-01 → 07-10, same
  Timeweb reboot-flap signature as 06-26) and WAW carried the whole service
  through it as primary without incident. That risk is now "watch it, don't
  panic about it" rather than "fix it."

  What actually forced the pause: two independent 2026-07-11 audits (client-code
  + live infra, cross-checked against each other and against real production
  telemetry, not just claims) found the "app works sometimes" complaint is real
  and traces to several concrete, verified causes — a dead RU relay (SPB), a
  genuine revenue-authorization bug (non-renewing entitlements read as
  permanent, and that DOES gate the connect flow), a NetworkExtension lifecycle
  race, and a connect-timeout that quietly violates the project's own 30s rule.
  None of these are hypothetical — each was confirmed by reading the actual code
  or running the actual query, not inferred from a doc.

  Underneath all of it sits the real strategic fact: revenue (~€45/quarter, 100%
  from RU FreeKassa, zero verified Apple IAP in 90 days) is far below even the
  minimum infra to run the product at all (~€27.8/mo for WAW+GRA+MSK relay
  alone). This is NOT a "too many servers" problem — checked WAW (can't touch,
  it's the whole service), NL (can't touch, live production router unrelated to
  this app sits on the same box), and only found ~€9/mo in real, low-risk
  savings (a dormant Telegram-bot box — confirmed dead and fully decommissioned
  same day, server+IP deleted via Timeweb API, plus SPB/razblokirator hygiene
  that cost ~nothing regardless). Growth also stalled
  hard after a one-time May signup spike (317 → 53 → 14/month).

  Direction: fix the P0/P1 stability items first (roadmap#next.audit_2026_07_11)
  — a service this size doesn't get to have both instability AND stalled
  growth AND unresolved revenue economics at the same time. Stability is the
  one of those three that's actually tractable right now.
