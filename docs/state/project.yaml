# project.yaml — START HERE. The token-cheap 30-second snapshot of where the
# project is RIGHT NOW. A fresh session (human or agent) reads this first, then
# follows the pointers for depth. It is a curated SNAPSHOT, not a second source
# of truth — canonical detail lives in the files it points to. Refresh `meta.updated`
# + the changed lines at the end of every working session.
#
# THE SYSTEM (decisions 0006 yaml-state-md-narrative + 0009 test-map):
#   project.yaml      → this snapshot + the map (you are here)
#   state/*.yaml      → canonical current facts (servers, app-store, runtime, domains,
#                       payment-providers, test-map)
#   roadmap.yaml      → now / next / later / done   (move items, never delete)
#   decisions/NNNN-*  → WHY we chose X (ADRs, append-only; supersede, don't edit)
#   incidents/DATE-*  → what broke + the fix (append-only post-mortems)
#   playbooks/*.md    → HOW to do a recurring op (deploy, release, recover, debug)
#   arch/*.md         → system design (overview/vpn/backend/payments = current)
#   audits/*.md       → point-in-time audits
#   archive/          → superseded snapshots/plans (historical)
# Rule: one fact = one home. YAML for state agents parse, MD for narrative.
# Test coverage + how-to-verify each layer: state/test-map.yaml (decision 0009).

