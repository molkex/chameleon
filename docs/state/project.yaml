    testflight:  {version: "1.0.33", build: 128, state: IN_BETA_TESTING}  # b128 2026-07-12 — race telemetry from b127 (race.* now in TunnelFileLogger) showed the race DID succeed via the decoy leg (SPB, real 200 in ~250-600ms) — the b127 IP-list/win-policy fix worked — yet the config still never cached and connect still failed. Root cause one layer deeper: nginx serves /api/v1/mobile/config with `Transfer-Encoding: chunked` and no Content-Length (live-verified via curl -D-), and `DirectConnection` (the hand-rolled HTTP/1.1 client both the decoy AND direct-IP race legs use, needed because URLSession can't override SNI for a resolved IP) never decoded chunked bodies — it took every byte after the header terminator verbatim, splicing literal hex chunk-size lines into the JSON. That's exactly the two `decode config` errors seen on-device all along: "invalid character 'd' ... row 1, column 1" (a chunk-size line starting with a hex a-f digit) and "cannot unmarshal number into Go value of type option._Options" (an all-decimal chunk-size a JSON decoder reads as a bare top-level number). Primary (URLSession) was never affected — Foundation de-chunks transparently — which is why every prior build's race telemetry (once b127 added it) would have shown a "successful" 200 win while the cached config stayed corrupt. Fixed: added DirectConnection.dechunk(_:), applied when Transfer-Encoding: chunked is present; pinned with unit tests (realistic JSON-split-across-chunks + malformed-input graceful degradation). b128 is the build to test on-device now — b125/126/127 all superseded (their fixes are independently correct and still included, just missing this one, which is very likely THE actual fix for tonight's "не подключилось"/"Нет конфигурации"). b127 2026-07-11 — real on-device test of b126 hit the ACTUAL root cause of tonight's connect failures: live-verified (curl) that NL (147.45.252.234) and SPB (185.218.0.43) — both listed in AppConfig.directBackendIPs — answer /api/v1/mobile/config with a fast, empty-body HTTP 400 (~0.3-0.4s). NL's chameleon backend was stopped by the 2026-06-29 WAW failover; SPB is separately confirmed application-dead (roadmap SPB-RECOVER, P0). The hedged race (APIClient.dataWithFallback) takes the FIRST leg that passes its win-check, not the best one — under the old `.anyBelow500` policy these fast wrong-status legs could beat a slower-but-correct primary/decoy/MSK leg, so the config fetch kept "succeeding" with a 400 and surfacing as "Нет конфигурации" even though a working leg existed. Fixed: pruned NL+SPB from directBackendIPs (MSK-only now, live-verified healthy: 401 in ~0.15-0.2s), added FallbackWinPolicy.definitiveConfigOnly (mirrors GetConfig's real response surface: 2xx/401/403/404/409) applied to fetchConfig so a future stale/dead IP can't repeat this, and added race.* outcome logging to TunnelFileLogger (was AppLogger-only — invisible in the app's own exported diagnostic log, which is why this took a manual curl-per-IP session instead of just reading the sent log). b127 is the build to test on-device now — b126 superseded (missing this fix; b126's OWN fix — real JSON validation of the cached config — is independently correct and still in b127). b126 2026-07-11 — real on-device test of b125 hit a genuine bug: a device's local config cache got poisoned by a garbled/non-JSON response somewhere on ITS network path (backend re-verified healthy via a direct live fetch), and every connect then failed inside the tunnel with sing-box's own "decode config" JSON errors while the server picker silently showed zero countries. Root cause: AppState.isUsableConfigPayload only did a contains("outbounds") substring check, which garbled-but-JSON-shaped garbage could still pass. Fixed to a real JSON parse + per-outbound type/tag check — no user-visible behavior change (a rejected payload still just falls through to "keep existing cached config", same as before). b126 is the build to test on-device now — b125 superseded (missing this fix; the ALREADY-poisoned cache on the device that hit this needs a reinstall or a clean-network refresh to actually clear, independent of the code fix). b125 2026-07-11 — ships the Fable code-quality audit (roadmap#now.audit_2026_07_11_fable_code_quality): Calm theme deleted (~700 lines), 2 verified bugs fixed (preflight skipped for country pins; expired-today showed as active), toggleVPN's 2 drifted connect paths + all 4 sign-in methods' persist step unified, dead code purged, AppState.swift split 2704→1713 lines into AuthSession/FallbackCoordinator/SupportDiagnostics. b125 is the build to test on-device now — b124 superseded (all the same fixes, just missing this batch). b124 2026-07-11 — fixed Poland/WAW exit showing raw "pl" instead of flag+name in the server picker (ConfigStore.countryDisplay was missing a "pl" entry); found via iOS Simulator re-verification of b123 ahead of App Store submission. b123 2026-06-21 — STALL detector now counts relay-dropped DNS failures ("use of closed network connection" to MSK :2097/:2099), found in a REAL on-device b122 log of a ~1-min "sites won't load": DNS-via-relay died 49× and the detector (matching only i/o-timeout) never fired -> no recovery. b123 fixes that so re-elect/nudge recovery triggers. NOTE: cert-cap hit during build (local dev builds maxed Apple Development certs) -> revoked 7 stale API certs -> rebuild signed OK -> assigned Internal Testers (verified). b122 prior — RU-DECOY-2ND (2nd clean-SNI decoy leg on SPB:8443 kills the RU sign-in SPOF) + per-leg auth telemetry. Built via CI (tag ios-build-122) off main, assigned to Internal Testers (verified). Verify on-device: RU sign-in works repeatedly; admin /events shows auth.attempt {leg}. b121 prior — RU-DECOY-FIRST. b120 fixed the FIRST sign-in (decoy clean-SNI leg) but the 2nd hung: the primary still emitted an api.madfrog.online ClientHello each attempt (MSK logged it 499), tripping RKN TSPU which then RST'd everything incl. decoy. b121 HOLDS the poisoning legs (primary+direct-IP) 2s behind the decoy — a sub-second decoy win cancels them while asleep, so ZERO filtered-SNI ClientHellos leave the device → TSPU never escalates → repeat sign-ins work. b114-120 superseded.
      # per-leg auth telemetry (app_events.properties->>'leg') exists but under-fires: only 3
      # events in 90 days field-wide (2 decoy, 1 primary) — see spb_relay.value_unproven in
