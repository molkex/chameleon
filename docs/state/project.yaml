# ── Are we going the right way? ─────────────────────────────────────────────
assessment: |
  MOSTLY on track, with one loud lesson. The 2026-06-26 Timeweb ams-1 outage
  took the WHOLE control plane down for hours with zero failover — the exact
  single-NL SPoF that ADR 0004 "accepted". That risk is no longer acceptable and
  is now being ACTIVELY closed: ADR 0012 (warm standby) + a real second host
  (OVH Warsaw) provisioned this session, an external off-Timeweb monitor live,
  GRA auto-renew fixed. Remaining redundancy work (Postgres replication, MSK
  upstream failover, the "Poland for all users" exit activation) is gated on NL
  coming back. Core product is healthy: auth identity (ADR 0010), SEC-01..04,
  France as a real 2nd exit, multi-exit telemetry. The honest watch-items now:
  (1) finish NL-RED-01 — redundancy is half-built, do not stop; (2) the
  2026-06-26 audit found the money-in HTTP HANDLERS (FreeKassa webhook, Apple
  verify, config) have zero handler-level tests despite the logic being tested —
  3 P1 items tracked; (3) 3 P1 security findings (cert-pin, token-leak-to-exit,
  /sub credential-in-URL) tracked. Tests are GREEN; docs split (0006) is correct,
  this session de-bloated + de-staled the state docs. Direction: forward, but
  redundancy + money-path test coverage are the two things to not let slip.
