# Storefront routing decision lives in decisions/0003-storefront-routing.md.
# Short version: RU/CIS storefronts → WebPaywallView (FreeKassa/SBP),
# everyone else → StoreKit. Driven by Storefront.current.countryCode,
# not Locale.
storefront_routing:
  storekit_route: non_cis_storefronts
  web_paywall_route: [RUS, KAZ, BLR, UZB, UKR, AZE, ARM, GEO, KGZ, TJK, TKM, MDA]

# App Privacy data types declared in ASC.
# Verified via Chrome MCP 2026-05-28 (App Privacy section).
# Public ASC API has no endpoint for this — must check web UI.
privacy:
  declared_data_types:
    contact_info:
      - Email Address      # linked, app_functionality
      - Name               # linked, app_functionality
    identifiers:
      - User ID            # linked, app_functionality
      - Device ID          # linked, app_functionality
    purchases:
      - Purchase History   # linked, app_functionality
    usage_data:
      - Product Interaction   # linked, analytics — covers EventTracker paywall.* / app.*
    diagnostics:
      - Other Diagnostic Data # linked, analytics+app_functionality — covers EventTracker vpn.connect.* + crash reports via Sentry (EU region, no PII)
  tracking_disclosed: false              # we don't share with 3rd parties for tracking
  notes: |
    "Other Diagnostic Data" covers two things:
      1. EventTracker app/vpn telemetry (USR-09 Phase 2, shipped 1.0.27).
      2. Crash reports via Sentry — EU region (de.sentry.io), no PII,
         sendDefaultPii=false, beforeSend scrubs user / queryString /
         device.name / serverName. See decisions/0007 + LAUNCH-03 in
         roadmap.yaml#done["2026-05-28"].
    Apple App Privacy classifies "Crash logs and other technical
    information" under "Other Diagnostic Data", so no new declared
    data type was required when LAUNCH-03 shipped.
  crash_reporting:
    vendor: Sentry
    region: EU (de.sentry.io, Frankfurt)
    dsn_storage: Info.plist key SENTRY_DSN (build-time inject, never committed)
    pii_disabled: true                # sendDefaultPii=false + beforeSend scrub
    session_tracking: false           # enableAutoSessionTracking=false
    performance_tracing: false        # tracesSampleRate=0
    scope: [MadFrogVPN (iOS), MadFrogVPNMac]   # NOT PacketTunnel (NE memory limits)
    reasoning_doc: decisions/0007-sentry-eu-crash-reporting.md
    shipped: 2026-05-28               # version target: build 91+
