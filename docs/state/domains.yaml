      status: RETIRED_2026-07-11 (was 85.239.49.28)
  - "crew.madfrog.online":
      status: RETIRED_2026-07-11 (was 85.239.49.28)
  - "speedtest.madfrog.online":
      status: RETIRED_2026-07-11 (was 85.239.49.28)
