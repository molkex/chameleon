# domains.yaml — DNS + SSL + CF state for owned domains.
#
# Update when adding/removing domains, switching CF proxy mode, or
# rotating certs.

verified: 2026-06-01

# Primary production domain.
madfrog.online:
  registrar: Cloudflare (mgmt) — confirm renewal date
  dns_provider: Cloudflare
  zone_active: true

  records:
    # Apex — public marketing landing + admin SPA + iOS app config endpoint.
    "@":
      type: A
      target_via: cloudflare_proxy
      origin: waw (217.182.74.70)    # ⭐ 2026-07-01: flipped NL→WAW (chameleon-nginx :80). Was nl (147.45.252.234) — NL stopped post-failover → CF 522. waw-web-up.sh reproduces.
      ssl_mode: flexible             # CF terminates, hits origin HTTP
    "www":
      type: A
      target_via: cloudflare_proxy
      origin: waw (217.182.74.70)    # 2026-07-01: flipped NL→WAW with apex

    # api subdomain — bypasses Cloudflare (NOT proxied) so RU users hit
    # MSK relay directly. CF wouldn't help anyway (RU CF throttling).
    "api":
      type: A
      target: msk_relay (217.198.5.52)
      target_via: direct_dns         # NO CF proxy — DNS-only
      origin: waw:8000 (via msk_relay nginx upstream)   # 2026-06-29 failover: was nl:80

    "grafana":
      type: A
      target_via: cloudflare_proxy
      origin: waw (217.182.74.70)    # 2026-07-01: flipped NL→WAW. chameleon-grafana :3000 behind chameleon-nginx grafana vhost. MON-04 stack on WAW (waw-monitoring-up.sh).

  ssl:
    edge_cert: Cloudflare Universal SSL
    origin: CF flexible → WAW:80 plain HTTP (no origin cert needed). Legacy NL Let's Encrypt cert unused for apex now.

# Legacy / backup / parked. Apex+www CF-proxied → WAW (2026-07-01); WAW nginx
# default_server serves the same landing/admin for any Host.
mdfrog.site:
  status: alias
  target: waw (217.182.74.70)      # 2026-07-01: was 162.19.242.30 (RETIRED DE) — served stale CF cache; now live WAW
  notes: backup short domain. msk1.mdfrog.site (pointed at retired legacy bot box
    85.239.49.28) DELETED 2026-07-11 — see legacy_subdomains below. Other sub-records
    (nl1/proxy/margin/de1/ru1) still point at old boxes — separate cleanup.

razblokirator.ru:
  status: legacy_alias
  target: waw (217.182.74.70)      # 2026-07-01: was 162.19.242.30 (RETIRED DE); now live WAW
  notes: old project name; kept so old QR codes keep working. msk1.razblokirator.ru
    (pointed at retired legacy bot box 85.239.49.28) DELETED 2026-07-11 — see
    legacy_subdomains below. Other sub-records still on old boxes — separate cleanup.

# Subdomains that WERE on retired infra (85.239.49.28) — RESOLVED 2026-07-11.
# All 5 DNS records (bot./crew./speedtest.madfrog.online + msk1.mdfrog.site +
# msk1.razblokirator.ru) deleted via Cloudflare API after confirming none are
# load-bearing (grepped the whole repo for references; bot.madfrog.online's own
# CF comment claimed "FreeKassa webhook when app migration is complete" but the
# live webhook is POST /api/webhooks/freekassa on the main domain per
# payment-providers.yaml — this subdomain was never actually wired up to it).
# The underlying box (legacy Telegram-bot MadFrog product, Marzban/Xray) was
# retired the same day — confirmed dead via direct user testing (4x /start over
# 3+ hours, zero replies) before decommission. Full backup taken first:
# ~/backups/madfrog-bot-legacy-2026-07-11/ (local, outside this repo).
legacy_subdomains:
