# runtime.yaml — what's running where in production.
#
# When deploy targets change, when a service is added or retired, update
# here first. backend/deploy.sh + docker-compose.yml are the actual
# moving parts; this file is the at-a-glance map.

verified: 2026-06-29

# WAW is the PRIMARY backend+DB since the 2026-06-29 failover (ADR 0013).
# NL (147.45.252.234) is now a streaming replica; its chameleon is STOPPED.
# See state/servers.yaml for the full mesh.

# --- PRIMARY ---
waw_217_182_74_70:
  os: Linux (Debian 12)
  ssh: debian@217.182.74.70
  install_path: /opt/chameleon
  docker_compose: infrastructure/failover/waw-backend-up.sh (custom bringup)
  role: PRIMARY backend + DB since 2026-06-29 failover

  containers:
    chameleon-failover:
      image: backend-chameleon:latest
      role: Go API backend (primary)
      ports: ["8000"]
      health: GET /health → 200
    chameleon-postgres-standby:
      image: postgres:16-alpine
      role: PROMOTED replica — now writable primary store
      note: was streaming replica of NL; promoted 2026-06-29 via pg_promote()
    redis:
      image: redis:7-alpine
      role: pub/sub + idempotency cache + magic-link tokens
    singbox:
      role: VLESS Reality on :443/tcp — waw1 VPN exit (Poland)
      image: sing-box-fork:v1.13.6-userapi

# --- REPLICA (was primary until 2026-06-29) ---
nl_147_45_252_234:
  os: Linux (Ubuntu)
  ssh: root@147.45.252.234
  install_path: /opt/chameleon
  docker_compose: backend/docker-compose.yml

  status: REPLICA since 2026-06-29; chameleon backend STOPPED; nl2 VPN exit DEACTIVATED (is_active=false)
  containers:
    chameleon:
      status: STOPPED (do not start; NL is read-only replica)
    chameleon-nginx:
      image: nginx + admin SPA bundle
      role: TLS termination + admin SPA (still serving static assets)
      ports: ["80:80", "443:443"]
      cert: Let's Encrypt for madfrog.online + api.madfrog.online
    chameleon-postgres:
      image: postgres:16-alpine
      volume: chameleon-pgdata
      role: streaming replica of WAW (~0.05 s lag); read-only
      backups: db-backup.sh (cron daily) → Backblaze B2 (still running on NL)
    chameleon-redis:
      image: redis:7-alpine
      volume: chameleon-redisdata
      role: idle (backend stopped)
    docker-socket-proxy:
      image: tecnativa/docker-socket-proxy
      role: MED-010 — still present
    singbox:
      role: nl2 VPN exit — DEACTIVATED (is_active=false in vpn_servers)
      image: sing-box-fork:v1.13.6-userapi
      config: /etc/singbox/singbox-config.json
    singbox-log-watcher:
      role: MON-06 — cron(*/1) Python parser of singbox logs
      output: /var/log/singbox-events.jsonl
    metrics-agent:
      role: node-level metrics (CPU/RAM/disk) → (backend stopped — writes failing)

  cron:
    "0 3 * * *":  db-backup.sh         # still running (replica backups are valid)
    "*/1 * * * *": singbox-log-watcher  # running but singbox is deactivated
    "*/5 * * * *": health-check.sh     # DISABLED after failover

# Russian-side relay (see state/servers.yaml#msk_relay).
# Not a docker host — bare nginx forwarder.
msk_217_198_5_52:
  ssh: root@217.198.5.52
  role: SINGLE API ingress — nginx upstream → WAW:8000 for api.madfrog.online traffic (was nl:80; updated 2026-06-29 failover)
  config_in_repo: NONE (modifications happen on-box)
  fronts: api.madfrog.online

# Secondary relay for blocked-NL-direct cases.
spb_185_218_0_43:
  ssh: root@185.218.0.43
  role: nginx tcp/stream + http forwarder → NL
  config_in_repo: infrastructure/spb-relay/
  forwards_to: nl:443 (former DE ports redirected post-2026-05-27)

# Misc external dependencies.
external:
  cloudflare:
    role: DNS for madfrog.online + proxy for landing/admin (NOT api subdomain)
    zone: madfrog.online
  backblaze_b2:
    role: off-host DB backup destination
    bucket: chameleon-pgdumps (verify name on B2 console)
  apple_asc:
    role: App Store Connect API access for releases / IAP / privacy
    key_id: 6HX3DA4P2Y                # see state/app-store.yaml
  freekassa:
    role: payment processor for web paywall (RU/CIS storefronts)
    integration: backend/internal/payments/freekassa
  telemetry:
    role: structured logs (zap) + Prometheus/Grafana (node + container metrics, MON-04-INFRA)
    crash_reporting: Sentry EU (iOS, shipped 1.0.27 build 90/91; decision 0007-sentry-eu)
    dashboards: grafana.madfrog.online (Prometheus + node-exporter on NL)
