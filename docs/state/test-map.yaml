# test-map.yaml — single source of truth for WHAT is tested, HOW it's verified,
# and WHERE the gaps are. One entry per module/package/service.
#
# WHY this file exists + the discipline around it: decisions/0009-test-map-and-coverage-discipline.md
# RULE: every code change updates this file. New code ships with a test, OR the gap
#       is logged to roadmap.yaml (next.testing) with a TEST-* id referenced here.
#
# status legend:
#   tested   — meaningful coverage of the module's core logic
#   partial  — pure/decision helpers pinned; orchestration/IO paths uncovered
#   untested — no test file references this module
#
# coverage_pct = `go test -cover` from the default (unit) run. "n/a" = not measurable
#   that way (integration-tagged → needs Postgres; or non-Go).

meta:
  updated: 2026-06-01
  verified_via: "go test ./... (green), audit 2026-06-01"
  scope: backend (Go) · apple (Swift iOS/macOS) · admin (React SPA) · infra (sing-box/scripts)

# ──────────────────────────────────────────────────────────────────────────
# HOW TO VERIFY EACH LAYER — the canonical commands. This is the gate.
# ──────────────────────────────────────────────────────────────────────────
verify:
  backend_unit:        "cd backend && go test ./... -count=1"                       # always runnable; currently GREEN
  backend_integration: "cd backend && go test -tags=integration ./... -count=1"     # needs Docker + Postgres (testcontainers); skips gracefully if absent
  backend_e2e:         "cd backend && go test -tags=e2e ./tests/e2e/..."            # needs `sing-box` binary in PATH
  backend_lint:        "cd backend && golangci-lint run"                            # errcheck/staticcheck/unused enabled (.golangci.yml)
  singbox_config:      "sing-box check -c <config.json>"                            # ON the server, BEFORE any iPhone test (CLAUDE.md rule)
  apple_build:         "cd clients/apple && xcodegen generate && xcodebuild build -scheme MadFrogVPN -destination 'generic/platform=iOS'"
  apple_note:          "iOS unit tests COMPILE but cannot RUN locally (app-group host crash in unsigned sim build). Verification = xcodebuild build. CI build/test step is graceful-skipped until TD-LIBBOX-FETCH (see TEST-IOS-CI)."
  admin:               "cd clients/admin && npm run test:run && npm run lint && npm run build"  # vitest (10 tests) + eslint + tsc/vite build

