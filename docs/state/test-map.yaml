# ──────────────────────────────────────────────────────────────────────────
# APPLE (Swift) — strategy: pure decision helpers extracted out of stateful
# types and pinned with regression tests tied to audit findings. Orchestration
# (live VPN lifecycle, StoreKit, auth coordinators, PacketTunnel, Views) is
# verified on-device, not in unit tests. Tests compile; can't run in sim (see verify.apple_note).
# ──────────────────────────────────────────────────────────────────────────
apple:
  models:
    VPNManager:        {status: partial, tests: [VPNManagerTimeoutTests, VPNManagerOnDemandRulesTests], covers: "raceWithTimeout (MED-006), buildOnDemandRules (LAUNCH-07)", gaps: "tunnel lifecycle / sendMessage — on-device only"}
    AppState:          {status: partial, tests: [AppStateFallbackTests, AcctIdentityTests, ProxyChainResolverTests], covers: "cascade fallback, shouldAnonReRegister (ACCT-IDENTITY P0), resolveChain", gaps: "1900-LoC orchestration not instantiated"}
    APIClient:         {status: partial, tests: [APIClientSensitiveFlagTests], covers: "raceLegPlan sensitive-payload gating (H-001/002)", gaps: "hedged-race networking, token refresh, retries"}
    ConfigStore:       {status: partial, tests: [AcctIdentityTests, MigrationLeafToCountryTests], covers: "identity persist/clear, leaf→country migration", gaps: "no dedicated test file (incidental coverage)"}
    PathPicker:        {status: tested, tests: [PathPickerTests], covers: "countryCode(forSelectedTag:), bestLeaf pin+filter"}
    PingService:       {status: partial, tests: [PingServiceTests], covers: "transportFor classifier, cache reads", gaps: "real socket probes not tested"}
    ServerGroup:       {status: partial, tests: [CountryFlagTests, +], covers: "flag→cc mapping (CountryGroup)", gaps: "ServerItem computed props untested"}
    EventTracker:      {status: tested, tests: [EventTrackerTests], covers: "actor queue: buffer/flush/keep-on-fail/persist"}
    SubscriptionManager: {status: untested, tests: [], gaps: "StoreKit 2 purchase/entitlement/restore = 0 tests. Revenue path → TEST-IOS-SUBMGR"}
    L10n:              {status: untested, tests: [], gaps: "localization lookups untested (StringUtils RU plural IS covered)"}
    auth_coordinators: {status: untested, tests: [], gaps: "AppleAuthCoordinator, GoogleAuthCoordinator → TEST-IOS-AUTH (covered indirectly by backend)"}
  shared_well_covered:
    - ConfigSanitizer (ConfigSanitizerTests)
    - SingBoxConfigPatcher, LastWorkingLegStore, LeafRankingStore, RoutingMode
    - StringUtils (RU pluralisation), KeychainHelper (XCTSkip in sim)
    - VPNControlIntents, CountryFlag, CrashReporter (sanitize), DisconnectNotifier
    - TrafficHealthMonitor, ServerTagShape
  untested_surfaces:
    - PacketTunnel/* (ExtensionProvider, ExtensionPlatformInterface, RealTrafficStallDetector, TunnelStallProbe) — extension, on-device only
    - Views/* (20 files) — no UI tests
    - CommandClient, Theme/ThemeManager/Haptics, LegRaceProbe, NetworkFingerprint
  test_files_count: 23
  ci_status: "graceful-skipped — Libbox fetch missing (TD-LIBBOX-FETCH / TEST-IOS-CI). Tests are compile-time aspiration until wired."

# ──────────────────────────────────────────────────────────────────────────
# ADMIN SPA (React 19) — NO test framework, NO tests. Only safety net = eslint + tsc.
# ──────────────────────────────────────────────────────────────────────────
admin:
  framework: none
  tests: 0
  safety_net: "npm run lint (eslint flat config, react-hooks strict) + tsc -b type-check"
  gap: "zero automated tests; add vitest + smoke tests for critical pages (dashboard, users, payments) → TEST-ADMIN-SPA"

# ──────────────────────────────────────────────────────────────────────────
# INFRA / config — verified by tooling, not unit tests.
# ──────────────────────────────────────────────────────────────────────────
infra:
  singbox_config: "sing-box check -c (e2e test TestSingboxCheckMinimalConfig + manual on-server before iPhone)"
  health_scripts: "backend/scripts/health-check.sh + singbox-watchdog regression test (MON-03)"
  deploy: "playbooks/deploy-nl.md — deploy.sh nl --no-deps; sing-box check gate before reload"

# ──────────────────────────────────────────────────────────────────────────
# OPEN COVERAGE GAPS — mirrored as TEST-* items in roadmap.yaml#next.testing.
# Priority by blast radius (money/auth/live-provisioning first).
# ──────────────────────────────────────────────────────────────────────────
gaps_by_priority:
  P1:
    - {id: TEST-APPLE-IAP,   what: "payments/apple — rejection gate DONE 2026-06-01 (52%); REMAINDER = post-parse invariants + happy path (needs sandbox JWS or applyInvariants seam)"}
    - {id: TEST-AUTH-CREDS,  what: "auth password.go + google.go + RequireAdmin — 0 tests on credential path"}
    - {id: TEST-IOS-SUBMGR,  what: "SubscriptionManager StoreKit2 — 0 tests on revenue path"}
    - {id: TEST-ADMIN-SPA,   what: "admin SPA has no test framework — add vitest + smoke tests"}
  P2:
    - {id: TEST-FREEKASSA,   what: "freekassa client.go IPAllowed + paymentid.go ParseAppPayment"}
    - {id: TEST-VPN-ENGINE,  what: "vpn engine.go + userapi.go + stats — live user provisioning at 0%"}
    - {id: TEST-IOS-CI,      what: "wire TD-LIBBOX-FETCH so apple tests actually build+run in CI (currently skipped)"}
