  - number: 72
    version: "1.0.26"
    date: 2026-05-14
    track: app-store          # submitted to App Store review (not just TestFlight)
    asc-build-id: 58189b41-aef7-4387-8b8c-2e672362e9e3
    archive-path: /tmp/MadFrogVPN-build72.xcarchive
    field-verified: false
    notes: |
      App Review reject fix — Guideline 2.1(a), "Sign in with Apple
      button unresponsive" (incident 2026-05-14-app-review-siwa-
      unresponsive). v1.0.26 had been rejected ~4 times for this since
      build 51. Root cause: OnboardingView.appleSignInButton wrapped the
      native SignInWithAppleButton in a `.simultaneousGesture(TapGesture)`
      that both swallowed the UIKit control's own touchUpInside AND set
      `isAuthInFlight`, which the `.disabled(... || isAuthInFlight)`
      wrapper latched — a self-disabling trap. build 72 uses
      SignInWithAppleButton plainly: gesture removed, `.disabled`
      decoupled from isAuthInFlight. iOS-only, libbox unchanged from
      build 60. Attached to v1.0.26, resubmitted (reviewSubmission
      55f7cc73-20b2-4bed-8a1c-68411303e15d).

  - number: 71
    version: "1.0.26"
    date: 2026-05-14
    track: testflight-internal
    asc-build-id: 3741178f-98c6-4fb6-a6ec-ffc7054a0e16
    phases: [launch-04b-control-widget]
    archive-path: /tmp/MadFrogVPN-build71.xcarchive
    field-verified: false
    notes: |
      launch-04b polish — three field-feedback fixes on the widgets:
      (1) Responsiveness: ToggleVPNIntent now writes the requested state
      to the App Group optimistically (before the tunnel finishes coming
      up/down) + reloads timelines, so the widget flips the instant the
      user taps — instead of waiting for the extension's iOS-budget-
      throttled reload. ExtensionProvider stays the source of truth and
      corrects it if the real outcome differs.
      (2) Affordance: the systemSmall shield is now a filled circular
      button (green when connected, grey when off) — a bare SF Symbol
      didn't read as tappable.
      (3) Uptime: WidgetVPNSnapshot gained connectedAt (from the
      vpnConnectedAtKey timestamp); systemSmall + accessoryRectangular
      show a live Text(_, style: .timer) — ticks with no timeline
      reload. iOS-only, libbox unchanged from build 60.

  - number: 70
    version: "1.0.26"
    date: 2026-05-14
    track: testflight-internal
    asc-build-id: 4398fbac-e1b3-4477-acbf-eb8dfd74716c
    phases: [launch-04b-control-widget]
    archive-path: /tmp/MadFrogVPN-build70.xcarchive
    field-verified: false
    notes: |
      launch-04b fix — widget visual sync. Field test of build 69:
      toggling the VPN from the widget worked, but the widget didn't
      visually update until the app was opened. Root cause:
      vpnConnectedAtKey (the App-Group key WidgetVPNSnapshot reads) and
      WidgetCenter.reloadAllTimelines() were only driven by the app's
      handleStatus() — and the app isn't running on a widget-triggered
      toggle. Fix: ExtensionProvider (the one process that always runs
      on a VPN state change) now publishes vpnConnectedAtKey + reloads
      the timeline on start/stop/failure — publishWidgetState(connected:).
      PacketTunnel gained WidgetKit.framework; calls are #if os(iOS).
      iOS-only, libbox unchanged from build 60.

