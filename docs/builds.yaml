    field-verified: false
    notes: |
      Phase 1.D — penalty-aware fallback inside extension. Adds
      OutboundPenaltyStore (Shared/) + OutboundGroupTracker
      (PacketTunnel/, persistent CommandClient subscribed to group feed).
      TunnelStallProbe.nudgeUrltestGroups rewritten to penalise the
      currently-selected outbound on STALL streak and selectOutbound
      to pin a non-penalised peer — bypasses urltest's small-probe
      re-election that put the throttled leaf back in service.
      Libbox unchanged from build 60.

