      title: Adding a NEW country needs an app build (3 hardcoded country tables)
      priority: P2   # was P1 — selection half done
      status: selection-done   # 2026-06-03 (f0263cd): PathPicker.countryCode now derives cc from flag/bare-cc → new-country ROUTING selection sticks with no build. REMAINING (cosmetic): derive the group LABEL flag + a RU country name for new ccs (ConfigStore.countryDisplay + backend clientconfig.go) so picker shows "🇪🇸 Испания" not "es" — needs the name-source decision (x/text RU vs DB column vs bundled ISO table).
