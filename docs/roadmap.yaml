  security:
    - id: BE-01a-Phase-2-iOS
      title: appAccountToken passed in StoreKit Product.PurchaseOption
      status: backend_ready
      notes: Backend extracts + telemeters. iOS side adds UUID5(user_id). Strict-reject after ≥95% adoption.
