      title: "Self-heal туннеля после oom-killer 'resetting network' (никто не переподнимает)"
      priority: P1
      pain: "#2 re-enter-app"
      effort: M
      build: true
      status: implemented_compile_verified   # macOS BUILD SUCCEEDED 2026-06-17; on-device verify pending
      files:
