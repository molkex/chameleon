        macOS made config-fetch silently no-op (stale-config-for-9-days) AND showed the
        trial/onboarding screen. CFG-01 drops to P2 (remaining: UI surfacing + staleness guard).
        Shipped on TestFlight in 1.0.30 b102; pending on-device confirm.
        Follow-up: backfill authProvider/appleUserID for legacy Apple accounts
        (12351 lacks them ⇒ no anti-demote gate / silent reauth on Mac).
