  protocols:
    - id: PROTO-01
      title: Honest health signal for UDP legs (Hysteria2/TUIC) in node list
      priority: P1
      notes: |
        Node-list ping for UDP legs is a host-side QUIC HANDSHAKE probe — shows
        ~52ms even when RKN throttles bulk to zero (false "works" green). Industry
        (Hiddify/Karing/sing-box) measures latency via a real HTTP request THROUGH
        the outbound (urltest), which auto-drops a throttled node. Fix: run a short
        through-tunnel urltest in the NE on-demand, OR stop labeling raw handshake
        RTT as health for UDP (neutral/greyed). Client change → app release.
    - id: PROTO-02
      title: Hysteria2 port-hopping for resilience
      priority: P2
      notes: |
        If RKN starts throttling obfuscated UDP/443 too: server_ports ["20000:50000"]
        + hop_interval 30s on client, iptables REDIRECT range→443 on NL. Habr: less
        effective in RU than CN (TSPU is pattern-based) — pair with Salamander.
    - id: PROTO-03
      title: ADR — protocol selection (validate-UDP, Reality-first, Salamander)
      priority: P3
      notes: Capture 2026-05-29 decisions as decisions/00NN-*.md (append-only ADR).

