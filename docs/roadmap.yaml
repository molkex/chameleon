    - id: SUPPORT-CHAT
      title: Customer support chat (help desk, not team chat)
      priority: high
      status: design_done_awaiting_decision
      re_requested: 2026-05-31   # user asked again, specifically wants IN-APP messaging
      open_fork: |
        User (2026-05-31) wants an in-app "messages with support" system. Two routes:
          A) Chatwoot (existing design below) — embed the web widget in-app; omnichannel
             (web + Telegram + email), but needs a VPS (~€4.5/mo) + external service.
          B) NATIVE in-app messaging — own support_threads/support_messages tables +
             mobile API (send/list, unread badge, push on reply) + a chat screen in the
             app + a reply inbox in the admin SPA. No external infra, fully on-brand,
             privacy-clean (we host it), reuses existing auth + APNs. More dev (~iOS
             screen + 2 endpoints + admin page), no monthly cost. Fits the privacy-brand
             rationale that drove us away from SaaS in the first place.
          C) Telegram deep-link fallback (fastest, zero build) — kept as interim.
        DECISION NEEDED from user before building. If B, file an ADR superseding the
        Chatwoot lean in the decision text below.
      decision: |
        Picked Chatwoot self-hosted on a dedicated Hetzner CX22 (4 GB/2vCPU,
        ~€4.5/mo) over: SaaS (Intercom/Tawk = US servers, bad for a VPN
        privacy brand), Rocket.Chat/Mattermost (team-chat tools, wrong
        category), FreeScout (cheaper but live-chat is a paid addon + dated
        UX). Chatwoot is omnichannel — web widget + Telegram bot + email all
        land in one inbox. Do NOT self-host on NL: it's 1.9 GB and already
        swapping; Chatwoot needs 2-4 GB.
      synergy: |
        The same CX22 box can later double as NL-RED-01 (Hetzner Helsinki
        redundancy) — amortizes the cost. Keep the existing @MadFrogRobot
        Telegram bot, wire it as a Chatwoot channel rather than replacing it.
      blocked_on: user approval to provision + pay for the VPS
      next_steps:
        - Provision Hetzner CX22 (Helsinki region → also serves NL-RED-01)
        - Chatwoot via docker-compose + nginx + chat.madfrog.online (CF DNS)
        - Connect @MadFrogRobot as a Telegram inbox channel
        - Embed web widget in iOS app + landing
      fallback: |
        If user wants $0/fast instead: in-app "Support" button deep-links to
        the Telegram bot. ~1-2 days, zero infra. Measure volume first, build
        Chatwoot only if Telegram becomes unwieldy.

