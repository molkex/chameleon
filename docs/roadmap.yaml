    - id: AUTH-RKN-DIRECT-IP
      title: "Sign-in races the cert-validated direct-IP legs (fixes 'не получилось войти')"
      status: committed_rides_1.0.32   # client-only; ships with next build
      priority: P0   # the refund-causing login failure
      files:
        - clients/apple/MadFrogVPN/Models/APIClient.swift               # raceLegPlan(sensitive:) allows direct-IP TLS
        - clients/apple/Tests/UnitTests/APIClientSensitiveFlagTests.swift  # post-H-002b invariant
      commits: [3c44fc0]   # supersedes df5a5ff (CF-apex hedge, reverted)
      notes: |
        NOT an RKN IP block (user corrected this) — it's the DOCUMENTED
        Cloudflare-SNI-filter / single-path-stall class (feedback_cloudflare_ru,
        project_ios_network_race): a single path's TLS handshake stalls in RU and
        the request hangs ~minute = "infinite loading" / login timeout
        (`networkError "Превышен лимит времени"`, seen in a Mac diag log;
        login only completed after the user enabled ANOTHER VPN). The documented
        fix is "race direct IPs, never trust a single path" — which non-sensitive
        requests already do, but SIGN-IN did NOT.
        ROOT CAUSE: raceLegPlan(sensitive:) zeroed ALL fallback legs (build 87,
        H-001/H-002). But H-002 was CLOSED by H-002b (build 89): DirectConnection
        now fully validates the cert chain vs the SNI (SecPolicyCreateSSL +
        SecTrustEvaluateWithError). The sensitive direct-IP skip was never
        un-done → stale. Verified live: NL:443 AND SPB:443 serve the auth API with
        a VALID Let's Encrypt cert for api.madfrog.online (ssl_verify=0, ~0.5s).
        FIX: sensitive now keeps skipping HTTP:80 cleartext (H-001 holds — no
        Bearer over plaintext) but RACES the cert-validated direct-IP TLS legs.
        api.madfrog.online stalls → login completes via NL/SPB in ~0.5s. No
        Cloudflare added (an earlier apex-hedge attempt, df5a5ff, was the wrong
        direction — CF is the stalling path — and was reverted). MITM-safe.
        WHY IT REGRESSED RU users: same single-path fragility that bit guest
        sign-in historically (the 2026-04 CF-race work).
        REACH: rides 1.0.32, BLOCKED until 1.0.31 clears review — blocked on the
        USER updating the ASC App Privacy nutrition label.
        INTERIM workaround (no build): enable any other VPN → sign in once →
        disable it; session+config then cache.

