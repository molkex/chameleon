      notes: |
        Endpoint: GET /metrics (outside auth chain; :8000 is 127.0.0.1-bound).
        Library: github.com/prometheus/client_golang v1.23.2.
        Registered metrics (all label cardinality bounded — see *_Bounded tests):
          live-vpn:
            - chameleon_vpn_users_online (gauge)
            - chameleon_vpn_throughput_bytes_total{direction=rx|tx} (counter)
            - chameleon_vpn_tcp_retransmit_total (counter)
            - chameleon_vpn_tcp_segments_sent_total (counter)
            - chameleon_vpn_active_connections (gauge)
          funnel:
            - chameleon_signups_total{provider=apple|google|device|telegram|email|other} (counter)
            - chameleon_payments_total{source=apple_iap|freekassa|admin|other, status=completed|pending|failed|refunded|other} (counter)
            - chameleon_app_events_total{name=<whitelist>|other} (counter)
            - chameleon_dau_users (gauge, refreshed 60s)
          backend:
            - chameleon_http_request_duration_seconds{method,route,status_class} (histogram, route=c.Path())
            - chameleon_db_query_duration_seconds{operation=SELECT|INSERT|UPDATE|DELETE|other} (histogram)
            - chameleon_redis_cache_hit_total{op} (counter)
            - chameleon_redis_cache_miss_total{op} (counter)
          system: default GoCollector + ProcessCollector (go_goroutines, go_memstats_*, process_*).
        Two background goroutines from main.go (15s vpn refresh + 60s DAU)
        clean-shutdown on ctx cancel. Counter increments wired at:
          - signups: mobile/auth.go (device+apple), auth_google.go, auth_magic.go
          - payments: subscription.go (apple_iap), payment_webhook.go (freekassa)
          - app events: events.go (per accepted event row)
          - cache hit/miss: middleware/idempotency.go (op="idempotency")
