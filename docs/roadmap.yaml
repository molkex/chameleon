  - id: TD-LINT-01
    title: golangci-lint full set (errcheck / staticcheck / unused)
    status: deferred
    surfaced: 2026-05-28
    findings: ~22 pre-existing
    breakdown:
      errcheck: 9    # mostly defer resp.Body.Close() / defer f.Close()
      staticcheck_deprecations: 8   # redis.SetNX, echomw.TimeoutWithConfig, grpc.DialContext
      staticcheck_style: 3          # QF1008 embedded field, S1011 loop→append, QF1001 De Morgan
      unused: 2                     # configBuildMarker const, v2rayStatsClient.close method
      sa4000_real_bug: 1            # auth_blacklist_key_test.go:52 identical expressions
    current_config:
      file: backend/.golangci.yml
      enabled: [govet, ineffassign, unconvert, misspell]   # conservative; extend after cleanup pass

  - id: TD-LINT-02
    title: react-hooks 7.0.1 strict rules
    status: warn_only
    surfaced: 2026-05-28
    findings:
      react_hooks_set_state_in_effect:
        - clients/admin/src/pages/users.tsx:133
        - clients/admin/src/pages/audit.tsx:60
        - clients/admin/src/pages/settings.tsx:43
      react_hooks_purity: 1   # Math.random() in useMemo somewhere — placeholder data
    fix_approach: |
      Refactor each useEffect(() => setPage(1), [filters]) into event-handler-driven state reset.
      React 19 docs explain the canonical pattern.

  - id: TD-LIBBOX-FETCH
    title: Wire scripts/fetch-libbox.sh
    status: workaround_in_place
    notes: |
      iOS CI workflows currently graceful-skip when fetch-libbox.sh is absent.
      ~494 MB framework lives in git-ignored Frameworks/. To re-enable
      CI link-time coverage, script must pull a built xcframework
      (artifact storage TBD).

  - id: TD-DE-PRUNE
    title: Remove 162.19.242.30 from iOS AppConfig.directBackendIPs
    file: clients/apple/Shared/Constants.swift
    surfaced: 2026-05-28
    notes: DE retired; pruned from RU race via region carveout, but still in pool. Remove on next build.

