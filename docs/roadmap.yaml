        real demote — keychain (device_b6f01ebb/12351), app-group UD
        (subscriptionExpire 2026-06-15) and NL DB (auth_provider=apple, paid) all
        agreed on the paid account. `GroupContainersAlias` is just a symlink →
        `Group Containers` (red herring).
        Root cause: KeychainHelper used a plain generic-password item with NO
        access group / NO data-protection keychain ⇒ on macOS items live in the
        legacy file keychain whose ACL is bound to the binary's code signature.
        Old build (38d, dev) → build 101 (different signature) ⇒ first read failed
        the ACL ⇒ username read nil ⇒ MadFrogVPNApp root gate showed OnboardingView
        (trial). initialize() does NOT anon-register on username==nil, so identity
        survived; recovered once keychain access was granted.
