        kSecAttrAccessGroup (99W3C374T2.com.madfrog.vpn.keychain) in KeychainHelper,
        with seamless legacy→DP dual-read MIGRATION so no existing user (iOS or
        macOS) is logged out. Entitlement keychain-access-groups added to the 2
        main-app targets only (extensions/widget never call the keychain).
        Type-check + plutil-lint green; full build = CI (Libbox not local).
        CLOSES roadmap CFG-01b (P0, macOS keychain-access-groups missing, from the
