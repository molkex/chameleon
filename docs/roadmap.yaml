    - id: RU-RATELIMIT-BUCKET
      title: "[FALSE FINDING] Relay source-IP схлопывает всех RU в один bucket"
      priority: P1
      status: verified_non_issue   # 2026-06-17 measured on the boxes
      finding_2026_06_17: |
        DISPROVEN by inspecting the live boxes. The audit agent only saw MSK nginx and missed NL's.
        Reality: MSK nginx DOES set X-Forwarded-For + X-Real-IP (sites-available/api.madfrog.online:16-17),
        and NL's chameleon-nginx has set_real_ip_from for BOTH relays (217.198.5.52 MSK, 185.218.0.43 SPB)
        + real_ip_header X-Forwarded-For + real_ip_recursive on (conf.d/default.conf:42-52). So the XFF
        chain is walked to the REAL client and the rate-limiter (echo.ExtractIPFromXFFHeader, server.go:80)
        keys per-real-client-IP — relay traffic is NOT collapsed into one bucket. No fix needed.
