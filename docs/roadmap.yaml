    - id: UI-FLAG-HOME
      title: Home card shows 🌍 instead of country flag when a country is selected (AUTO)
      priority: P1
      effort: small
      files:
        - clients/apple/MadFrogVPN/Views/MainViewNeon.swift
        - clients/apple/MadFrogVPN/Views/MainViewCalm.swift
      root_cause: |
        MainViewNeon.selectedServer (:208) looks up a LEAF ServerItem by exact tag;
        when the user picked a COUNTRY (AUTO leg) no leaf matches → nil → flagEmoji
        falls back to 🌍 (:226). The NAME resolves fine via the country path
        (selectedServerName → group.countries, MainView.swift:220). Fix: resolve the
        flag through the same country path as the name. MainViewCalm uses SF symbol
        "globe" (:268) — separate but same idea.
      risk: low (display only, no deploy). Ships with next iOS build.

    - id: FR-SELECT
      title: 'Tapping 🇫🇷 fr in the picker reverts to Auto (selection won''t stick)'
      priority: P1
      effort: small
      reported: 2026-05-31
      finding: |
        NOT a backend bug (corrected 2026-05-31). Backend already emits the France group
        with tag "🇫🇷 Франция" (clientconfig.go countryDisplay("fr"):368, verified live).
        The bug is iOS-side: on tap the picker stores the bare cc "fr" as selectedServerTag,
        and PathPicker.countryCode(forSelectedTag:"fr") only knows the display-name forms →
        returns nil → resolves to "any leg" = Auto. Same root as UI-FLAG-HOME. iOS fix
        (Phase B / app build): recognise the cc/flag tag forms in PathPicker + store the
        display tag. GRA-PARITY (France actually carrying traffic) is now RESOLVED, so once
        the picker sticks, 🇫🇷 works end-to-end.
      depends_on: SRV-DYNAMIC (derive cc/flag both sides; ships in the iOS build)

    - id: SRV-DYNAMIC
      title: Adding a NEW country needs an app build (3 hardcoded country tables)
      priority: P1
      effort: medium
      files:
        - backend/internal/vpn/clientconfig.go            # countryDisplay :52
        - clients/apple/MadFrogVPN/Models/PathPicker.swift # countryCode(forSelectedTag:) :188
        - clients/apple/MadFrogVPN/Models/ServerGroup.swift # ServerItem.flagEmoji :33
      finding: |
        New server in an EXISTING country (NL/DE/FR/US/RU) = DB row + backend restart,
        NO new build — client refetches /api/v1/mobile/config (AppState.refreshConfig).
        Only a NEW country needs a build, because flag + RU name are hardcoded in 3
        places. CountryGroup (ServerGroup.swift:165+) already derives flag/name from
        the tag with no list — extend that pattern everywhere.
      approach: |
        Derive flag emoji from the ISO-2 code (regional-indicator math) on both
        sides; country name from golang.org/x/text (RU locale) or a DB column. iOS
        PathPicker: derive cc from the flag emoji already in the country tag (reverse
        math), keep ru-spb as the one explicit special-case. → new country = DB row
        only, forever, no build.
      risk: medium — PathPicker is the route-selection core. Per-function unit tests
            + sing-box check on the generated config + NL deploy.

