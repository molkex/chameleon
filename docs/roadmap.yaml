        applyServerSelectionIfLive used the STRICT resolveSelectionChain (empty on any transient/flat
        live config) and then NUKED the persisted pin → Auto. Now uses the forgiving chainOrFallback
        (country label → best leaf), and the reset is gated by a pure shouldResetStaleSelection: reset
        ONLY when the config genuinely has servers but none match (a retired country — build-85 DE case);
        a transiently-empty/unavailable config KEEPS the pin and lets the next refresh reconcile.
        Unit-tested the decision.
