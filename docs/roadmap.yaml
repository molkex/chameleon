    - id: LAUNCH-08
      title: Disconnect notification on OS-initiated drops (UNUserNotificationCenter)
      pr: 11
      files:
        - clients/apple/MadFrogVPN/Models/DisconnectNotifier.swift
        - clients/apple/MadFrogVPN/Models/AppState.swift
        - clients/apple/MadFrogVPN/MadFrogVPNApp.swift
        - clients/apple/Shared/Constants.swift
        - clients/apple/Tests/UnitTests/DisconnectNotifierTests.swift
      notes: |
        Pure-decision DisconnectNotifier.decide(prev,next,snapshot,live,active)
        gates on .connected→.disconnected (or via .disconnecting). Suppressed
        when (a) userInitiatedDisconnect=true at the .disconnecting edge —
        snapshot captured to survive a fast reconnect resetting the live
        flag — (b) app is foreground — (c) handshake failure (.connecting →
        .disconnected). Authorization requested once on first successful
        connect; AppNotificationDelegate posts .vpnReconnectRequested when
        the "Reconnect" action fires, scene observer routes to AppState.toggleVPN().
    - id: LAUNCH-11
      title: Manual per-server ping in server picker (per-row button + "Ping all" toolbar)
      pr: 12
      files:
        - clients/apple/MadFrogVPN/Models/PingResult.swift
        - clients/apple/MadFrogVPN/Models/PingService.swift
        - clients/apple/MadFrogVPN/Views/MainView.swift
      notes: |
        New PingStatus enum (idle / measuring / success / failed) layered on
        top of the existing PingService cache. probeSingle(server) and
        probeManualAll(servers) run best-of-3 sequential probes with 200 ms
        gaps; minimum non-zero RTT wins. UI state machine in CountryServersView:
        idle+cached → badge + ↻, idle+empty → "Ping" CTA, measuring → spinner,
        success → badge + ↻, failed → "—" with red dot. "Ping all" toolbar
        button next to the config-refresh button — separate so users can
        re-measure without hammering backend. VPN-up case handled by the
        existing prohibitedInterfaceTypes=[.other] bypass in measureTCP /
        measureQUIC — probes never go through the tunnel.
    - id: LAUNCH-12
      title: uTLS fingerprint rotation — per-user deterministic, market-share weighted (chrome 65% / safari 20% / firefox 10% / edge 5%)
      pr: 13
      decision_ref: decisions/0008-utls-fingerprint-rotation.md
      files:
        - backend/internal/vpn/clientconfig.go
        - backend/internal/vpn/clientconfig_fingerprint.go
        - backend/internal/vpn/clientconfig_test.go
        - backend/internal/vpn/singbox.go
      notes: |
        FNV-1a(user.Username) mod 100 → bucket. Same user always gets the
        same fingerprint (reconnect-stable, debuggable). Only "real browser"
        values emitted (chrome/safari/firefox/edge); excludes ios/android/
        360/qq/random to keep the population shape close to real RU HTTPS
        traffic. New INFO log line in SingboxEngine.GenerateClientConfig
        ("clientconfig generated" user_id=… utls_fingerprint=…) for
        post-deploy correlation. No client change required — iOS picks up
        the new fingerprint on next /config fetch.
