  metrics:
    - id: TRAFFIC-MULTIEXIT
      title: Per-user traffic only counted on the NL exit — GRA/relay users show ~0 in admin
      priority: P2
      reported: 2026-06-01
      example: device_3edb3891 (папа, apple, sub→2027) — cumulative_traffic=527KB while actively using VPN
      root_cause: |
        Per-user traffic comes from the LOCAL NL sing-box v2ray_api gRPC StatsService
        (stats_v2ray.go QueryStats "user>>>"). Traffic that exits via GRA (France) or
        the MSK/SPB relays flows through THOSE sing-box instances, not NL's → never
        aggregated → the user's real usage isn't counted. Only the NL-exit slice shows.
      fix_directions: |
        Collect per-user stats from EVERY exit/relay sing-box (each already exposes a
        v2ray_api / user API — GRA:15380, MSK:15380) and SUM per vpn_username before
        writing cumulative_traffic. Or have each node push its deltas to the backend.
        First: confirm what the admin panel actually queries (cumulative vs period) —
        527KB may also just round to "0 MB".
      risk: low (read-only stats aggregation); needs a stats fan-out + dedupe by username.

