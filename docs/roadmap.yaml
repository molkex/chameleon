            file sink (stall detector still gets every line). Big memory + log-size cut.
        (3) ADR 0010 — identity-anchored accounts (industry-reviewed: RevenueCat/Apple/
            Mullvad): account anchor = identity (Apple/Google/email/appAccountToken), not
            device; trial per identity; device/IP gating only as supplementary fraud signal.
