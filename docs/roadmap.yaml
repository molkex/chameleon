        - clients/apple/PacketTunnel/RealTrafficStallDetector.swift  # oom-reset trigger (reuses recovery wiring)
        - clients/apple/PacketTunnel/ExtensionProvider.swift         # reason-aware onStall; SILENT recovery for oom
        - clients/apple/Tests/UnitTests/StallSignalsTests.swift      # oom parser tests
      done: |
        Built ON TOP of STALL-DNS-SIGNAL. The detector now recognises the oom-killer
        "memory pressure: critical … resetting network" line (StallSignals.isMemoryPressureReset) and
        fires the SAME re-elect/nudge recovery that dns/dial stalls use — so after the NE drops
