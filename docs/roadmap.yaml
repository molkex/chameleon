    # Phase 2 — reliability/infra (P1/P2)
    - id: EXIT-HEALTH-GATING
      title: "Health-gating выходов — троттленный GRA попадает в каждый конфиг, не отзывается"
      priority: P2   # downgraded after measurement
      pain: "#1/#2"
      effort: M
      build: false
      status: limited_value_see_note   # 2026-06-17 re-assessed
      reassessed_2026_06_17: |
        VANTAGE PROBLEM (measured): the felt failure is the RESIDENTIAL RU→FR throttle, which is
        invisible from NL AND from our datacenter relays (MSK/SPB curl to GRA & NL both ~50ms — verified).
        So a server-side health probe can't see what bricks the user, and would false-"healthy" GRA.
        The honest signal is the CLIENT (through-tunnel) — already shipped as STALL-DNS-SIGNAL (the client
        now detects the dead exit + re-elects). Server-side gating only catches HARD-DOWN nodes (process
        crash / box offline) — real but low-frequency. So this is now P2: a hard-down gate
