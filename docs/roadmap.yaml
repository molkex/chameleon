      title: "[SUPERSEDED] DNS-фолбэк для proxied-доменов — НЕ реализуем в sing-box 1.13"
      priority: P0
      pain: "#1 Instagram-not-loading"
      status: superseded_by STALL-DNS-SIGNAL
      finding_2026_06_17: |
        Investigated (docs + live probes). VERDICT: the audit's "add a fallback DNS server"
        is NOT buildable in sing-box 1.13 — dns.fallback/disable_fallback are gone and the
        evaluate/respond DNS actions that would express conditional fallback are 1.14+ (we're
        pinned to 1.13 for Xray compat). ALSO disproved server-side health-gating from our RU
        boxes: live curl from MSK+SPB showed GRA and NL EQUALLY reachable (connect ~50ms) —
        the RU→FR throttle is intermittent on residential/mobile paths our datacenter relays
        can't see, so gating from those vantages would false-"healthy". The only honest vantage
        is the client (urltest through the tunnel from the user's real network). → pivoted to
        STALL-DNS-SIGNAL.
    - id: STALL-DNS-SIGNAL
      title: "Детектор видит смерть DNS-через-прокси (инста не грузит → авто-уход с мёртвой ноги)"
      priority: P0
      pain: "#1 Instagram-not-loading + #2 re-enter"
      effort: M
      build: true   # client NE change; rides next build, on-device verify
      status: implemented_compile_verified   # macOS BUILD SUCCEEDED 2026-06-17; iOS test compiles in CI (no local sim)
      files:
        - clients/apple/Shared/StallSignals.swift                       # NEW pure seam (parse + decision), testable in MadFrogVPN target
        - clients/apple/PacketTunnel/RealTrafficStallDetector.swift     # +65 lines: independent DNS-stall trigger
        - clients/apple/Tests/UnitTests/StallSignalsTests.swift         # NEW: real log lines from the user's capture
      finding: |
        RealTrafficStallDetector (the only honest, in-tunnel recovery signal) was BLIND to the
        field's dominant failure: it ingested only "connection: open connection to … timeout"
        lines, but the user's log was dominated by "dns: exchange failed for …facebook.com …
        dial tcp 54.38.243.162:443: i/o timeout" (626×) — which carry no "open connection to"
        anchor, so nothing counted them and the detector never fired in the bricked-Instagram case.
      plan: |
        Added a high-confidence, INDEPENDENT DNS-stall trigger (StallSignals.dnsFailureDomain +
        dnsStallReached): ≥8 DISTINCT domains time out to resolve AND zero successful dials in the
        30s window → fire stall → existing re-elect/nudge recovery. Existing dial-timeout
        thresholds + logic untouched (zero regression risk). DNS failures are not ad-noise, so no
        meaningfulDownload suppressor needed.
      remaining: |
        Recovery-ACTION quality (nudge→urltest) is still limited when the user PINNED a dead
        country (Auto has nothing to fail to, by Build-42 design) → next layer is an actionable
        UX ("🇫🇷 недоступна — на Auto?"). On-device verification pending (rides a build).
    - id: AUTH-DIRECT-IP-INTERACTIVE
      title: "Direct-IP fallback для интерактивного входа (Apple/Google/magic-verify) — primary-only через CF"
      priority: P0
      pain: "#3 RU sign-in flapping"
      effort: M
      build: true
      status: implemented_compile_verified   # macOS BUILD SUCCEEDED 2026-06-17; on-device verify pending
      files:
        - clients/apple/MadFrogVPN/Models/APIClient.swift              # FallbackWinPolicy + fallbackLegWins + 3 sign-ins routed
        - clients/apple/Tests/UnitTests/APIClientWinPolicyTests.swift  # winner-rule truth table (build-53 guard)
      correction: |
        Audit said requestMagicLink was bare too — actually it already used
        dataWithFallback(sensitive:true). Only signInWithApple/signInWithGoogle/verifyMagicLink were
        bare session.data (deliberately — prior comments warned of the build-53 fallback-4xx-shadows-200 risk).
      done: |
        Did NOT globally change the race winner-rule (fetchAndSaveConfig RELIES on 404→re-register, and
        primary must stay authoritative). Instead added an OPT-IN FallbackWinPolicy: default .anyBelow500
        (unchanged for all existing callers); the 3 interactive sign-ins now race via
        dataWithFallback(sensitive:true, winPolicy:.definitiveAuthOnly) — a FALLBACK leg wins only on
        2xx/401, so a transport-mangled 4xx (raw-IP nginx 400 / torn TLS) can't shadow primary's 200
        (the exact build-53 fear). Primary leg untouched (wins on any <500). Pure fallbackLegWins seam
        unit-tested. VERIFY on-device: sign in from RU with Cloudflare stalled.
    - id: REFRESH-TOKEN-PERSIST
      title: "Сохранять rotated refresh-token + expires_at (детерминированный force-релогин ~раз/сутки)"
      priority: P0
      pain: "#2 re-enter-app (biggest measurable driver)"
      effort: M
      build: true
      spawned_task: task_cf453dc4
      anchor: APIClient.refreshAccessToken:723-744 (drops new refresh_token) + AppState.tryRefreshToken:773-785; backend rotates single-use (auth.go:460-516)
      plan: |
