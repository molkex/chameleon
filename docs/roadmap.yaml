  client_reliability:
    - id: CFG-01
      title: macOS config-fetch silently no-ops (username nil) + no staleness guard
      priority: P2   # was P1 — root cause (a) fixed
      status: root-cause-fixed
      remaining: |
        (a) keychain-access-group root cause → FIXED by KEYCHAIN-MACOS (data-protection
        keychain + kSecAttrAccessGroup + migration), shipped 1.0.30 b102 2026-06-03.
        STILL OPEN: (b) surface fetch failure in the picker instead of silent cache
        fallback; (c) staleness guard (config older than N hours warns / forces refetch).
      notes: |
        Found 2026-05-30 on the LIVE App Store build (1.0.27 / 90) running as
        iOS-app-on-Mac. Picker was frozen on a 2026-05-21 roster (retired DE, no
        France) for 9 days; the same build on iPhone was fine. Confirmed BOTH
        sides: singbox-config.json mtime stuck at 2026-05-21, and an NL-side
        log capture during a manual ↻ showed ONLY a telemetry POST
        (events/batch, UA "MadFrogVPN/90 ... Darwin/25.5.0") — the GET
        /api/v1/mobile/config NEVER reached the server. So fetchConfig() is
        never invoked: fetchAndSaveConfig() bails at `guard let username =
        configStore.username` because the "username" Keychain item isn't read
        in the iOS-on-Mac data-protection keychain context (the items exist in
        the login keychain instead). silentConfigUpdate() swallows it — zero UI
        signal, and a 9-day-old cache is treated as valid.
        Fix: (a) correct keychain-access-group / sharing so macOS reads the same
        creds (root cause); (b) surface fetch failure in the picker instead of
        silent cache fallback; (c) staleness guard — config older than N hours
        forces re-auth/re-register or at least warns. User workaround:
        reinstall the Mac app (clean keychain/container → re-register → fresh
        config with France).
    - id: LOG-01
      title: Cap / rotate tunnel singbox.log (unbounded growth)
      priority: P2
      status: fix_committed_rides_1.0.32   # size cap added 2026-06-06; ships in the next build
      notes: |
        Group-container singbox.log hit 4.3 GB (2026-05-30) / 565 MB (2026-06-06,
        a live Mac on build 101). PARTIAL FIX (build 99): writeLogs/writeMessage drop
        TRACE/DEBUG from the file sink. BUT writeDebugMessage was MISSED — it wrote
        EVERY libbox debug line to singbox.log via a raw, UNCAPPED FileHandle (the
        actual 565 MB firehose; that file is also AppState.readSingboxLogTail's
        diagnostic source, so it can't just be dropped). FIX (2026-06-06, committed,
        rides 1.0.32): writeDebugMessage now caps singbox.log at 4 MB, truncate-to-
        half reading ONLY the kept tail via FileHandle.seek (never loads the huge
        file into the ~50 MB NE budget). Pure offset helper TunnelFileLogger.
        truncationKeepOffset + unit test (TunnelFileLoggerCapTests). This also
        relieves the memory pressure behind 1.2 (oom-killer "resetting network" =
        the felt tunnel drops). tunnel-debug.log was already capped (2 MB).
        PART 2 (2026-06-06, commit 415555f): an iPhone log confirmed the drops are
        the oom-killer firing "memory pressure: critical, usage: 40 MiB, resetting
        network" ~every 5-6 min, and DEBUG was 37% of the volume because
        writeDebugMessage (unlike writeLogs/writeMessage after build-99) wrote
        EVERY libbox debug line to BOTH file sinks. Now it feeds the stall detector
        first, then drops TRACE/DEBUG (TunnelFileLogger.isVerboseSingboxLine,
        unit-tested) — keeping INFO+. Cuts the logging-driven churn behind the
        resets. Rides 1.0.32.
        STILL OPEN: (a) stderr.log (LibboxRedirectStderr, written C-side) has no
        Swift-side cap. (b) The 40 MiB ceiling is the iOS NE 50 MB hard cap — if
        resets persist after 1.0.32 + users update, the next lever is runtime
        memory (DNS cache size / concurrent-conn limits in clientconfig.go, or
        dropping DEBUG before the stall detector realizes the string). Tuning with
        on-device tests — not done blind.
    # CFG-01b (P0, macOS keychain-access-groups missing) → DONE 2026-06-03 (KEYCHAIN-MACOS). See done log.
