      title: Prometheus /metrics endpoint with 4-category instrumentation
      files:
        - backend/internal/metrics/metrics.go
        - backend/internal/metrics/metrics_test.go
        - backend/internal/api/server.go
        - backend/internal/api/mobile/routes.go
        - backend/internal/api/mobile/auth.go
