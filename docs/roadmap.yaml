  # Phase 0 (P0) lives in now#audit_2026_06_17_phase0. Items below cross-link existing roadmap ids where they overlap.
  audit_2026_06_17:
    # Phase 1 — features & костыли (P1)
    - id: EXPIRED-PAYWALL-ON-CONNECT
      title: "Истёкшая подписка → при коннекте показать paywall + сервер выселяет истёкшие UUID"
      priority: P1
      pain: "#5 user-requested feature + revenue leak"
      build: true   # client gate rides a build; server parts already deployed
      status: client_gate_implemented_compile_verified   # macOS BUILD SUCCEEDED 2026-06-17
      files:
        - clients/apple/MadFrogVPN/Models/AppState.swift          # mayConnect (pure) + isSubscriptionActive + requestToggle gate + ensureSubscriptionForConnect (2-stage reclaim)
        - clients/apple/MadFrogVPN/Views/MainView.swift           # PaywallRouter sheet on app.requestPaywall
        - clients/apple/MadFrogVPN/Views/MainViewCalm.swift       # PRO header/crown → isSubscriptionActive
        - clients/apple/MadFrogVPN/Views/MainViewNeon.swift       # PRO pill + strip text → isSubscriptionActive
        - clients/apple/Tests/UnitTests/AppStateConnectGateTests.swift  # mayConnect truth table
      done: |
        CLIENT (rides build): requestToggle now gates the CONNECT intent — if not active, it tries a
        2-stage reclaim (refreshConfig for cross-device pay, then StoreKit reconcileEntitlementsSilently)
        and only then presents the paywall (AppState.requestPaywall → MainView sheet), so a payer is
        never wrongly blocked; disconnect always allowed. Canonicalised the client "is active" check into
        AppState.mayConnect (pure, unit-tested) + isSubscriptionActive, replacing the 4 `subscriptionExpire
        != nil` sites that rendered an EXPIRED user as PRO. SERVER (already shipped in REFUND-NULL-EXPIRY-
        GATE, deployed): /config 403 carries {"code":"SUBSCRIPTION_EXPIRED"}; the roster (ListActiveVPNUsers)
        now excludes NULL/past expiry, so expired UUIDs ARE evicted (the chameleon restart on deploy
        re-syncs the allow-set).
      remaining: |
        (1) fetchAndSaveConfig 403-arm: client could set an explicit expired flag from the new code (today
        it relies on subscriptionExpire). Minor — gate already works via expiry/isPremium. (2) sync.go
        PERIODIC re-evict between deploys (so a mid-cycle expiry drops within minutes, not at next deploy) —
        separate server item.
    - id: REFUND-NULL-EXPIRY-GATE
      title: "NULL subscription_expiry канонизирован как 'нет покрытия' (закрыта утечка после рефанда)"
      priority: P1
      effort: S
      build: false   # server-deploy only
      status: implemented_built_tested   # go build + mobile unit tests green; awaiting deploy to NL
      files:
        - backend/internal/api/mobile/auth.go        # hasActiveSubscription predicate + ErrorResponse.Code + CodeSubscriptionExpired
        - backend/internal/api/mobile/config.go      # both gates use hasActiveSubscription (reject nil) + machine-readable code
        - backend/internal/db/users.go               # ListActiveVPNUsers roster: drop `IS NULL OR`, strictly `> NOW()`
        - backend/internal/api/mobile/subscription_active_test.go   # predicate unit test
        - backend/internal/db/users_expiry_filter_test.go           # roster now EXCLUDES NULL-expiry
      done: |
        ROOT was a semantic conflict: the VPN roster (ListActiveVPNUsers) + its test treated NULL
        expiry as "lifetime, include", while shouldGrantTrial, credit.go's revoke comment, and the
        roster's OWN doc-comment treat NULL as "no coverage". So refund set NULL expecting access
        revoked, but the roster kept the user in sing-box's allow-set (revenue leak). Measured on
        prod: exactly 1 user (363 total) in NULL+creds+active state — a 0-payment expired-trial
        account, no paying user affected. Resolved by canonicalising NULL = no coverage: extracted
        ONE predicate hasActiveSubscription (expiry != nil && future), used by both /config gates;
        roster query now strictly `subscription_expiry > NOW()`. Also delivers the EXPIRED-PAYWALL
        backend signal — /config 403 now carries {"code":"SUBSCRIPTION_EXPIRED"} so the client routes
        to the paywall without string-matching (the client connect-gate part still rides a build).
      remaining: "EXPIRED-PAYWALL client connect-gate (AppState.requestToggle) + sync.go periodic re-evict timing — separate items."
    - id: SSE-CHATTOKEN-REMINT
      title: "Чат поддержки молча умирает — 10-мин SSE-токен не перевыпускается на reconnect"
      priority: P1
      pain: "#4 support-chat unclear + #2 re-enter"
      effort: S
      build: true   # re-bundle widget (bundled in the app)
      status: implemented_js_syntax_verified   # node --check OK 2026-06-17; on-device e2e pending
      files:
        - clients/widget/index.html   # own the reconnect (close + re-mint token + backoff) + visibilitychange re-open
      done: |
        openStream() already re-fetched a fresh chat-token every call, but onerror relied on
        EventSource's BUILT-IN retry which reuses the SAME URL → after the 10-min token TTL every
        retry 401s and the chat silently dies. Now onerror closes the stream and drives reconnection
        ourselves via openStream() (fresh token) with exponential backoff (1s→30s cap, reset on
        onopen); a chat-token fetch failure also schedules a retry; and visibilitychange→visible
        re-opens a dead stream promptly. JS syntax-checked (node --check).
