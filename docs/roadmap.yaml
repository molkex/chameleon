tech_debt:
  - id: LIBBOX-MAC-STRUCT
    title: libbox build emits a flattened macOS framework (breaks codesign)
    status: worked_around_on_disk
    notes: |
      The macos-arm64_x86_64 slice of Libbox.xcframework (rebuilt 2026-05-13)
      had real files at the framework top level + a real Versions/Current dir
      instead of the canonical symlink layout (top-level entries → Versions/
      Current → A). macOS codesign then reports "code object is not signed at
      all" for the embedded Libbox.framework and the app archive sign fails.
      Fixed on disk 2026-05-30 by restoring symlinks (Versions/Current→A, top
      level→Versions/Current/*). The libbox build/packaging (make lib_apple +
      Info.plist patch step) must emit proper macOS framework symlinks so a
      clean rebuild doesn't reintroduce this. See reference_libbox_build.
  - id: TD-LIBBOX-FETCH
    title: Wire scripts/fetch-libbox.sh
    status: workaround_in_place
    notes: |
      iOS CI workflows currently graceful-skip when fetch-libbox.sh is absent.
      ~494 MB framework lives in git-ignored Frameworks/. To re-enable
      CI link-time coverage, script must pull a built xcframework
      (artifact storage TBD).


