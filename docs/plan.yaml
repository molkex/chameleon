  - id: launch-06-auto-connect-untrusted-wifi
    title: Auto-connect via iOS Connect-On-Demand
    status: done
    layer: ios
    builds: [67]
    completed: 2026-05-14
    rationale: |
      Industry standard — without it the user pays but toggles manually
      every time. On-Demand was previously entirely SUPPRESSED in the
      codebase (connect/disconnect/createManager all force it off); the
      defensive userStoppedVPN + disableOnDemand machinery existed but
      there was no enable path.
    artifacts:
      - clients/apple/Shared/Constants.swift
      - clients/apple/MadFrogVPN/Models/ConfigStore.swift
      - clients/apple/MadFrogVPN/Models/VPNManager.swift
      - clients/apple/MadFrogVPN/Models/AppState.swift
      - clients/apple/MadFrogVPN/Models/L10n.swift
      - clients/apple/MadFrogVPN/Views/SettingsView.swift
      - clients/apple/MadFrogVPN/Resources/{en,ru}.lproj/Localizable.strings
    implementation: |
      ConfigStore.autoConnectEnabled — opt-in pref (default OFF; ON by
      default would surprise a user with a VPN that re-enables itself).
      VPNManager.setOnDemand(enabled:) — installs/clears a single
      unconditional NEOnDemandRuleConnect + isOnDemandEnabled, idempotent
      (no save round-trip when already in the requested state).
      AppState.handleStatus() .connected applies the pref on every
      successful connect; AppState.setAutoConnectEnabled(_:) persists +
      applies live when the tunnel is already up.
      The un-disableable-from-Settings footgun of an unconditional Connect
      rule is neutralised by the pre-existing disconnect() + userStoppedVPN
      → disableOnDemand() paths: an explicit in-app or iOS-Settings stop
      clears On-Demand, which re-arms on the next manual connect.
    scope-decision: |
      Shipped the unconditional auto-connect (the 95% case — "keep the VPN
      on"). The original title mentioned SSIDMatch trusted-network
      exceptions; that needs CLLocationManager authorization (you can't
      read the current SSID on modern iOS without it) plus a trusted-
      networks management UI — a separate permission flow, deferred to
      launch-08 polish.
    notes: iOS-only, no backend change. Build 67.

  - id: launch-07-disconnect-notification
    title: Disconnect notification (UNUserNotificationCenter + NEProviderStopReason)
    status: done
    layer: ios
    builds: [66]
    completed: 2026-05-14
    rationale: |
      For a VPN a silent tunnel drop is a SAFETY bug, not a UX nicety —
      the user keeps browsing believing they're protected when they
      aren't. Audit also found the app never called requestAuthorization
      at all, so even the pre-existing stall banner silently no-op'd.
    artifacts:
      - clients/apple/Shared/DisconnectNotifier.swift
      - clients/apple/Shared/Constants.swift
      - clients/apple/PacketTunnel/ExtensionProvider.swift
      - clients/apple/MadFrogVPN/Models/AppState.swift
      - clients/apple/Tests/UnitTests/DisconnectNotifierTests.swift
    implementation: |
      DisconnectNotifier (Shared/): two sides, shared policy.
      - requestAuthorizationIfNeeded() — main app, called from
        handleStatus() .connected. Asks once (UserDefaults guard) after
        the first successful connect — not at cold launch, which tanks
        grant rate.
      - postUnexpectedDisconnect(reason:) — extension, called from
        stopTunnel(with:). Maps NEProviderStopReason → notify-or-silent.
        Notify: providerFailed, connectionFailed, noNetworkAvailable,
        unrecoverableNetworkChange. Silent: userInitiated + all
        config/sleep/appUpdate/idleTimeout/superceded cases.
      Two distinct copy buckets (crash/connection vs network-change).
    tests: |
      DisconnectNotifierTests (unit, 3 cases): notify-bucket non-nil,
      expected-stops nil, crash vs network-change copy differs. Pure
      policy fn — compiles + runs without Libbox/App Group.
    notes: |
      iOS-only, no backend change. Out of scope: hard jetsam SIGKILL
      never calls stopTunnel — catching that needs the main app noticing
      .disconnected on next foreground (separate follow-up, low value
      since the user is already back in the app at that point).

