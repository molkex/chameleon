  - id: launch-09-backend-storekit-v2
    title: Backend launch-P0 — Apple refund/revoke handling
    status: done
    layer: backend
    completed: 2026-05-14
    rationale: |
      Audit corrected the original premise. The backend does NOT trust a
      client transaction_id — payments/apple/verify.go already does full
      JWS signature-chain verification (leaf → intermediate → Apple root
      CA) for both the /subscription/verify purchase path and the App
      Store Server Notification V2 webhook. A client cannot forge a
      transaction.
      The REAL gap: subscription_notification.go handled REFUND / REVOKE
      by logging only ("not auto-reversing in Phase 1b"). A user could
      get refunded by Apple and keep VPN access indefinitely — the actual
      revenue hole.
    artifacts:
      - backend/internal/payments/credit.go
      - backend/internal/api/mobile/subscription_notification.go
      - backend/internal/payments/credit_test.go
      - backend/internal/payments/testdb_test.go
    implementation: |
      payments.RefundCharge(source, chargeID): in one tx, marks the ledger
      row status='refunded' and subtracts exactly that charge's days from
      users.subscription_expiry (the inverse of CreditDays' additive
      `max(now,expiry)+days`). is_active flips false when the result is in
      the past. Idempotent — unknown / already-refunded charge is a no-op.
      payments.RestoreCharge(source, chargeID): the REFUND_REVERSED inverse
      — flips refunded→completed and re-credits via the CreditDays formula.
      subscription_notification.go: REFUND/REVOKE → RefundCharge,
      REFUND_REVERSED → RestoreCharge. Apple-retry-safe via idempotency.
    related-decisions:
      - ADR-007-refund-subtract-not-replay
    tests: |
      payments/credit_test.go (integration, //go:build integration,
      testcontainers Postgres — skips without Docker, same pattern as
      internal/db): 8 cases — CreditDays extend+idempotent, RefundCharge
      reverse/keeps-other-source/idempotent/unknown-no-op, RestoreCharge
      re-credit/not-refunded-no-op.
    notes: |
      Title kept as launch-09 (permalink). Scope corrected from "StoreKit
      v2 verification" — that was already done — to "refund/revoke
      handling", the genuine remaining gap.
      Out of scope (separate follow-up if ever needed): outbound App Store
      Server API polling (Get All Subscription Statuses) to recover from a
      missed webhook. Not required — Apple retries notifications for days
      and our handlers are idempotent.

  - id: test-coverage-hardening
    title: Close the critical/major test-coverage gaps
    status: planned
    layer: docs            # spans ios + backend; tracked as a hygiene phase
    rationale: |
      Audit 2026-05-14 (docs/test-coverage.yaml) found load-bearing code
      shipped to prod with zero tests: backend geoip (ADR-004 keys the
      whole DPI filter off it), backend payments/apple (Apple JWS/x5c
      verification), iOS AppState / VPNManager / ExtensionProvider (the
      connect hot path, incl. the launch-04b publishWidgetState code),
      CrashDiagnosticReporter (privacy-sensitive per ADR-006). The bar:
      every shippable unit of logic has a test; UI views + thin wrappers
      are explicitly exempt.
    artifacts:
      - docs/test-coverage.yaml   # the canonical gap list + priority order
    implementation: |
      Work the priority order in test-coverage.yaml. Order is chosen by
      value/effort: pure backend logic first (geoip, payments/apple),
      then the pure iOS bits (CrashDiagnosticReporter, the
      ExtensionProvider config-source picker), then the parts that need
      a seam (AppState/VPNManager need a VPNManager protocol to test
      without NetworkExtension). Each gap closed → update
      test-coverage.yaml (move from gaps to tested).
    notes: |
      Not release-blocking — the launch builds ship regardless. This is
      regression-safety debt: the more untested phases stack up
      (field-verified: false on builds 65-71), the higher the blast
      radius of the next refactor. Best burned down incrementally
      alongside feature work, not as one big stop-the-world push.
