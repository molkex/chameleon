  - id: launch-04b-control-widget
    title: iOS-18 ControlWidget toggle + interactive Home Screen button
    status: done
    completed: 2026-05-14
    layer: ios
    builds: [69, 70, 71]
    rationale: |
      The interactive half of widgets — a real connect/disconnect toggle
      in Control Center (iOS 18 ControlWidget) and an interactive button
      on the Home Screen tile. Split from launch-04 because driving
      NEVPNManager from a widget-extension process needs on-device
      verification, and a half-working toggle is worse than none.
    depends-on: launch-04-widgets
    artifacts:
      - clients/apple/Shared/VPNControlIntents.swift
      - clients/apple/MadFrogWidget/MadFrogControlWidget.swift
      - clients/apple/MadFrogWidget/MadFrogWidgetBundle.swift
      - clients/apple/MadFrogWidget/StatusWidget.swift
      - clients/apple/MadFrogWidget/MadFrogWidget.entitlements
      - clients/apple/project.yml
      - clients/apple/Tests/UnitTests/VPNControlIntentsTests.swift
    implementation: |
      ToggleVPNIntent (SetValueIntent, Shared/) runs in the widget-
      extension process and drives NETunnelProviderManager directly:
      on -> startTunnel(options: nil), off -> stopVPNTunnel(). The
      "options: nil" path is the key — the PacketTunnel extension falls
      back to the App-Group-persisted config, so the warm path needs no
      backend round-trip and no app launch. The one cold case (no
      profile installed) returns .needsApp -> throws a localized error.
      MadFrogControlWidget (ControlWidget, iOS 18+) backs a
      ControlWidgetToggle with a ControlValueProvider reading
      WidgetVPNSnapshot. StatusWidget's systemSmall shield became a
      Button(intent:) — tapping it toggles in place, tapping elsewhere
      still opens the app. The widget target gained the
      packet-tunnel-provider Network Extension entitlement; the
      NETWORK_EXTENSIONS capability was enabled on the
      com.madfrog.vpn.widget bundle ID via the ASC API (no portal step
      — unlike the App Group group-linkage in launch-04).
    tests: |
      VPNControlIntentsTests (5 cases): vpnControlPlan decision table
      (no-manager -> needsApp regardless of direction; with-manager ->
      start/stop), ToggleVPNIntent value round-trip, non-empty error
      messages. perform()'s NE calls are on-device-verified. All
      targets compile; test target compiles (build-for-testing).
    shipped: |
      2026-05-14 — build 69 in TestFlight Internal (asc-build-id
      b4b009ce-ac68-44d2-834d-a015c331d650). Field test confirmed the
      toggle drives the VPN, but the widget didn't repaint until the app
      was opened — only the app's handleStatus() wrote vpnConnectedAtKey
      + reloaded timelines, and the app isn't running on a widget-
      triggered toggle. build 70 (asc-build-id
      4398fbac-e1b3-4477-acbf-eb8dfd74716c) moves that responsibility to
      ExtensionProvider.publishWidgetState() — the one process that
      always runs on a VPN state change. Build 70 field test still felt
      laggy (extension's reloadAllTimelines() is iOS-budget-throttled)
      and surfaced two UX gaps. build 71 (asc-build-id
      3741178f-98c6-4fb6-a6ec-ffc7054a0e16): (1) ToggleVPNIntent writes
      the state to the App Group optimistically so WidgetKit's
      post-intent reload shows it instantly; (2) the systemSmall shield
      is now a filled circular button (affordance); (3) live uptime
      timer via WidgetVPNSnapshot.connectedAt on small + rectangular.
      field-verified: false — needs on-device re-check on build 71.
    estimated-effort: 0.5-1 day

