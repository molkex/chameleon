# Project phases — what we plan / are doing / have done.
# Schema: docs/SCHEMA.md § plan.yaml
#
# Every named change is one phase. Use status to drive filters:
#   yq '.phases[] | select(.status=="done")'
#   yq '.phases[] | select(.status=="planned") | .id'
#
# Phase IDs are PERMALINKS — never renamed. Other files reference them.
# Order is roughly grouped (smart-selection rollout -> launch readiness
# -> fork track), NOT strictly chronological — never rely on file
# position, filter by status/id/layer. Append new phases at the end of
# their group; never reorder existing entries.

