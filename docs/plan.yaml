      (incidents.yaml 2026-05-14-nl-timeweb-telegram-cdn-unreachable):
      NL Timeweb cannot reach Telegram media CDN 91.105.192.0/22 (100%
      packet loss, AS9123↔AS62041 routing gap). DE OVH reaches it fine
      (ping 32ms). But urltest elects nl-direct-nl2 (lowest RTT to OUR
      healthcheck) — a leg fast to our backend but dead to TG media.
    artifacts:
      - backend/internal/vpn/clientconfig.go
      - backend/internal/vpn/clientconfig_test.go
    implementation: |
      - telegramRouteLeaves(): tag-prefix heuristic, "de-*" leaves are
        TG-capable. TODO phase-1.g: replace with per-server DB column.
      - New urltest group `_telegram_route` over DE leaves only.
        For RU clients (de-direct stripped by Phase 1.B) = [de-via-msk].
      - geoip-telegram rule-set (SagerNet maintained, auto-updates 168h)
        + route rule pinning it at _telegram_route, ordered BEFORE
        refilter/geoip-ru.
      - Omitted entirely when no DE leaves exist (route rule pointing at
        a missing group would fail sing-box config parse).
    outcome:
      config-marker: 60.5-telegram-route-fix
      field-verified: true                   # log 2026-05-14: 118 TG CDN conns via de-via-msk, _telegram_route 355-400ms
    related-incidents:
      - 2026-05-14-nl-timeweb-telegram-cdn-unreachable
      - 2026-05-14-geoip-telegram-404-broke-connect
    follow-up:
      - phase-1.g-per-server-reachability

  - id: phase-1.g-per-server-reachability
    title: Per-server destination-reachability flags in DB
    status: deferred
    layer: backend
    rationale: |
      phase-1.f hardcodes "DE = TG-capable" via tag prefix. Fragile in
      theory: if DE OVH gets blocked, or a new node is added, the
      heuristic rots.
    notes: |
      Deferred 2026-05-14: with only 2 nodes (DE + NL) the tag-prefix
      heuristic is currently CORRECT and field-verified — building a
      reachability-healthcheck job + cluster sync for 2 nodes is
      over-engineering. Pick this up when (a) a 3rd node is added, or
      (b) DE OVH starts flapping. Until then it is not a real problem.
    plan: |
      - Migration: add vpn_servers.reachability JSONB.
      - Periodic backend healthcheck: each node curls known
        destinations (TG CDN, Cloudflare, ...) and updates its own row.
      - clientconfig.go reads the flag instead of the tag-prefix guess.
    estimated-effort: 1 day
    trigger: 3rd node added OR DE OVH reachability becomes unstable

  - id: phase-1.e-server-side-rotation
    title: Periodic upstream connection rotation in fork
    status: deferred
    layer: fork
    rationale: |
      Throttle clock resets per-flow. Tearing down + re-dialing the
      upstream VLESS Reality every ~75s would keep flows short-lived,
      DPI sees fresh small flows instead of one long bulk.
    risks:
      - Heavy on memory (reconnect allocates uTLS + Reality handshake state)
      - 50 MB jetsam cap might push us back to OOM territory
    pre-work: heap-instrument-during-forced-reconnect

