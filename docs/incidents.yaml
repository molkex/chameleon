# Field-failures + post-mortems.
# Schema: docs/SCHEMA.md § incidents.yaml
#
# Add an incident when something breaks in production AND root cause
# isn't immediately obvious from the code. The point isn't blame —
# it's so future-you doesn't re-debug the same misdirection.

incidents:
  - id: 2026-05-14-app-review-siwa-unresponsive
    date: 2026-05-14
    severity: blocker
    title: App Store rejected v1.0.26 ~4 times — "Sign in with Apple button unresponsive"
    component: ios-onboarding
    builds-affected: [51, 53, 59, 60, 71]   # the bug rode every submitted build since 59
    detected-via: app-review
    what-happened: |
      App Review rejected v1.0.26 under Guideline 2.1(a) (App
      Completeness) — "the Sign in with Apple button was unresponsive"
      on iPhone 17 Pro Max / iOS 26.5 — on builds 51, 53, and again
      59-71. Same rejection, ~4 rounds, blocking the app's first App
      Store release for over a week. A secondary Guideline 2.3.12
      (Accurate Metadata) flag on the "What's New" text rode along on
      the last cycle.
    root-cause: |
      OnboardingView.appleSignInButton wrapped the native
      `SignInWithAppleButton` in a `.simultaneousGesture(TapGesture)`
      "breadcrumb" (added in build 59 to *diagnose* the earlier
      rejections) whose `.onEnded` set `isAuthInFlight = true`.
      `SignInWithAppleButton` is a UIKit `UIControl` behind a SwiftUI
      representable; a SwiftUI simultaneous gesture layered on top of it
      swallowed the control's own `touchUpInside` — so `onRequest` never
      fired and the system auth sheet never presented. AND that gesture
      flipped `isAuthInFlight`, which the wrapper's
      `.disabled(app.isLoading || isAuthInFlight)` then latched — the
      button disabled itself on the first tap and stayed dead. The
      diagnostic hack WAS the bug.
    why-it-took-four-rounds: |
      Each "fix" (builds ≤49 SwiftUI auto-anchor, 53 UIKit
      AppleAuthCoordinator, 59 native button + gesture) changed the
      button TYPE but kept layering presentation/anchor/single-flight
      hacks on top — chasing an "anchor lookup" theory that was never
      the real cause. Nobody removed the gesture. It was never caught
      locally because the app cannot run on the iOS Simulator (the App
      Group entitlement fatal-errors there — see incident
      simulator-app-group-entitlement), so Sign in with Apple was never
      exercised before submission; only App Review hit it.
    resolution: |
      build 72 (commit 494cde9) — use `SignInWithAppleButton` EXACTLY
      as Apple documents: removed the `.simultaneousGesture` entirely;
      removed `isAuthInFlight` from the button's `.disabled` (now
      `.disabled(app.isLoading)` only — reliably defer-scoped, can't
      stick); removed the now-dead `isAuthInFlight = false` lines. Log
      breadcrumbs kept INSIDE onRequest/onCompletion — those are the
      button's own callbacks, they cannot interfere with touch delivery.
      com.apple.developer.applesignin entitlement verified present — the
      bug was purely the button wiring. build 72 attached to v1.0.26 and
      resubmitted (reviewSubmission
      55f7cc73-20b2-4bed-8a1c-68411303e15d, WAITING_FOR_REVIEW).
    secondary-2312: |
      Guideline 2.3.12: the "What's New" text on the en-US localization
      is the placeholder "Initial release" (ru is empty). It CANNOT be
      edited from our side — v1.0.26 is the app's first release, so the
      ASC version page exposes no "What's New" field and the API rejects
      whatsNew PATCHes with 409 STATE_ERROR ("cannot be edited at this
      time"). Standing plan: if App Review re-flags 2.3.12, reply in the
      Resolution Center explaining the first-release situation. 2.1(a)
      is the real blocker and is fixed.
    status: mitigated   # build 72 in review; awaiting App Review verdict
    lessons:
      - "Never layer a SwiftUI .simultaneousGesture / .onTapGesture on a UIKit-backed control (SignInWithAppleButton, Map, etc.) — it can swallow the control's own touch handling, OS-version-dependent. Use Apple's components exactly as documented."
      - "A 'breadcrumb' diagnostic that MUTATES state (isAuthInFlight) coupled to .disabled() can BE the bug. Diagnostics must be side-effect-free."
      - "Sign in with Apple is untestable on the iOS Simulator here (App Group entitlement crash). Until that's fixed, SIWA MUST be smoke-tested on a real device before every App Store submission — it is the #1 App Review reject surface for this app."
      - "When a fix is rejected for the SAME reason twice, stop changing the implementation TYPE and re-read the actual diff. The constant across builds 51/53/59-71 was the hack layer, not the button."

  - id: 2026-05-14-widget-toggle-no-visual-update
    date: 2026-05-14
    severity: minor
    title: Widget toggled the VPN but didn't repaint until the app was opened
    component: ios-widget
    builds-affected: [69]
    detected-via: field-test
    what-happened: |
      launch-04b build 69: tapping the Control Center toggle / the
      interactive Home-Screen shield button DID connect/disconnect the
      VPN, but the widget kept showing the old state until the app was
      next opened — at which point it snapped to correct.
    root-cause: |
      `vpnConnectedAtKey` (the App-Group key `WidgetVPNSnapshot.read()`
      keys off) and `WidgetCenter.reloadAllTimelines()` were both driven
      ONLY by the app's `AppState.handleStatus()`. That's fine when the
      user toggles inside the app, but a widget-triggered toggle runs
      `ToggleVPNIntent` in the widget-extension process — the app isn't
      running, so nothing updated the key or reloaded the timeline. The
      same blind spot existed for toggling from iOS Settings.
    resolution: |
      build 70 — `ExtensionProvider` is the one process that always runs
      on a VPN state change (app / widget / iOS Settings), so it now
      owns the widget signal: `publishWidgetState(connected:)` writes
      `vpnConnectedAtKey` and calls `reloadAllTimelines()` on tunnel
      start success, stop, and the pre-flight failure paths. The app's
      `handleStatus()` still does the same — harmless and consistent
      (both write a timestamp on connect, remove the key on disconnect).
      PacketTunnel gained `WidgetKit.framework`; the calls are
      `#if os(iOS)` so PacketTunnelMac is untouched.
      build 71 — build 70 still felt laggy: the extension's
      `reloadAllTimelines()` is iOS-budget-throttled, and on a connect
      the key isn't written until sing-box is up (~0.4 s later), so the
      reload WidgetKit fires right after the intent showed stale state.
      Fix: `ToggleVPNIntent` writes the requested state to the App Group
      *optimistically* (right after startTunnel/stopVPNTunnel returns,
      before the tunnel finishes) so the post-intent reload is instant;
      the extension still corrects it on the real outcome.
    status: resolved
    lesson: |
      Any widget/extension-triggered action must update shared state and
      reload timelines from a process that's actually alive at that
      moment — never assume the main app is running. For VPN state, the
      packet-tunnel provider is the reliable writer.

  - id: 2026-05-14-widget-bundle-id-provisioning-wall
    date: 2026-05-14
    severity: minor
    title: New widget bundle ID can't get an App-Groups provisioning profile via CLI
    component: ios-build
    what-happened: |
      launch-04 adds a MadFrogWidget app-extension target with a new
      bundle ID com.madfrog.vpn.widget that needs the App Group
      group.com.madfrog.vpn. `xcodebuild ... -allowProvisioningUpdates
      archive` fails ONLY for this target with "Authentication failed:
      Make sure a bearer token was provided ..." followed by the
      wildcard profile lacking App Groups. Existing targets archive fine
      (cached profiles, no ASC call). The SAME ASC API key works fine for
      direct python calls (used it to create the bundle ID + capability
      in the same session).
    root-cause: |
      The App-Group↔bundle-ID linkage is not exposed by the App Store
      Connect API at all. Probed exhaustively:
        GET  /v1/appGroups                          -> 404 NOT_FOUND
        GET  /v1/bundleIds/{id}/appGroups           -> 404 PATH_ERROR
             "The relationship 'appGroups' does not exist"
        GET  /v1/bundleIds/{id}/relationships/appGroups -> 404 PATH_ERROR
        include=appGroups on bundleIdCapabilities   -> 400 ILLEGAL
      Enabling the APP_GROUPS *capability* on a bundle ID via the API
      (POST /v1/bundleIdCapabilities) succeeds, and a provisioning
      profile generated afterwards DOES carry the `application-groups`
      entitlement KEY — but with an EMPTY value, because the specific
      group `group.com.madfrog.vpn` was never linked. The working
      com.madfrog.vpn.tunnel shows the same `settings: null` over the
      API — its real linkage lives in portal state the API doesn't
      surface. So the linkage is genuinely portal-web-UI / Xcode-GUI
      only. This is exactly the "App Groups via Xcode UI" gotcha in
      feedback_mac_testflight_gotchas.
    mitigation-done: |
      Everything the ASC API CAN do, done autonomously:
        - created bundle ID com.madfrog.vpn.widget (Z76JPFNJ6D)
        - enabled its APP_GROUPS capability
        - created IOS_APP_DEVELOPMENT profile "MadFrog Widget Dev"
          (uuid 95c64406-97cb-40ab-835f-bfa425f97444), dev cert
          994RC8J3X6 + all 3 registered iPhones, installed to
          ~/Library/MobileDevice/Provisioning Profiles/
      Verified the installed profile: application-groups entitlement
      present, group.com.madfrog.vpn NOT in its value list — confirming
      the linkage gap.
      Code is committed (8d9363c), all targets compile.
    unblock: |
      ONE manual step, ~30 seconds, at developer.apple.com (no Xcode
      needed):
        Certificates, IDs & Profiles -> Identifiers ->
        "MadFrog VPN Widget" (com.madfrog.vpn.widget) ->
        App Groups row -> Configure/Edit -> tick group.com.madfrog.vpn
        -> Save.
      After that, regenerating the provisioning profile via the ASC API
      picks up the now-linked group, and the rest of the pipeline
      (archive -> export -> upload -> link to Internal Testers) runs
      head-less as normal.
    lesson: |
      A brand-new bundle ID that needs App Groups CANNOT be fully
      provisioned head-less — the ASC API has no app-group resource
      whatsoever (confirmed by probing, not assumption). Budget one
      portal-web-UI step per new App-Group-using target. The capability
      toggle is API-scriptable; the *group linkage* is not.
    status: resolved
    resolution: |
      2026-05-14 — group.com.madfrog.vpn linked to com.madfrog.vpn.widget
      via the developer.apple.com portal (browser automation: Identifiers
      -> MadFrog VPN Widget -> App Groups -> Configure -> tick the group
      -> Save -> Confirm). First Save silently failed on an expired portal
      session; succeeded after re-login. Verified head-less: a freshly
      ASC-API-generated profile now carries
      application-groups: ['group.com.madfrog.vpn']. Then archive ->
      export -> upload ran clean — build 68 (asc-build-id
      9290c7f9-5c6f-4788-97e8-9a67f201f428) is VALID and linked to
      Internal Testers.

  - id: 2026-05-13-libbox-1.13.6-oom-wrong-call
    date: 2026-05-13
    severity: blocker
    title: libbox v1.13.6 OOM-killer storm — misdiagnosed as base regression
    builds-affected: [56, 57, 58, 60]
    detected-via: field-log
    symptoms:
      - sing-box internal oom-killer fires ~100-500x/sec
      - "memory pressure: critical, usage: 40-43 MiB"
      - "all TG/Speedtest connections die on each oom-killer reset"
      - "extension auto-restart by iOS jetsam after ~30s"
    initial-hypothesis: |
      sing-box base version regression v1.13.5 → v1.13.6 caused memory
      growth on iOS NetworkExtension. Suspected sagernet/sing v0.8.4
      "Iovec(Cap()) → Iovec(FreeLen())" change in copy_direct_posix.go.
    initial-hypothesis-outcome: wrong
    investigation: |
      Diff between sing-box v1.13.5 and v1.13.6: 3 commits, 2 in code we
      don't ship (naive padding excluded at build, version bump). Only
      load-bearing change: sagernet/sing v0.8.3 → v0.8.4, single-line
      diff. For freshly-created buffers (the hot path here), Cap() ==
      FreeLen() — change is provably no-op.

      Real cause emerged after Phase 1.9 revert FAILED (build 60 OOMed
      identically to 58). Config audit on build 60 init log: 44 outbounds
      initialised at tunnel start (9 selectors, 5 urltest groups, 10 leaves
      including 4 QUIC). Each VLESS Reality leaf ~1-2 MiB heap (uTLS +
      Reality state); each QUIC leaf ~2-3 MiB (BBR congestion state).
      Approximate baseline ~30 MiB cold; ~12 MiB room before 42 MiB
      GOMEMLIMIT trip, easily eaten by user traffic.
    root-cause: |
      Config inflation: 4 QUIC outbounds reserved ~10 MiB of Go heap
      while reliably dead on cellular (NAT-rebinding) — net 10 MiB
      wasted at all times. Plus dead de-direct-de leaf burning urltest
      cycles. Phase 1.A removed QUIC ⇒ 0 OOM events. Phase 1.B removed
      dead de-direct ⇒ urltest no longer spends 5s/cycle on dead probe.
    fixed-by:
      - phase-1.a-quic-suppress
      - phase-1.b-dpi-filter
    lessons:
      - Don't roll back the base version when a build fails — first isolate.
      - Field-log heap numbers (40-43 MiB usage) were the smoking gun;
        I anchored on the version diff instead of asking "what is the
        config doing differently".
      - QUIC outbounds that reliably timeout still cost Go heap. UDP
        outbound is not "free" just because it's not transferring data.

  - id: 2026-05-13-dpi-de-direct-russian-asns
    date: 2026-05-13
    severity: major
    title: de-direct-de (OVH 162.19.242.30) unreachable from RU/BY mobile carriers
    builds-affected: [55, 56, 57, 58, 59, 60, 60.2]   # fixed in 60.3
    detected-via: field-log
    symptoms:
      - "outbound de-direct-de unavailable: context deadline exceeded (repeats every 15s)"
      - urltest cycle wastes 5s per cycle on dead probe
      - "user perceives VPN as 'hangs every 15 seconds'"
    root-cause: |
      OVH AS16276 ranges ASN-blocked by every observed RU/BY mobile
      carrier (МТС, МегаФон, Билайн, Yota; A1, life:) and most home ISPs
      (Ростелеком, ЭР-Телеком). Phase 0 hint reordered urltest but kept
      the dead leaf in the pool — urltest re-probes everything every cycle.
    fixed-by:
      - phase-1.b-dpi-filter
    lessons:
      - "Reorder ≠ remove. Cold-start hint doesn't help mid-session re-probes."
      - "When a leaf is universally dead for a class of users, strip it from their config server-side — not just demote it."

  - id: 2026-05-13-build-61-noisy-log
    date: 2026-05-13
    severity: cosmetic
    title: TunnelStallProbe spammed "cellular profile applied" on every pathUpdate
    builds-affected: [61]
    detected-via: field-log
    symptoms:
      - "5-10 'cellular profile applied' lines per minute on stable cellular"
      - Log reads as heartbeat, not narrative — hard to spot real events
    investigation: |
      NWPath.pathUpdateHandler fires repeatedly on a stable cellular
      uplink (route refresh, neighbor discovery, BSSID flap). My
      applyCellularProfile() / applyWiFiProfile() pair emitted a log
      line every call, regardless of whether the profile actually changed.
    root-cause: |
      Stateless apply methods + no dedup at log boundary.
    fixed-by:
      - phase-1.c-polish-log
    lessons:
      - When wiring a method to a high-frequency callback, treat the call
        as a state-change candidate, not a state-confirmation request.
      - Log should be a narrative of events, not a heartbeat.

  - id: 2026-05-13-build-61-suspected-race
    date: 2026-05-13
    severity: cosmetic
    title: Suspected race — probe injected after first pathUpdate (NOT a real bug)
    builds-affected: [61]
    detected-via: code-review
    symptoms:
      - startSingBox() starts NWPathMonitor BEFORE startStallProbe() injects probe
      - First pathUpdate could fire with stallProbe == nil
    investigation: |
      Initial reading: race condition would silently swallow the first
      profile selection. Field-log inspection of build 61 showed
      "cellular profile applied" emitted at 23:33:05 — 5 seconds after
      tunnel start, well after the first pathUpdate would've fired.
    root-cause: |
      Not actually a bug. iOS fires pathUpdateHandler many times per
      minute on a stable uplink (5+ in 22 s of build 61 startup field
      log). The second callback always catches a populated weak ref.
    fixed-by: []   # nothing to fix
    lessons:
      - "Don't assume a high-frequency callback is one-shot. iOS path monitoring is noisy by design."
      - "Profile early before refactoring for a hypothesised race."

  - id: 2026-05-14-build-63-selectoutbound-urltest
    date: 2026-05-14
    severity: major
    title: Phase 1.D shipped with selectOutbound on urltest group — RPC error
    builds-affected: [63]
    detected-via: field-log
    symptoms:
      - "selectOutbound 'Auto' → 'de-via-msk' FAILED (rpc error: code = Unknown desc = outbound is not a selector: Auto)"
      - Penalty store recorded penalties, but fallback degraded to legacy urlTest()
      - User saw "вроде все работало, но сервер все ровно обновился" (= urltest re-elected, not pinned)
    investigation: |
      I designed Phase 1.D against `urltestGroupTags: ["Auto", "🇩🇪 Германия", "🇳🇱 Нидерланды"]` —
      assumed sing-box treats group selection uniformly across `type: "selector"`
      and `type: "urltest"`. It doesn't: urltest groups pick by RTT
      automatically and reject manual `selectOutbound`. Got the RPC
      error in field log on first STALL streak (build 63 LTE 00:28:19).
    root-cause: |
      Wrong target group. The config's only `type: "selector"` at the top
      level is **Proxy**, which owns: Auto urltest + country urltests +
      individual leaves + whitelist group. selectOutbound on Proxy works
      because it's a selector; on Auto fails because it's urltest.
    fixed-by:
      - phase-1.d-penalty-score   # build 64
    lessons:
      - "sing-box group types are NOT interchangeable for selectOutbound. Only selectors accept pin; urltests pick by RTT and reject."
      - "Read sing-box source / log error verbatim before assuming API symmetry."
      - "Field log is the unit test. The simulator never exercises the actual sing-box CommandClient surface — bugs hide until on-device."

  - id: 2026-05-14-nl-timeweb-telegram-cdn-unreachable
    date: 2026-05-14
    severity: major
    title: NL Timeweb cannot reach Telegram media CDN (91.105.192.0/22)
    builds-affected: [55, 56, 57, 58, 59, 60, 61, 62, 63, 64]   # all before 60.4 backend
    detected-via: user-report
    symptoms:
      - "User: 'в тг плохо грузит медиа файлы'"
      - "Field log: 224 connections to 91.105.192.100:443 (TG media CDN), all via nl-direct-nl2"
      - TG photos/videos slow or hang; everything else (including TG text) fine
    initial-hypothesis: |
      Throughput limit on NL Timeweb server itself (weak channel).
    initial-hypothesis-outcome: wrong
    investigation: |
      Measured both nodes:
        DE OVH  → Cloudflare 10MB: 57.8 MB/s. TG CDN 91.105.192.100: ping 32ms, TCP OK.
        NL Timeweb → Cloudflare 10MB: 50.9 MB/s. TG CDN 91.105.192.100:
                  100% packet loss, TCP "closed by remote host".
      So NL's channel is fine (50 MB/s) — it specifically cannot route
      to 91.105.192.0/22. Checked more TG IPs from NL: 149.154.x reachable,
      91.105.192.x + 91.108.4.x NOT. From DE: 91.105.192.x reachable.
    root-cause: |
      AS9123 (Timeweb) ↔ AS62041 (Telegram) routing gap for the
      91.105.192.0/22 prefix. Not a Telegram-side block of us, not a
      bandwidth issue — a missing/broken BGP path. sing-box urltest
      elects nl-direct-nl2 because it has the lowest RTT to OUR
      healthcheck endpoint; that metric says nothing about whether the
      leg can reach Telegram's media CDN.
    fixed-by:
      - phase-1.f-telegram-route   # backend 60.4
    lessons:
      - "Health-probe RTT to our own endpoint != destination reachability. A leg can be fast to us and dead to a specific CDN."
      - "When a user says 'X is slow', measure the actual path X takes — don't assume it's our server's bandwidth."
      - "geoip rule-sets (SagerNet maintained) beat hardcoded CIDR lists — Telegram IP ranges drift; the rule-set auto-updates every 168h."

  - id: 2026-05-14-geoip-telegram-404-broke-connect
    date: 2026-05-14
    severity: blocker
    title: Phase 1.F shipped a 404 rule-set URL — sing-box refused to start
    builds-affected: [60.4]
    detected-via: user-report
    symptoms:
      - "User: 'не подключается'"
      - "tunnel ERROR: sing-box start failed: initialize rule-set[2]: geoip-telegram: unexpected status: 404 Not Found"
      - VPN would not start AT ALL — worse than the slow-TG problem it was fixing
    initial-hypothesis: |
      none — error message was unambiguous.
    root-cause: |
      I assumed SagerNet/sing-geoip publishes a per-service geoip-telegram.srs
      rule-set, by analogy with the geoip-ru.srs we already use. It does not —
      sing-geoip ships ONLY country sets. The URL 404'd. sing-box treats a
      remote rule-set fetch failure as fatal at config init, so the whole
      tunnel refused to start. I deployed 60.4 without curl-checking the URL.
    fix: |
      Build 60.5: switched to MetaCubeX/meta-rules-dat `sing` branch
      (geo/geoip/telegram.srs) — that repo DOES maintain per-service geoip
      sets as sing-box .srs binaries. Verified before deploy: HTTP 200,
      valid SRS\x02 magic, decodes to 12 CIDR blocks incl 91.105.192.0/23.
    fixed-by:
      - phase-1.f-telegram-route   # build 60.5
    lessons:
      - "ALWAYS curl-check a remote rule-set / asset URL before putting it in a config that ships. A 404 here is a total-outage P0, not a degradation."
      - "Don't assume two maintainers (SagerNet vs MetaCubeX) have parallel file layouts. sing-geoip = countries only; meta-rules-dat = countries + services."
      - "sing-box treats remote rule-set fetch failure as FATAL at init — there is no graceful degradation. Budget for that risk in every rule-set add."

