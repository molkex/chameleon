  - id: 2026-04-24-de-ovh-blocked-on-ru-lte
    date: 2026-04-24
    severity: major
    title: DE (OVH Frankfurt) blocked at ASN level by RU mobile carriers
    builds-affected: [pre-55]
    detected-via: field-log
    symptoms:
      - VLESS (TCP:443), H2 (UDP:443), TUIC (UDP:8443) all dead from RU LTE
      - NL (Timeweb 147.45.252.234) works on same network
      - DE works on Wi-Fi
    initial-hypothesis: |
      DE selected in UI, but exit IP showed NL.
    initial-hypothesis-outcome: wrong
    investigation: |
      Side effect of OOM-reset libbox debug (commit 48a93b9, build 30):
      after OOM Auto urltest re-evaluated and fell to NL; whoer.net saw
      NL exit. Real issue was carrier-level ASN block.
    root-cause: |
      RU mobile carriers ASN-block OVH AS16276 ranges. TCP SYN to
      162.19.242.30 dropped or RST'd at AS boundary. UDP same.
      NL Timeweb AS9123 not yet on block-lists.
    fixed-by:
      - "isNLServer() sort.SliceStable in clientconfig.go (Phase 0 ancestor)"
      - "isRURegion check in APIClient.swift"
    related-phases:
      - phase-0-universal-nl-hint
      - phase-1.b-dpi-filter
    lessons:
      - "Geo of exit IP at whoer ≠ what user picked. Always trust outbound selector log over external visible IP."
