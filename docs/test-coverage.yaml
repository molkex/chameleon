    - internal/vpn/reality_keys.go -> reality_keys_test.go (6)
    - internal/auth/jwt.go -> jwt_test.go (10)
    - internal/auth/apple.go -> apple_test.go (7)
    - internal/config/config.go -> config_test.go (9)
    - internal/db/users.go -> users_test.go (8)
    - internal/payments/credit.go -> credit_test.go (7)            # launch-09
    - internal/payments/freekassa/signature.go -> signature_test.go (2)
    - internal/secrets/encrypt.go -> encrypt_test.go (6)
    - internal/cluster/{errors,routes,sync}.go -> *_test.go (2+4+2)
    - internal/api/middleware/idempotency.go -> idempotency_test.go (9)
    - internal/api/admin/admins.go -> admins_test.go (5)
    - internal/api/mobile/{auth,diagnostic,geo_hint,healthcheck,subscription_chargeid}.go -> *_test.go (6+5+5+1+2)
    - tests/e2e/singbox_check_test.go (1) — validates generated config via `sing-box check`
    - tests/integration/health_test.go (1)

  gaps:
    - id: backend-geoip
      path: backend/internal/geoip/geoip.go
      severity: critical
      why: |
        ADR-004 makes geoip LOAD-BEARING — the whole DPI-aware config
        filter (Phase 1.B) keys off geoip.Lookup(). Zero tests. A
        regression here silently ships the wrong config to RU users.
      what-to-test: |
        cache hit/miss + 24 h expiry, the 1 s timeout path, the
        safe-empty fallback on error (must NEVER strip outbounds on a
        lookup failure), country-code normalisation.

    - id: backend-payments-apple
      path: backend/internal/payments/apple/
      severity: critical
      why: |
        Apple IAP verification path — JWS x5c chain validation, ASN
        decode, REFUND/REVOKE/REFUND_REVERSED notification handling.
        credit.go (the ledger) is tested; the Apple verification layer
        feeding it is NOT. A bug here = unverified transactions credited
        or valid ones rejected.
      what-to-test: |
        JWS signature verification against the Apple root CA (good +
        tampered payloads), x5c chain validation, notification-type
        routing, malformed-payload rejection.

    - id: backend-useragent
      path: backend/internal/useragent/
      severity: major
      why: parses client UA for routing/telemetry decisions. Untested.

    - id: backend-email
      path: backend/internal/email/
      severity: major
      why: transactional email (Resend) — templating + send. Untested. A
        broken template/recipient bug ships silently.

    - id: backend-v2rayapi-command
      path: backend/internal/vpn/v2rayapi/command/
      severity: major
      why: v2ray/xray gRPC command client for server-side user mgmt. Untested.

    - id: backend-api-router
      path: backend/internal/api/
      severity: minor
      why: route wiring (1 file). Mostly declarative; e2e/integration tests
        exercise the routes indirectly.

  exempt:
    reason: entrypoints + one-shot tooling.
    files:
      - backend/cmd/chameleon/        # binary entrypoint
      - backend/cmd/ascinit/          # one-shot ASC bootstrap tool
      - backend/cmd/metrics-agent/    # standalone agent
      - backend/internal/cli/         # CLI glue

