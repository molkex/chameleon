# Test coverage map — what's covered, what's a gap, what to add.
# Schema: docs/SCHEMA.md § test-coverage.yaml
#
# Goal: every shippable unit of logic has a test. UI views and thin
# wrappers are explicitly exempt (noted below). Update this file when
# adding/removing a test file OR shipping an untested component.
#
# Gap severity:
#   critical — load-bearing logic on the connect/pay/security path,
#              shipped to prod, zero tests. Fix before relying on it.
#   major    — real branching logic, untested, but not on the hot path.
#   minor    — small/pure helper, low blast radius.
#   exempt   — UI view / thin OS-wrapper / generated — not worth a unit test.

last-updated: 2026-05-14
last-updated-by: claude

summary:
  ios:
    source-files: 72          # +6 extracted-logic files from test-coverage-hardening
    test-files: 32
    test-cases: ~389
  backend:
    source-files: 69          # excl. _test.go and vendor/
    test-files: 26
    test-cases: ~155
  fork:
    note: sing-box-fork carries upstream's own test suite; the one
      cherry-pick (firstwrite-callback) has no dedicated unit test —
      its effect is exercised through the iOS stall-probe path.

