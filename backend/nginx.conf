# ---------------------------------------------------------------------------
# Trusted reverse-proxy frontends. Without `set_real_ip_from`, nginx and
# Echo's c.RealIP() trust whatever X-Forwarded-For arrives — every client
# could spoof its source IP and bypass per-IP rate limits (60/min on mobile
# routes) plus the FreeKassa webhook IP allowlist. We restrict trust to
# Cloudflare's published IPv4/IPv6 ranges + loopback. Behind any other
# proxy or directly, the original $remote_addr is used.
#
# Cloudflare ranges per https://www.cloudflare.com/ips/ — refresh when CF
# publishes new blocks (rare; last addition was 2024). Pinning explicitly
# is the right trade-off: any leaked or rotated edge IP outside this set
# stops being trusted automatically.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
set_real_ip_from 127.0.0.1;

# Our own RU-side relays. They terminate the CF-bypass path
# (api.madfrog.online → relay → NL/DE) and must be trusted to forward
# the real client IP via X-Forwarded-For. Without trust here, every
# request through these relays appears to Echo as the relay's IP —
# breaks per-user `last_ip`, audit logs, rate limits, GeoIP.
set_real_ip_from 217.198.5.52;   # MSK relay (Tatarstan-On-Line)
set_real_ip_from 185.218.0.43;   # SPB relay (SprintHost / SprintBox)

# X-Forwarded-For is the lingua franca across CF, our SPB/MSK relays,
# and any future intermediate hops — every trusted proxy sets it. With
# `recursive on`, nginx walks the chain from the right and stops at the
# first untrusted hop, which is the real client. (CF also sets
# CF-Connecting-IP, but switching to XFF lets us trust the SprintHost
# relay without teaching it to copy CF-Connecting-IP through.)
real_ip_header X-Forwarded-For;
real_ip_recursive on;
# ---------------------------------------------------------------------------

server {
    listen 80 default_server;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS — instructs the browser to always use HTTPS for this hostname.
    # Cloudflare terminates TLS in front of us; this header travels through
    # to the user's browser. Safe even when origin sees plain HTTP because
    # the directive applies to the visible URL, not the proxy hop.
    # 1 year, includeSubDomains. Add `; preload` only after submitting to
    # https://hstspreload.org and confirming readiness.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API — proxy to chameleon backend (host network).
    #
    # X-Forwarded-For is SET to $remote_addr — not $proxy_add_x_forwarded_for —
    # so the value we hand to Echo is the trusted client IP that nginx
    # resolved via real_ip_header (CF-Connecting-IP) above. The default
    # `$proxy_add_x_forwarded_for` simply appends nginx's own remote_addr to
    # whatever XFF chain arrived, which lets the upstream client put any IP
    # at position 0 — and Echo's c.RealIP() picks position 0, so per-IP rate
    # limiting plus FreeKassa's IP allowlist become trivially spoofable.
    # Replacing the header with a single trusted value closes that hole.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Subscription links
    location /sub/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Admin paths must be HTTPS. Cloudflare terminates TLS in front of us
    # and sets X-Forwarded-Proto=https when the user request was TLS; only
    # redirect when the header is missing or "http", so we don't loop with
    # Cloudflare's flexible mode (where origin always sees HTTP from CF).
    set $is_secure 1;
    if ($http_x_forwarded_proto != "https") { set $is_secure 0; }
    if ($remote_addr ~ "^127\.|^10\.|^172\.16\.|^192\.168\.") { set $is_secure 1; }

    # Admin SPA
    location /admin/app/ {
        # Force HTTPS for the admin UI specifically — landing/AASA stay HTTP-OK.
        if ($is_secure = 0) { return 301 https://$host$request_uri; }

        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/app/index.html;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none';" always;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location = /admin { return 301 /admin/app/; }
    location = /admin/ { return 301 /admin/app/; }

    # Marketing landing (madfrog.online / mdfrog.site root)
    location = / {
        root /usr/share/nginx/html/landing;
        try_files /index.html =404;
    }
    location = /favicon.svg {
        root /usr/share/nginx/html/landing;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Apple Universal Links — AASA file (must be served as application/json,
    # no redirects, no auth, exact path /.well-known/apple-app-site-association)
    location = /.well-known/apple-app-site-association {
        alias /usr/share/nginx/html/landing/apple-app-site-association;
        default_type application/json;
        add_header Cache-Control "public, max-age=86400";
    }

    # Legal pages (privacy + terms of use, required for App Store + FK)
    location = /privacy {
        root /usr/share/nginx/html/landing;
        try_files /privacy.html =404;
        default_type text/html;
    }
    location = /terms {
        root /usr/share/nginx/html/landing;
        try_files /terms.html =404;
        default_type text/html;
    }

    # ===== App Store-facing landing (clean, Apple-compliant) =====
    # Used for App Store metadata URLs (Privacy, Terms, Marketing, Support).
    # Separate from the legacy "/" landing — does NOT mention reseller bot,
    # external payment, crypto/Stars, or referral program.
    location = /app { return 301 /app/; }
    location = /app/ {
        root /usr/share/nginx/html/landing;
        try_files /app/index.html =404;
        default_type text/html;
    }
    location = /app/privacy {
        root /usr/share/nginx/html/landing;
        try_files /app/privacy.html =404;
        default_type text/html;
    }
    location = /app/terms {
        root /usr/share/nginx/html/landing;
        try_files /app/terms.html =404;
        default_type text/html;
    }
    location = /app/support {
        root /usr/share/nginx/html/landing;
        try_files /app/support.html =404;
        default_type text/html;
    }
    location = /app/styles.css {
        root /usr/share/nginx/html/landing;
        try_files /app/styles.css =404;
        default_type text/css;
        expires 7d;
    }

    # Magic-link sign-in landing. Primary role: Apple's Universal Link
    # mechanism intercepts this URL and opens the installed app directly.
    # This page is hit only if the app isn't installed or the link is
    # opened outside iOS Safari (desktop, Gmail in a browser tab).
    location = /app/signin {
        root /usr/share/nginx/html/landing;
        try_files /signin.html =404;
        default_type text/html;
    }
}

# ---------------------------------------------------------------------------
# grafana.madfrog.online — MON-04 monitoring dashboards.
#
# Proxies to Grafana on 127.0.0.1:3000 (the chameleon-grafana container
# runs in host networking mode, see docker-compose.yml). Cloudflare in
# front terminates TLS; we serve plain HTTP on the wire here. Grafana's
# own login handles auth — no nginx-side basic_auth needed.
#
# DNS setup required: add `grafana` A-record at Cloudflare pointing to
# NL (147.45.252.234), proxied (orange-cloud) for free SSL.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name grafana.madfrog.online;

    # Security headers (Grafana sets its own CSP — we don't override).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size — Grafana dashboard imports can exceed nginx's 1 MiB default.
    client_max_body_size 16M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Grafana Live (WebSocket for real-time panel refresh + log
        # streaming). Without these the dashboard auto-refresh still
        # works via the REST fallback but live panels would 502.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long-lived connections for streaming queries.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

