// Minimal subset of v2ray StatsService used to read per-user traffic counters
// from sing-box's experimental.v2ray_api endpoint.
//
// Upstream: https://github.com/v2fly/v2ray-core/blob/master/app/stats/command/command.proto
syntax = "proto3";

package v2ray.core.app.stats.command;

option go_package = "github.com/chameleonvpn/chameleon/internal/vpn/v2rayapi/command";

message GetStatsRequest {
    string name = 1;
    bool reset = 2;
}

message Stat {
    string name = 1;
    int64 value = 2;
}

message GetStatsResponse {
    Stat stat = 1;
}

message QueryStatsRequest {
    string pattern = 1;
    bool reset = 2;
}

message QueryStatsResponse {
    repeated Stat stat = 1;
}

message SysStatsRequest {}

message SysStatsResponse {
    uint32 NumGoroutine = 1;
    uint32 NumGC = 2;
    uint64 Alloc = 3;
    uint64 TotalAlloc = 4;
    uint64 Sys = 5;
    uint64 Mallocs = 6;
    uint64 Frees = 7;
    uint64 LiveObjects = 8;
    uint64 PauseTotalNs = 9;
    uint32 Uptime = 10;
}

service StatsService {
    rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {}
    rpc QueryStats(QueryStatsRequest) returns (QueryStatsResponse) {}
    rpc GetSysStats(SysStatsRequest) returns (SysStatsResponse) {}
}
