services:
  # ── Nginx — reverse proxy + admin SPA ──
  nginx:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: chameleon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true

  # ── Init: set xray config volume permissions ──
  xray-init:
    image: busybox:latest
    container_name: xray-init
    command: sh -c "chown -R 999:999 /etc/xray && chmod 775 /etc/xray"
    volumes:
      - xray-config:/etc/xray
    restart: "no"

  # ── Rust Backend ──
  backend:
    build: .
    container_name: chameleon-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://chameleon:${DB_PASSWORD}@postgres:5432/chameleon
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - RUST_LOG=info,sqlx=warn
      - XRAY_GRPC_HOST=xray
      - XRAY_STATS_PORT=10085
      - XRAY_CONFIG_DIR=/etc/xray
    depends_on:
      xray-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - xray-config:/etc/xray
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: chameleon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chameleon
      POSTGRES_USER: chameleon
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chameleon"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: chameleon-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID

  # ── Xray VPN ──
  xray:
    image: teddysun/xray:25.12.8
    container_name: xray
    restart: unless-stopped
    ports:
      - "2096:2096"
      - "2097:2097"
      - "2098:2098"
    volumes:
      - xray-config:/etc/xray
    healthcheck:
      test: ["CMD", "xray", "api", "statssys", "--server=127.0.0.1:10085"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ── sing-box Server (MUX support) ──
  singbox:
    image: ghcr.io/sagernet/sing-box:v1.13.5
    container_name: singbox
    restart: unless-stopped
    network_mode: host
    volumes:
      - xray-config:/etc/xray:ro
    command: ["run", "-c", "/etc/xray/singbox-config.json"]
    depends_on:
      backend:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  pgdata:
    name: chameleon-pgdata
  redisdata:
    name: chameleon-redisdata
  xray-config:
    name: chameleon-xray-config
