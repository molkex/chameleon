# ============================================================================
# Chameleon VPN — Docker Compose (single autonomous node)
# ============================================================================
# Each node runs: chameleon (Go backend) + postgres + redis + nginx
# sing-box runs as a STANDALONE container (outside compose) — see scripts/singbox-run.sh
# This ensures docker-compose operations NEVER restart singbox / drop VPN connections.
# ============================================================================

services:
  # ---------- docker-socket-proxy (MED-010, 2026-05-27) ----------
  # Filters the docker daemon API surface that the chameleon container can
  # reach. Replaces the direct /var/run/docker.sock RW bind into chameleon,
  # which was a container-escape-to-root vector if chameleon ever got
  # compromised (untrusted HTTP/webhook input).
  #
  # Whitelist scope: CONTAINERS=1 + POST=1.
  #   - CONTAINERS=1 enables /containers/* reads (needed for `docker ps`).
  #   - POST=1 enables POST endpoints including /containers/{id}/kill
  #     (needed for singbox HUP/TERM). POST=1 is broader than ideal — it
  #     also permits container start/stop/restart/create — but the proxy
  #     still blocks /exec, /networks, /volumes, /images create, /events,
  #     /swarm, etc. Net reduction in attack surface vs raw socket: large.
  #
  # Listen on 127.0.0.1:2375 because chameleon runs in network_mode: host.
  # Anyone with shell access on the host can still reach the proxy — that
  # accepts the same trust boundary as the host root user.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: docker-socket-proxy
    restart: unless-stopped
    # NOTE: `read_only: true` is intentionally NOT set. The entrypoint
    # regenerates /usr/local/etc/haproxy/haproxy.cfg from the .template
    # file shipped in the image at boot. A read_only root FS blocks the
    # write, and a tmpfs over /usr/local/etc/haproxy hides the template.
    # Hardening preserved: cap_drop ALL + no-new-privileges + minimal
    # whitelist + RO socket mount.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    environment:
      - CONTAINERS=1
      - POST=1
      - LOG_LEVEL=warning
    volumes:
      # Read-only mount of the host socket. The proxy never writes to it,
      # it only proxies requests through after the whitelist check.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:2375:2375"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

  # ---------- Go backend ----------
  chameleon:
    build: .
    container_name: chameleon
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./config.yaml:/etc/chameleon/config.yaml:ro
      - singbox-config:/etc/singbox
      # MED-010 (2026-05-27): docker socket bind removed. chameleon now
      # talks to docker via docker-socket-proxy on 127.0.0.1:2375 with a
      # narrow whitelist (containers read + POST for kill). See service
      # `docker-socket-proxy` above.
      #
      # BE-01b: ASC API .p8 key mounted read-only. The host-side path
      # /etc/chameleon/asc-key.p8 is provisioned out-of-band by deploy.sh
      # (scp from operator's ASC_KEY_PATH), chmod 600. The container path
      # matches the default ASC_KEY_PATH env var below so asc.New() finds
      # it without bespoke config. Optional: when the file is absent the
      # bind mount creates an empty dir/file, asc.New() returns nil and
      # the admin Status page renders an "ASC not configured" placeholder.
      - /etc/chameleon/asc-key.p8:/etc/chameleon/asc-key.p8:ro
      # MON-06: singbox handshake-failure aggregated log, written by
      # scripts/singbox-log-watcher.py via cron every minute. Mounted RO
      # so the admin endpoint reads but never writes (avoids accidental
      # truncation from inside the container).
      - /var/log/singbox-events.jsonl:/var/log/singbox-events.jsonl:ro
    environment:
      # sslmode=disable is safe here: PostgreSQL listens on 127.0.0.1 only (see ports below).
      # If DB is ever moved to an external host, MUST enable sslmode=require or sslmode=verify-full.
      - DATABASE_URL=postgres://chameleon:${DB_PASSWORD}@localhost:5432/chameleon?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@localhost:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - USER_API_SECRET=${USER_API_SECRET}
      - CLUSTER_SECRET=${CLUSTER_SECRET}
      - FREEKASSA_SHOP_ID=${FREEKASSA_SHOP_ID}
      - FREEKASSA_API_KEY=${FREEKASSA_API_KEY}
      - FREEKASSA_SECRET1=${FREEKASSA_SECRET1}
      - FREEKASSA_SECRET2=${FREEKASSA_SECRET2}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GOOGLE_IOS_CLIENT_ID=${GOOGLE_IOS_CLIENT_ID}
      - CHAMELEON_PROVIDERS_ENCRYPTION_KEY=${CHAMELEON_PROVIDERS_ENCRYPTION_KEY}
      - CHAMELEON_MSK_USER_API_SECRET=${CHAMELEON_MSK_USER_API_SECRET}
      # BE-01b: ASC API credentials. Optional — chameleon's asc.New()
      # returns nil when these are unset, and the admin's /status/apple
      # endpoint then renders an "ASC not configured" placeholder. Path
      # is the container-side mount above; the file itself is provisioned
      # by deploy.sh from the operator's local ASC_KEY_PATH.
      - ASC_KEY_ID=${ASC_KEY_ID:-}
      - ASC_ISSUER_ID=${ASC_ISSUER_ID:-}
      - ASC_KEY_PATH=/etc/chameleon/asc-key.p8
      - ASC_APP_ID=${ASC_APP_ID:-}
      # MED-010: routes `docker` CLI in this container to the local proxy.
      - DOCKER_HOST=tcp://127.0.0.1:2375
      # Shadowsocks inbound (WIP) — credential for /admin/ss-ws issuance.
      - SHADOWSOCKS_PASSWORD=${SHADOWSOCKS_PASSWORD}
      # SUPPORT-CHAT attachments (#2): Backblaze B2 (S3-compatible) presigned
      # upload/download. Optional — storage.NewFromEnv() returns nil when unset
      # and attachment endpoints degrade to 503. Same bucket as backups, support/ prefix.
      - B2_KEY_ID=${B2_KEY_ID:-}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY:-}
      - B2_BUCKET=${B2_BUCKET:-}
      - B2_ENDPOINT=${B2_ENDPOINT:-}
      - B2_REGION=${B2_REGION:-}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: chameleon-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: chameleon
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: chameleon
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chameleon"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: chameleon-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.25'
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Nginx (reverse proxy + admin SPA) ----------
  nginx:
    build:
      context: ../clients/admin
      dockerfile: Dockerfile
    container_name: chameleon-nginx
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing:/usr/share/nginx/html/landing:ro
    depends_on:
      chameleon:
        condition: service_healthy

  # ---------- node-exporter (host system metrics for Prometheus) ----------
  # MON-04: exposes CPU / RAM / disk / network counters from the HOST (not
  # the container) on :9100. host networking + /proc + /sys + / read-only
  # mounts are the documented setup for node_exporter — without them the
  # numbers reflect container PID-1 only.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: chameleon-node-exporter
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    pid: host
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.2'
    command:
      - '--path.rootfs=/host'
      - '--web.listen-address=127.0.0.1:9100'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--no-collector.ipvs'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave

  # ---------- Prometheus (metric scraping + 7-day TSDB) ----------
  # MON-04: scrapes chameleon (/metrics on 8000), node-exporter (9100), and
  # sing-box clash-api (9090). 7-day retention is enough to cover weekly
  # patterns without bloating the 1.9 GiB NL box. memory cap 128M is
  # comfortable for our cardinality (~50 series, 15s scrape).
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: chameleon-prometheus
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.listen-address=127.0.0.1:9091'
      - '--web.external-url=http://127.0.0.1:9091'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      chameleon:
        condition: service_healthy
      node-exporter:
        condition: service_started

  # ---------- Grafana (dashboards) ----------
  # MON-04: dashboards provisioned from ./grafana/. UI bound to 127.0.0.1
  # — nginx terminates external traffic at grafana.madfrog.online and
  # proxies in. Admin password from CHAMELEON_GRAFANA_PASSWORD env (set
  # by deploy.sh from ~/.secrets.env).
  grafana:
    image: grafana/grafana-oss:11.3.1
    container_name: chameleon-grafana
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${CHAMELEON_GRAFANA_PASSWORD}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SERVER_HTTP_ADDR=127.0.0.1
      - GF_SERVER_HTTP_PORT=3000
      - GF_SERVER_DOMAIN=grafana.madfrog.online
      - GF_SERVER_ROOT_URL=https://grafana.madfrog.online/
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  pgdata:
    name: chameleon-pgdata
    external: true
  redisdata:
    name: chameleon-redisdata
    external: true
  singbox-config:
    name: chameleon-singbox-config
    external: true
  prometheus-data:
    name: chameleon-prometheus-data
  grafana-data:
    name: chameleon-grafana-data
