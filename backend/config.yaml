# Chameleon VPN — Configuration
# Secrets use ${ENV_VAR} syntax and are resolved from environment variables.

server:
  host: "0.0.0.0"
  port: 8000

database:
  url: "${DATABASE_URL}"
  max_conns: 25
  min_conns: 5
  max_conn_lifetime: "1h"

redis:
  url: "${REDIS_URL}"

auth:
  jwt_secret: "${JWT_SECRET}"
  jwt_access_ttl: "24h"
  jwt_refresh_ttl: "720h"
  apple_bundle_id: "com.madfrog.vpn"

vpn:
  listen_port: 2096
  client_mtu: 1280
  dns_remote: "https://1.1.1.1/dns-query"
  dns_direct: "https://8.8.8.8/dns-query"
  urltest_interval: "5m"  # Was "30s"; with 80ms RTT delta between de-via-msk and de-direct-de + LTE jitter, 30s caused flapping every 30-47s and tore TLS mid-session. 5m makes urltest re-evaluate at most once per typical session.
  clash_api_port: 9090
  user_api_port: 15380
  user_api_secret: "${USER_API_SECRET}"
  hysteria2_port: 0
  tuic_port: 0
  udp_cert_path: ""
  udp_key_path: ""

  reality:
    private_key: "${REALITY_PRIVATE_KEY}"
    public_key: "${REALITY_PUBLIC_KEY}"
    short_ids:
      - ""
      - "0018e1ec"
      - "2802649f"
      - "3651cbce"
      - "76b9a282"
      - "9573cd02"
      - "dfc3e9ec"
      - "fb4dae0a"
      - "fe3c770e"
    snis:
      default: "ads.adfox.ru"

  servers: []

cluster:
  enabled: false
  node_id: ""
  secret: "${CLUSTER_SECRET}"
  sync_interval: "30s"
  reconcile_interval: "5m"
  pubsub_channel: "chameleon:sync"
  peers: []

# Relay user-api secrets. Each map key matches vpn_servers.key for a
# role='relay' row. URLs come from DB (vpn_servers.user_api_url);
# secrets stay out of DB and out of git.
relay:
  sync_interval: "30s"
  secrets:
    msk: "${CHAMELEON_MSK_USER_API_SECRET}"

rate_limit:
  mobile_per_minute: 60
  admin_per_minute: 120

payments:
  apple:
    bundle_id: "com.madfrog.vpn"
    allow_sandbox: false

  freekassa:
    enabled: true
    shop_id:  "${FREEKASSA_SHOP_ID}"
    api_key:  "${FREEKASSA_API_KEY}"
    secret1:  "${FREEKASSA_SECRET1}"
    secret2:  "${FREEKASSA_SECRET2}"
    base_url: "https://api.fk.life/v1"
    public_url: "https://madfrog.online"
    ip_whitelist:
      - "168.119.157.136"
      - "168.119.60.227"
      - "178.154.197.79"
      - "51.250.54.238"

  trial:
    enabled: true
    days: 3

  plans:
    - id: "m1"
      title: "1 месяц на 1 📱"
      days: 30
      price_rub: 229
      badge: ""
    - id: "m3"
      title: "3 месяца на 1 📱"
      days: 90
      price_rub: 599
      badge: "Хит"
    - id: "m6"
      title: "6 месяцев на 1 📱"
      days: 180
      price_rub: 1099
      badge: "Выгодно"
    - id: "m12"
      title: "12 месяцев на 1 📱"
      days: 365
      price_rub: 1999
      badge: "Максимум"
