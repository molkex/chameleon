# Prometheus scrape config — MON-04
#
# Scrapes:
#   - chameleon backend /metrics (port 8000, 127.0.0.1) — all our custom
#     instrumentation: VPN throughput, signups, payments, HTTP/DB latency,
#     Redis cache hit/miss, Go runtime. The backend ALSO polls sing-box's
#     clash API every 15s and re-emits the data as `chameleon_vpn_*`
#     metrics — so we get sing-box visibility through this single scrape.
#   - node_exporter (port 9100, 127.0.0.1) — host CPU / RAM / disk /
#     network from /proc + /sys.
#
# sing-box's clash API on :9090 emits JSON (/version, /connections,
# /traffic), NOT Prometheus text. We tried scraping it directly and
# Prometheus logged "404 Not Found" every 15s. The right path is via
# chameleon's MetricsRegistry.RefreshVPNStats() goroutine — already
# covered above. If we ever need raw sing-box internals (handshake
# durations etc.), add a sidecar exporter rather than expecting
# sing-box to grow a Prometheus endpoint.
#
# 15s scrape interval is comfortable for our cardinality (~50 series),
# and 7-day retention (set on the container command line) covers weekly
# patterns without storage pressure.
#
# All targets are localhost — Prometheus runs network_mode: host on NL.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    node: 'nl'

scrape_configs:
  # Chameleon backend — custom application metrics.
  - job_name: 'chameleon'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['127.0.0.1:8000']
        labels:
          service: 'chameleon'

  # node_exporter — host system metrics.
  - job_name: 'node'
    static_configs:
      - targets: ['127.0.0.1:9100']
        labels:
          service: 'node-exporter'
