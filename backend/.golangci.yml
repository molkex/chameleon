# golangci-lint v2 config.
#
# Replaces missing config — CI's `golangci-lint run` step has been failing
# since stage-b CI was wired (1102da8, 2026-04-23): the action was called
# without any config and resolved to a v1.x binary that does not support
# Go 1.25. Pinning to v2.x in the workflow and providing this minimal
# config makes the step actually exercise real linters.
#
# Scope:
# - govet, ineffassign, unconvert, misspell — cheap, high-signal,
#   no false-positive flood.
# - errcheck, staticcheck, unused — enabled 2026-05-28 after TD-LINT-01
#   cleanup pass (40 pre-existing findings fixed: unchecked
#   resp.Body.Close, deprecated grpc.DialContext / Redis SetNX / echo
#   TimeoutWithConfig, SA4000 typo in auth_blacklist_key_test.go, dead
#   configBuildMarker const + v2rayStatsClient.close method, unused test
#   scaffolding fields).
# - gocritic intentionally OFF — too opinionated for current codebase.

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - unconvert
    - misspell
    - errcheck
    - staticcheck
    - unused

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
