name: admin

on:
  pull_request:
    paths:
      - 'clients/admin/**'
      - '.github/workflows/admin.yml'
  push:
    branches: [main]
    paths:
      - 'clients/admin/**'
      - '.github/workflows/admin.yml'

jobs:
  unit:
    name: lint + unit + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/admin/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test --if-present

      - name: Build
        run: npm run build
