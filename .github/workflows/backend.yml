name: backend

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  unit:
    name: lint + unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        # v7 of the action is required for golangci-lint v2.x. v6 errors
        # with "golangci-lint v2 is not supported by golangci-lint-action
        # v6, you must update to golangci-lint-action v7".
        uses: golangci/golangci-lint-action@v7
        with:
          # Pinned to a v2.x release that supports Go 1.25.
          # `latest` previously resolved to a stale v1.x binary that
          # fails with "Go language version (go1.24) ... is lower than
          # the targeted Go version (1.25.4)". v2.12.2 was published
          # 2026-05-06.
          version: v2.12.2
          working-directory: backend
          args: --timeout=5m

      - name: Unit tests
        run: go test -race -count=1 ./...

      - name: Build
        run: go build ./...

  integration:
    name: integration (testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Integration tests
        run: go test -tags=integration -timeout=10m ./tests/integration/...

  scripts:
    name: ops scripts (shell regression tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Watchdog filter regression
        run: bash scripts/test/watchdog-filter-test.sh

      - name: Bash syntax sanity (all scripts/*.sh)
        run: |
          set -e
          for f in scripts/*.sh; do
            bash -n "$f"
            echo "OK  $f"
          done

  e2e:
    name: e2e (sing-box config check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install sing-box
        run: |
          curl -fsSL https://sing-box.app/install.sh | sh
          sing-box version

      - name: E2E tests
        run: go test -tags=e2e -timeout=5m ./tests/e2e/...
