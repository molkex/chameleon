name: ios-build-check

# Compile-only check for iOS app on every push to main + every PR.
# Guards against the "shipped to TestFlight but never committed" class of bugs
# (builds 50/51/52/53 went out without code on origin/main — never again).

on:
  pull_request:
    paths:
      - 'clients/apple/**'
      - '.github/workflows/ios-build-check.yml'
  push:
    branches: [main]
    paths:
      - 'clients/apple/**'
      - '.github/workflows/ios-build-check.yml'

jobs:
  build-check:
    name: build (simulator, no signing)
    runs-on: macos-15
    defaults:
      run:
        working-directory: clients/apple
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Fetch Libbox.xcframework
        id: libbox
        run: |
          if [ -x scripts/fetch-libbox.sh ]; then
            ./scripts/fetch-libbox.sh
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          else
            # See ios.yml — framework not in git, fetch script not
            # wired yet. Skip rather than redden every iOS PR.
            echo "::warning::scripts/fetch-libbox.sh missing — skipping compile check. Wire the script to re-enable CI link-time coverage."
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate xcodeproj
        if: steps.libbox.outputs.skip_build != 'true'
        run: xcodegen generate

      - name: Build iOS (simulator, compile-only)
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          xcodebuild \
            -project MadFrogVPN.xcodeproj \
            -scheme MadFrogVPN \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build \
            -quiet

      - name: SwiftLint (if config present)
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          if [ -f .swiftlint.yml ] || [ -f ../../.swiftlint.yml ]; then
            if ! command -v swiftlint >/dev/null 2>&1; then
              brew install swiftlint
            fi
            swiftlint --strict
          else
            echo "No .swiftlint.yml found — skipping lint"
          fi
