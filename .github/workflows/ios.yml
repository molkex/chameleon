name: ios

on:
  pull_request:
    paths:
      - 'clients/apple/**'
      - '.github/workflows/ios.yml'
  push:
    branches: [main]
    paths:
      - 'clients/apple/**'
      - '.github/workflows/ios.yml'

jobs:
  build:
    name: build (no signing)
    runs-on: macos-15
    defaults:
      run:
        working-directory: clients/apple
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Fetch Libbox.xcframework
        id: libbox
        run: |
          if [ -x scripts/fetch-libbox.sh ]; then
            ./scripts/fetch-libbox.sh
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          else
            # The framework is ~494 MB and not in git; the fetch
            # script that pulls it from artifact storage isn't wired
            # yet (TODO in CLAUDE.md). Skip the rest of the job with
            # a visible warning rather than failing every PR that
            # touches clients/apple/. Locally we still catch
            # regressions with `xcodebuild build` after `make lib_apple`.
            echo "::warning::scripts/fetch-libbox.sh missing — skipping iOS/macOS build. Wire the script to re-enable CI link-time coverage."
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate xcodeproj
        if: steps.libbox.outputs.skip_build != 'true'
        run: xcodegen generate

      - name: Build iOS (simulator, no signing)
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          xcodebuild build \
            -project MadFrogVPN.xcodeproj \
            -scheme MadFrogVPN \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build macOS (no signing)
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          xcodebuild build \
            -project MadFrogVPN.xcodeproj \
            -scheme MadFrogVPNMac \
            -destination 'generic/platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Run unit tests
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          if xcodebuild -list -project MadFrogVPN.xcodeproj | grep -q MadFrogVPNTests; then
            xcodebuild test \
              -project MadFrogVPN.xcodeproj \
              -scheme MadFrogVPNTests \
              -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "MadFrogVPNTests target not configured yet — skipping"
          fi
