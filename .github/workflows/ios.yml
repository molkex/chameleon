name: ios

on:
  pull_request:
    paths:
      - 'clients/apple/**'
      - '.github/workflows/ios.yml'
  push:
    branches: [main]
    paths:
      - 'clients/apple/**'
      - '.github/workflows/ios.yml'

jobs:
  build:
    name: build (no signing)
    runs-on: macos-15
    defaults:
      run:
        working-directory: clients/apple
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Fetch Libbox.xcframework
        id: libbox
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -x scripts/fetch-libbox.sh ]; then
            # Pulls the ~480 MB framework from the libbox-v* GitHub Release
            # asset (git-ignored binary, built via `make lib_apple`).
            ./scripts/fetch-libbox.sh
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          else
            # Fallback if the fetch script is ever removed: skip with a
            # visible warning rather than failing every clients/apple/ PR.
            echo "::warning::scripts/fetch-libbox.sh missing — skipping iOS/macOS build."
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate xcodeproj
        if: steps.libbox.outputs.skip_build != 'true'
        run: xcodegen generate

      - name: Build iOS (simulator, no signing)
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          xcodebuild build \
            -project MadFrogVPN.xcodeproj \
            -scheme MadFrogVPN \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build macOS (no signing)
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          xcodebuild build \
            -project MadFrogVPN.xcodeproj \
            -scheme MadFrogVPNMac \
            -destination 'generic/platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Run unit tests
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          # 2026-07-15: MadFrogVPNTests is now a HOST-LESS logic test target
          # (TEST_HOST/BUNDLE_LOADER removed in project.yml), so `test` actually
          # RUNS — no app launch, no app-group crash. Constants.sharedContainerURL
          # falls back to a temp dir under XCTest. This replaces the old
          # build-for-testing-only gate (which could only compile, and let two
          # stale tests rot invisibly). Needs a concrete simulator to run on.
          if xcodebuild -list -project MadFrogVPN.xcodeproj | grep -q MadFrogVPNTests; then
            SIM=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+' | head -1)
            xcodebuild test \
              -project MadFrogVPN.xcodeproj \
              -scheme MadFrogVPNTests \
              -destination "platform=iOS Simulator,name=${SIM:-iPhone 16}" \
              CODE_SIGNING_ALLOWED=NO \
              -quiet
          else
            echo "MadFrogVPNTests target not configured yet — skipping"
          fi
