name: ios

on:
  pull_request:
    paths:
      - 'clients/apple/**'
      - '.github/workflows/ios.yml'
  push:
    branches: [main]
    paths:
      - 'clients/apple/**'
      - '.github/workflows/ios.yml'

jobs:
  build:
    name: build (no signing)
    runs-on: macos-15
    defaults:
      run:
        working-directory: clients/apple
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Fetch Libbox.xcframework
        id: libbox
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -x scripts/fetch-libbox.sh ]; then
            # Pulls the ~480 MB framework from the libbox-v* GitHub Release
            # asset (git-ignored binary, built via `make lib_apple`).
            ./scripts/fetch-libbox.sh
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          else
            # Fallback if the fetch script is ever removed: skip with a
            # visible warning rather than failing every clients/apple/ PR.
            echo "::warning::scripts/fetch-libbox.sh missing — skipping iOS/macOS build."
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate xcodeproj
        if: steps.libbox.outputs.skip_build != 'true'
        run: xcodegen generate

      - name: Build iOS (simulator, no signing)
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          xcodebuild build \
            -project MadFrogVPN.xcodeproj \
            -scheme MadFrogVPN \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build macOS (no signing)
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          xcodebuild build \
            -project MadFrogVPN.xcodeproj \
            -scheme MadFrogVPNMac \
            -destination 'generic/platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build unit tests (compile-only)
        if: steps.libbox.outputs.skip_build != 'true'
        run: |
          # build-for-testing, NOT `test`: the iOS unit-test host crashes on
          # launch in an unsigned simulator build (the app-group container is
          # unavailable), so RUNNING the bundle is unreliable in CI. We compile
          # the test bundle as the gate — the project keeps its logic in pure,
          # host-independent helpers that this verifies. See test-map.yaml
          # (apple_note / build_for_testing).
          if xcodebuild -list -project MadFrogVPN.xcodeproj | grep -q MadFrogVPNTests; then
            xcodebuild build-for-testing \
              -project MadFrogVPN.xcodeproj \
              -scheme MadFrogVPNTests \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO \
              -quiet
          else
            echo "MadFrogVPNTests target not configured yet — skipping"
          fi
