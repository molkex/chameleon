name: backend-test

# Minimal vet + unit-test gate for Go backend on every push to main + every PR.
# Companion to the broader backend.yml (lint/integration/e2e); this one is the
# fast guardrail that must pass before deploy.sh is allowed to run.

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-test.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-test.yml'

jobs:
  test:
    name: vet + short tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test -short
        run: go test ./... -short
