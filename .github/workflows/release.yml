name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build release binary
        working-directory: backend
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --bin chameleon-server --features full

      - name: Package binary
        run: |
          mkdir -p release
          cp backend/target/release/chameleon-server release/
          cp -r backend/migrations release/
          cd release && tar czf ../chameleon-backend-linux-amd64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: chameleon-backend-linux-amd64.tar.gz

  build-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Build admin
        working-directory: admin
        run: npm ci && npm run build

      - name: Package admin
        run: cd admin/dist && tar czf ../../chameleon-admin-dist.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: chameleon-admin-dist.tar.gz

  release:
    needs: [build-backend, build-admin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Auto-built from main branch.
            Commit: ${{ github.sha }}
          files: |
            backend-binary/chameleon-backend-linux-amd64.tar.gz
            admin-dist/chameleon-admin-dist.tar.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
