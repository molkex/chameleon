# Proxy node server: standalone xray-core + MTProxy + health check agent
# This runs on Netherlands / Germany / any proxy node
#
# xray-core config is pushed from Moscow bot via SSH (XrayController._sync_nodes)
# xray config is managed directly via SSH from Moscow
services:
  xray:
    image: teddysun/xray:1.8.24
    container_name: xray
    restart: always
    network_mode: host
    volumes:
      - ./xray_config:/etc/xray
    command: ["xray", "run", "-config", "/etc/xray/config.json"]
    healthcheck:
      test: ["CMD-SHELL", "grep -q 0830 /proc/net/tcp /proc/net/tcp6 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MTProxy: Telemt (Rust + Tokio) — замена mtg
  # Защита от active probing: при подключении без секрета отдаёт настоящий сайт
  # Откат на mtg: заменить image на nineseconds/mtg:2, volume на mtg_config.toml
  telemt:
    image: whn0thacked/telemt-docker:latest
    container_name: telemt_proxy
    restart: unless-stopped
    ports:
      - "443:20051/tcp"
      - "2053:20051/tcp"
      - "8443:20051/tcp"
    volumes:
      - ./telemt.toml:/etc/telemt.toml:ro
    environment:
      RUST_LOG: "info"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Hysteria2: UDP-based VPN protocol with salamander obfuscation
  # Self-signed cert generated on first start (clients use insecure=1)
  # Port 8443/UDP — does NOT conflict with telemt 8443/TCP
  hysteria2:
    image: tobyxdd/hysteria:v2
    container_name: hysteria2
    restart: always
    ports:
      - "8443:8443/udp"
    volumes:
      - ./hysteria2:/etc/hysteria2
    environment:
      - HY2_PASSWORD=${HY2_PASSWORD}
      - HY2_OBFS_PASSWORD=${HY2_OBFS_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Generate self-signed cert if missing
        if [ ! -f /etc/hysteria2/cert.pem ]; then
          openssl req -x509 -nodes -newkey ec:<(openssl ecparam -name prime256v1) \
            -keyout /etc/hysteria2/key.pem -out /etc/hysteria2/cert.pem \
            -subj "/CN=rutube.ru" -days 3650
        fi
        # Substitute env vars in config
        sed "s/\$${HY2_PASSWORD}/$HY2_PASSWORD/g; s/\$${HY2_OBFS_PASSWORD}/$HY2_OBFS_PASSWORD/g" \
          /etc/hysteria2/config.yaml > /tmp/config.yaml
        exec /app/hysteria server -c /tmp/config.yaml
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  proxy-healthcheck:
    image: python:3.11-slim
    container_name: proxy_healthcheck
    restart: always
    ports:
      - "8099:8099"
    volumes:
      - ./proxy_healthcheck.py:/app/healthcheck.py:ro
    environment:
      - HEALTHCHECK_KEY=${HEALTHCHECK_KEY:-healthcheck}
    command: python /app/healthcheck.py
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
