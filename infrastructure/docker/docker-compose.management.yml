# Moscow management server: XrayController + Bot + Admin + Nginx + PostgreSQL
# HA Phase 1: Admin runs as separate service (independent restarts).
# HA Phase 3: Blue-Green deployment — two slots for bot + admin.
#   Blue = default (always running). Green = inactive (starts during deploy).
#   Deploy: build green → start green → health check → switch nginx → stop blue.
# HA Phase 4: PostgreSQL WAL + open ports for NL standby replication.
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "127.0.0.1:5432:5432"  # Localhost only — use SSH/WireGuard for replication
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=3
      - -c
      - wal_keep_size=256MB
    environment:
      - POSTGRES_USER=chameleon
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=chameleon
      - PG_REPLICATION_PASSWORD=${PG_REPLICATION_PASSWORD:-}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/pg_init_replication.sh:/docker-entrypoint-initdb.d/init-replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chameleon"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"  # Localhost only — use SSH/WireGuard for replication
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Standalone xray-core — managed by XrayController (ports 2096 TCP, 2097 XHTTP)
  xray:
    image: teddysun/xray:1.8.24
    container_name: xray
    restart: always
    network_mode: host
    volumes:
      - ./xray_config:/etc/xray
    command: ["xray", "run", "-config", "/etc/xray/config.json"]
    healthcheck:
      test: ["CMD-SHELL", "grep -q 0830 /proc/net/tcp /proc/net/tcp6 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./upstream.conf:/etc/nginx/conf.d/upstream.conf
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./bot/static:/static:ro
      - ./uploads:/uploads:ro
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── BLUE slot (default, always running) ──
  bot-blue:
    build: ./bot
    container_name: bot-blue
    restart: always
    env_file: .env
    volumes:
      - ./bot:/app/bot
      - ./data:/app/data

      - ./xray_config:/etc/xray
      # docker.sock removed for security — use xray gRPC API instead
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      xray:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://chameleon:${POSTGRES_PASSWORD}@127.0.0.1:5432/chameleon
      - DB_PATH=/app/data/chameleon.db
      - REDIS_URL=redis://127.0.0.1:6379/0
      - INSTANCE_ID=blue
      - BOT_WEBHOOK_PORT=8082
    network_mode: host
    stop_grace_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin-blue:
    build: ./bot
    container_name: admin-blue
    restart: always
    env_file: .env
    volumes:
      - ./bot:/app/bot
      - ./data:/app/data
      - ./xray_config:/etc/xray
      # docker.sock removed for security — use xray gRPC API instead
      - ./uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://chameleon:${POSTGRES_PASSWORD}@127.0.0.1:5432/chameleon
      - DB_PATH=/app/data/chameleon.db
      - REDIS_URL=redis://127.0.0.1:6379/0
      - ADMIN_PORT=8081
      - INSTANCE_ID=blue
    network_mode: host
    command: ["python", "bot/admin_server.py"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── GREEN slot (inactive by default, starts during blue-green deploy) ──
  bot-green:
    build: ./bot
    container_name: bot-green
    restart: "no"
    profiles: ["green"]
    env_file: .env
    volumes:
      - ./bot:/app/bot
      - ./data:/app/data

      - ./xray_config:/etc/xray
      # docker.sock removed for security — use xray gRPC API instead
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      xray:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://chameleon:${POSTGRES_PASSWORD}@127.0.0.1:5432/chameleon
      - DB_PATH=/app/data/chameleon.db
      - REDIS_URL=redis://127.0.0.1:6379/0
      - INSTANCE_ID=green
      - BOT_WEBHOOK_PORT=8083
    network_mode: host
    stop_grace_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin-green:
    build: ./bot
    container_name: admin-green
    restart: "no"
    profiles: ["green"]
    env_file: .env
    volumes:
      - ./bot:/app/bot
      - ./data:/app/data
      - ./xray_config:/etc/xray
      # docker.sock removed for security — use xray gRPC API instead
      - ./uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://chameleon:${POSTGRES_PASSWORD}@127.0.0.1:5432/chameleon
      - DB_PATH=/app/data/chameleon.db
      - REDIS_URL=redis://127.0.0.1:6379/0
      - ADMIN_PORT=8084
      - INSTANCE_ID=green
    network_mode: host
    command: ["python", "bot/admin_server.py"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8084/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  support_bot:
    build: ./support_bot
    restart: always
    environment:
      - SUPPORT_BOT_TOKEN=${SUPPORT_BOT_TOKEN}
      - SUPPORT_FORUM_GROUP_ID=${SUPPORT_FORUM_GROUP_ID}
      - SUPPORT_DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # AdGuard Home: installed as systemd service (not Docker)
  # DNS: 127.0.0.1:5353, Admin UI: 127.0.0.1:3000
  # Binary: /opt/adguardhome/AdGuardHome
  # Config: /opt/adguardhome/conf/AdGuardHome.yaml
  # Service: systemctl status adguardhome

  # MTProxy: Telemt (Rust + Tokio) — замена alexbers/mtprotoproxy
  # Защита от active probing: при подключении без секрета отдаёт настоящий сайт
  # Откат: заменить на alexbers/mtprotoproxy:latest с SECRET=${MTPROXY_SECRET}
  telemt:
    image: whn0thacked/telemt-docker:latest
    container_name: telemt_proxy
    restart: unless-stopped
    ports:
      - "20051:20051/tcp"
      - "2053:20051/tcp"
      - "8443:20051/tcp"
    volumes:
      - ./infrastructure/telemt.toml:/etc/telemt.toml:ro
    environment:
      RUST_LOG: "info"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  proxy-healthcheck:
    build:
      context: ./infrastructure
      dockerfile: Dockerfile.healthcheck
    container_name: proxy_healthcheck
    restart: always
    ports:
      - "8099:8099"
    environment:
      - HEALTHCHECK_KEY=${HEALTHCHECK_KEY:-healthcheck}  # Separate key, not bot token
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redis_data:
