# ── Upstream backends (HA Phase 3: blue-green switching) ──
# Managed by deploy script via upstream.conf, loaded from /etc/nginx/conf.d/
# upstream bot_backend { server 127.0.0.1:8082; }    — blue
# upstream admin_backend { server 127.0.0.1:8081; }   — blue

# ── Subscription cache (5 min TTL, reduces Marzban load) ──
proxy_cache_path /tmp/nginx_sub_cache levels=1:2 keys_zone=sub_cache:10m max_size=100m inactive=5m use_temp_path=off;

# ── Rate limiting zones ──
limit_req_zone $binary_remote_addr zone=admin_zone:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=webhook_zone:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=admin_api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=global_zone:10m rate=20r/s;

# ── Block malicious scanners by User-Agent ──
map $http_user_agent $bad_bot {
    default 0;
    ~*(?:sqlmap|nikto|nmap|masscan|zgrab|nuclei|gobuster|dirbuster|wpscan|acunetix|nessus|openvas|burpsuite) 1;
}

# ── Block known malicious paths early (returns 444 = drop connection) ──
map $request_uri $block_uri {
    default 0;
    ~*(?:\.php$|\.asp$|\.aspx$|\.jsp$|\.cgi$) 1;
    ~*(?:wp-admin|wp-login|wp-includes|wp-content|wordpress|xmlrpc) 1;
    ~*(?:\.env$|\.git|\.svn|\.hg|\.DS_Store) 1;
    ~*(?:phpmyadmin|phpinfo|adminer|manager/html) 1;
    ~*(?:shell|eval|base64_decode|passthru|exec\() 1;
}

# ── Cloudflare: restore real client IPs ──
# https://www.cloudflare.com/ips-v4/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# ── HTTP (port 80) ──
server {
    listen 80;
    server_name razblokirator.ru madfrog.online mdfrog.site crew.madfrog.online _;

    # Block bad bots and malicious URIs early
    if ($bad_bot) { return 444; }
    if ($block_uri) { return 444; }

    # Let's Encrypt challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Subscription URLs — redirect to HTTPS (credentials in URLs must be encrypted)
    location /sub {
        return 301 https://$host$request_uri;
    }

    # Antiblock config (VPN apps fetch over HTTP)
    location /antiblock/ {
        proxy_pass http://admin_backend/antiblock/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache sub_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Sing-box combined subscription (VPN apps fetch over HTTP)
    location /singbox/ {
        proxy_pass http://admin_backend/singbox/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache sub_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # App connect redirect page (opens VPN apps via browser)
    location = /connect {
        alias /static/connect.html;
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # /diag → redirect to /vpntest (legacy URL)
    location = /diag {
        return 301 /vpntest$is_args$args;
    }

    # VPN test page
    location = /vpntest {
        alias /static/vpntest.html;
        default_type text/html;
    }

    # Speed test endpoints (for vpntest multi-stream measurement)
    location /speedtest/download {
        alias /static/speedtest-25mb.bin;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Content-Length" always;
        add_header X-Accel-Buffering "no" always;
    }
    location /speedtest/upload {
        client_max_body_size 10m;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' '0';
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        return 200 "ok";
    }
    location = /speedtest/ping {
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 "pong";
    }

    # Health check for watchdog (NL auto-failover)
    location = /health {
        proxy_pass http://bot_backend/health;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── razblokirator.ru — Let's Encrypt ──
server {
    listen 443 ssl;
    server_name razblokirator.ru;

    ssl_certificate /etc/letsencrypt/live/razblokirator.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/razblokirator.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';" always;

    # Block bad bots and malicious URIs early
    if ($bad_bot) { return 444; }
    if ($block_uri) { return 444; }

    # App connect redirect page
    location = /connect {
        alias /static/connect.html;
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # /diag → redirect to /vpntest (legacy URL)
    location = /diag {
        return 301 /vpntest$is_args$args;
    }

    # VPN test page
    location = /vpntest {
        alias /static/vpntest.html;
        default_type text/html;
    }

    # Speed test endpoints (for vpntest multi-stream measurement)
    location /speedtest/download {
        alias /static/speedtest-25mb.bin;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Content-Length" always;
        add_header X-Accel-Buffering "no" always;
    }
    location /speedtest/upload {
        client_max_body_size 10m;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' '0';
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        return 200 "ok";
    }
    location = /speedtest/ping {
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 "pong";
    }

    # Prometheus metrics endpoint (no admin auth, IP-restricted to localhost)
    location = /metrics {
        allow 127.0.0.1;
        allow 85.239.49.28;
        deny all;
        proxy_pass http://admin_backend/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin Panel static files (no rate limit)
    location /admin/statics {
        proxy_pass http://admin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1h;
    }

    # Admin Panel (rate-limited)
    location /admin {
        limit_req zone=admin_zone burst=30 nodelay;
        proxy_pass http://admin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://admin_backend/ https://$host/;
    }

    # Dashboard redirect → admin panel
    location /dashboard {
        return 302 /admin/app/;
    }

    # VLESS WebSocket (Cloudflare CDN → nginx → xray WS inbound)
    location /vless-ws {
        proxy_pass http://127.0.0.1:2099;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API v1 (React SPA backend)
    location /api/v1/ {
        proxy_pass http://admin_backend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Diagnostic API (public, no auth)
    location /api/diag/ {
        proxy_pass http://admin_backend/api/diag/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # VPN test API (public, no auth)
    location /api/vpntest/ {
        proxy_pass http://admin_backend/api/vpntest/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket diagnostic endpoint
    location /ws/diag {
        proxy_pass http://admin_backend/ws/diag;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Monitor API (Bot Admin)
    location /api/monitor/ {
        proxy_pass http://admin_backend/api/monitor/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payment webhooks — rate-limited
    location /api/webhooks/ {
        limit_req zone=webhook_zone burst=5 nodelay;
        proxy_pass http://admin_backend/api/webhooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Telegram bot webhook (HA Phase 2: webhook mode instead of polling)
    location /bot/ {
        proxy_pass http://bot_backend/bot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # API — rate limited
    location /api {
        limit_req zone=global_zone burst=30 nodelay;
        proxy_pass http://admin_backend/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Subscription URLs → admin_backend (XrayController)
    location /sub {
        proxy_pass http://admin_backend/sub;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User-Agent $http_user_agent;
        proxy_cache sub_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Short referral links
    location ~ "^/r/(\d+)$" {
        return 302 https://t.me/MadFrogRobot?start=ref_$1;
    }

    # Favicon
    location = /favicon.svg {
        alias /static/favicon.svg;
        default_type image/svg+xml;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SEO files
    location = /sitemap.xml {
        alias /static/sitemap.xml;
        default_type application/xml;
    }
    location = /robots.txt {
        alias /static/robots.txt;
        default_type text/plain;
    }

    # Landing page
    location = / {
        root /;
        try_files /static/index.html =404;
        default_type text/html;
    }

    # Antiblock config — cached 5 min
    location /antiblock/ {
        proxy_pass http://admin_backend/antiblock/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache sub_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Sing-box combined subscription — cached 5 min
    location /singbox/ {
        proxy_pass http://admin_backend/singbox/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache sub_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Webapp profile (personal dashboard)
    location /webapp/ {
        proxy_pass http://admin_backend/webapp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AdGuard Home admin panel (DNS ad-blocking management)
    location /dns-admin/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AdGuard Home has its own auth
    }

    # DNS-over-HTTPS endpoint → AdGuard Home (for sing-box client DNS)
    # Clients send DoH queries through VPN tunnel → nginx → AdGuard Home
    location = /dns-query {
        proxy_pass http://127.0.0.1:3000/dns-query;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # No caching — AdGuard Home has its own DNS cache
        proxy_buffering off;
    }

    # Catch-all → admin backend
    location / {
        limit_req zone=global_zone burst=5 nodelay;
        proxy_pass http://admin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

