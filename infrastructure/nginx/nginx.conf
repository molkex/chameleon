# ── speedtest.madfrog.online — Speed Test ──
server {
    listen 443 ssl;
    server_name speedtest.madfrog.online;

    ssl_certificate /etc/letsencrypt/live/madfrog.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/madfrog.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_ST:10m;

    # Speedtest page
    location = / {
        root /;
        try_files /static/speedtest.html =404;
        default_type text/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Test download file (25MB, generated during deploy)
    location /download {
        alias /static/speedtest-25mb.bin;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Content-Length" always;
        # Disable CF buffering for streaming speed test
        add_header X-Accel-Buffering "no" always;
    }

    # Upload endpoint for upload speed test (discard body)
    location /upload {
        client_max_body_size 10m;
        # CORS preflight — add_header MUST be inside if block for nginx
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' '0';
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        return 200 "ok";
    }

    # Ping endpoint
    location /ping {
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 "pong";
    }

    # Speedtest save API — proxy to admin backend
    location = /api/speedtest/save {
        proxy_pass http://admin_backend/api/speedtest/save;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 16k;
    }

    # Favicon
    location = /favicon.svg {
        alias /static/favicon.svg;
        default_type image/svg+xml;
        expires 30d;
    }
}

