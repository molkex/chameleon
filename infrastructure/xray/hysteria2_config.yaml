# Hysteria2 server config for VPN nodes (NL/DE)
# Deploy: copy to /root/telegram_vpn_bot/hysteria2_config.yaml on each node
# Self-signed TLS cert generated on first run (clients use insecure=1)

listen: :8443

tls:
  cert: /etc/hysteria2/cert.pem
  key: /etc/hysteria2/key.pem

auth:
  type: password
  password: ${HY2_PASSWORD}

obfs:
  type: salamander
  salamander:
    password: ${HY2_OBFS_PASSWORD}

masquerade:
  type: proxy
  proxy:
    url: https://rutube.ru
    rewriteHost: true

bandwidth:
  up: 1 gbps
  down: 1 gbps
