# Chameleon VPN Infrastructure Topology
# Last verified: 2026-05-26 (post-DE retirement)
# Sources: backend/config.yaml, migrations/, clients/apple/Constants.swift, clientconfig.go, DebugLogsView.swift
#
# ⚠️ SINGLE-NL WORLD — DE retired 2026-05-25. Only NL `147.45.252.234`
#    serves production traffic. MSK relay fronts api.madfrog.online for
#    RU users. The `de:` block below is kept for historical context only
#    (`status: retired`). Do NOT use 162.19.242.30 in any deploy/recipe.

servers:
  de:
    status: retired           # 2026-05-25 OVH договор истёк, не продлевался
    retired_at: 2026-05-25
    ip: 162.19.242.30
    hosting: OVH Frankfurt
    provider: OVH
    role: retired vpn node + api backend (historical)
    location: Frankfurt, Germany
    sni: from-db  # vpn_servers.sni — verify on server: SELECT sni FROM vpn_servers WHERE id=3
    sni_fallback: ads.adfox.ru  # used if DB sni empty (clientconfig.go:33)
    inbounds:
      # Server-side singbox config NOT in repo — actual listening ports per memory project_vpn_tunnel_broken.md (2026-04-23):
      - protocol: vless-reality
        port: 443
        transport: tcp
      - protocol: hysteria2
        port: 443
        transport: udp
      - protocol: tuic-v5
        port: 8443
        transport: udp
    client_outbound_ports:
      # What iOS client connects to — comes from vpn_servers.port column
      vless_port: from-db  # SELECT port FROM vpn_servers WHERE id=3 — likely 443 to match relay
      hysteria2_port: 443  # migration 009_new_protocols.sql
      tuic_port: 8443

  nl:
    ip: 147.45.252.234
    hosting: Timeweb
    provider: Timeweb
    role: sole production vpn node (post-2026-05-25 DE retirement)
    location: Netherlands
    sni: ads.adfox.ru  # verified 2026-05-27: vpn_servers row id=93 key=nl2
    sni_fallback: ads.adfox.ru
    inbounds:
      # 2026-05-27 correction: actual listening port is 443 (verified via
      # `ss -tlnp` on the node), not 2096. iOS DB row vpn_servers.port=443
      # matches. MadFrogRobot bot on MSK still hardcodes 2096 and spams
      # "VPN port 2096 NOT LISTENING" — bot fix tracked separately.
      - protocol: vless-reality
        port: 443
        transport: tcp
      # No Hysteria2/TUIC on NL per memory (NULL in DB)
    client_outbound_ports:
      vless_port: 443

  spb_relay:
    ip: 185.218.0.43
    hosting: unknown
    role: tcp relay (russia-side) for users behind gfw
    location: Saint Petersburg, Russia
    relay_mapping:
      # Updated 2026-05-27 (later): nginx fix on the SPB box redirected
      # ALL former DE-bound stream upstreams to NL:443 (chameleon-stream.conf).
      # Also api-proxy.conf for HTTP:80 /api/* path now points at NL:80
      # (was 162.19.242.30:80 which had been dead since DE retire 05-25).
      tcp_443:  nl:443       # was DE:443 pre-2026-05-27, now NL:443
      tcp_2096: nl:443       # was DE:443 pre-2026-05-27, now NL:443
      tcp_2098: nl:443       # always was NL — sprayed as :2098 on relay
      http_80:  nl:80        # was DE:80 pre-2026-05-27, now NL:80, Host=api.madfrog.online
    config_source_of_truth: infrastructure/spb-relay/  # mirror of live /etc/nginx/* on box-900774

  msk_api_relay:
    status: active            # 2026-05-22 migration — see project_de_nl_migration.md
    ip: 217.198.5.52
    hosting: TimeWeb MSK VPS
    role: api endpoint relay (ACTIVE — fronts api.madfrog.online)
    location: Moscow, Russia
    upstream: nl2:80          # nginx forwards HTTPS termination → NL :80 (HTTP-only there)
    notes: "Production gateway for /v1/* — api.madfrog.online DNS A-record points here (not Cloudflare). Repointed to NL upstream 2026-05-22 after DE retirement preparation."

# API Communication paths (iOS → Backend)
# Updated 2026-05-27: scrubbed retired DE direct-IP legs; primary now lands
# on NL via MSK relay for api.madfrog.online (DE retired 2026-05-25).
api_race:
  primary:
    - host: api.madfrog.online
      via: msk_api_relay  # DNS A-record → 217.198.5.52, nginx upstream → nl:80
      scheme: https
      port: 443
      sni_spoof: false
      timeout_sec: 8
      source: clients/apple/Shared/Constants.swift:10

  # AppConfig.directBackendIPs as of build 88 — see
  # clients/apple/Shared/Constants.swift:22. The list still has
  # 162.19.242.30 in code (not yet pruned) but RU users skip it via the
  # ASN-block carveout in APIClient.swift dataWithFallback.
  fallback_direct_ips:
    - host: 147.45.252.234
      port: 443
      scheme: https
      sni_spoof: true
      cert_validation: enforced  # H-002b 2026-05-27 — DirectConnection now binds SecPolicyCreateSSL to SNI
      transport: nwconnection
      timeout_sec: 6
      priority: 1
    - host: 185.218.0.43
      port: 80
      scheme: http
      sni_spoof: false
      timeout_sec: 6
      priority: 2
    - host: 162.19.242.30
      status: retired-still-in-client-pool  # 2026-05-25 retired; pruned from RU race via region carveout, will be removed from Constants.swift in next build
      port: 443
      scheme: https
      sni_spoof: true
      transport: nwconnection
      timeout_sec: 6
      priority: 3

  race_strategy: "fastest first, cascade if 4xx/5xx/timeout; sensitive endpoints (auth, refresh, magic, payments) skip direct-IP and HTTP:80 legs (H-001/H-002)"
  fallback_session: "URLSession (default cert validation, NL primary); NWConnection direct legs validate cert against SNI (H-002b)"

# VPN Client config structure
vpn_client_config:
  inbounds:
    - type: tun
      tag: tun-in
      address: [172.19.0.1/30]
      mtu: 1280
      stack: system
      auto_route: true

  outbounds:
    - type: vless
      per_server: true
      flow: xtls-rprx-vision
      packet_encoding: xudp
      tls:
        utls: chrome
        reality: per_server_key
    - type: hysteria2
      per_server: true
      tls:
        insecure: true
    - type: tuic
      per_server: true
      congestion_control: bbr
      tls:
        insecure: true
    - type: selector
      tag: Proxy
      members: "[Auto, all_server_outbounds]"
      default: Auto
      interrupt_exist_connections: false
    - type: urltest
      tag: Auto
      members: "[all_server_outbounds]"
      url: "https://cp.cloudflare.com"
      interval: 3m
      tolerance: 100ms
      interrupt_exist_connections: false
    - type: selector
      tag: "RU Traffic"
      members: [direct, Proxy]
      default: direct
      interrupt_exist_connections: true
    - type: selector
      tag: "Blocked Traffic"
      members: [Proxy, direct]
      default: Proxy
      interrupt_exist_connections: true
    - type: selector
      tag: "Default Route"
      members: [direct, Proxy]
      default: direct
      interrupt_exist_connections: true
    - type: direct
      tag: direct
    - type: block
      tag: block

  dns:
    servers:
      - tag: dns-remote
        type: https
        server: 1.1.1.1
      - tag: dns-direct
        type: https
        server: 77.88.8.8
      - tag: dns-fakeip
        type: fakeip
        inet4_range: 198.18.0.0/15
    rules:
      - domain_suffix: [.ru]
        server: dns-direct
      - domain_suffix: "[ru_always_direct_domains]"
        server: dns-direct

  routing:
    rules:
      - action: sniff
      - protocol: dns
        action: hijack-dns
      - clash_mode: Direct
        outbound: direct
      - network: udp
        port: 443
        action: reject
        no_drop: true
      - ip_is_private: true
        outbound: direct
      - domain_suffix: "[ru_always_direct_domains]"
        outbound: direct
      - rule_set: refilter
        outbound: "Blocked Traffic"
      - domain_suffix: [.ru]
        outbound: "RU Traffic"
      - rule_set: geoip-ru
        outbound: "RU Traffic"
    final: "Default Route"
    rule_sets:
      - tag: geoip-ru
        type: remote
        format: binary
        url: "https://raw.githubusercontent.com/SagerNet/sing-geoip/rule-set/geoip-ru.srs"
        download_detour: direct
        update_interval: 168h
      - tag: refilter
        type: remote
        format: binary
        url: "https://raw.githubusercontent.com/teidesu/rkn-singbox/ruleset/rkn-ruleset.srs"
        download_detour: direct
        update_interval: 168h

# UI Server representation (iOS app)
# Updated 2026-05-27: dropped retired DE leaves (de_direct, relay_de,
# h2_de, tuic_de). NL is the only direct country; SPB relay still hosts a
# bypass-leaf into NL for gfw-restricted regions.
ui_servers:
  - tag: nl_direct
    display: "Netherlands"
    country_code: NL
    flag: 🇳🇱
    type: direct
    outbound_base: "VLESS 🇳🇱 Netherlands"
    note: "Timeweb, sole production node post-2026-05-25"

  - tag: relay_nl
    display: "Netherlands (relay)"
    country_code: NL
    flag: 🇳🇱
    type: relay
    relay_via: spb_relay
    relay_target: nl:443
    outbound_base: "VLESS 🇳🇱 Netherlands (via relay)"
    note: "SPB(185.218.0.43):2098 → NL:443 — bypass-leaf for gfw-restricted regions"

# Auto selector membership (urltest group)
# Updated 2026-05-27: single-NL world. With one country in the pool the
# fallback cascade does NOT escalate to the bypass relay unless nl_direct
# AND nl_direct via bypass both fail (P1-3 audit, see
# AppStateFallbackTests.swift).
auto_selector:
  tag: Auto
  members:
    - nl_direct
    - relay_nl
  test_url: "https://cp.cloudflare.com"
  test_interval: "3m"
  tolerance_ms: 100
  note: "Single-NL: relay_nl serves as the bypass-leaf when nl_direct degrades"

# Routing modes (iOS app selector)
routing_modes:
  - id: smart
    display_name: "Smart (Recommended)"
    ru_traffic: direct
    blocked_traffic: Proxy
    default_route: direct
    description: "Only blocked sites through VPN, Russian sites direct"

  - id: ru-direct
    display_name: "РФ напрямую"
    ru_traffic: direct
    blocked_traffic: Proxy
    default_route: Proxy
    description: "Russian traffic direct, everything else through VPN"

  - id: full-vpn
    display_name: "Full VPN"
    ru_traffic: Proxy
    blocked_traffic: Proxy
    default_route: Proxy
    description: "All traffic through VPN"

