# HTTP — ACME challenge + everything else is proxied too
# (before TLS cert is obtained). Certbot --nginx will
# automatically add the 443 server block later.
server {
    server_name api.madfrog.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SUPPORT-CHAT SSE live stream (step 4b, 2026-06-04) — long-lived EventSource.
    # The default location's 30s proxy_read_timeout would cut the stream.
    location ~ ^/api/(v1/)?mobile/support/stream {
        proxy_pass http://147.45.252.234:80;
        proxy_set_header Host madfrog.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 8s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://147.45.252.234:80;
        proxy_set_header Host madfrog.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-Host $host;
        proxy_http_version 1.1;
        proxy_connect_timeout 8s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.madfrog.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.madfrog.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = api.madfrog.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name api.madfrog.online;
    return 404; # managed by Certbot


}