# RU-DECOY-SNI (2026-06-17): identical upstream to api.madfrog.online, but
# fronted under SNI=ads.adfox.ru so RKN TSPU (which RSTs the api.madfrog.online
# SNI on the TLS ClientHello) never flags the handshake. The iOS client dials
# MSK:443 with ClientHello SNI=ads.adfox.ru and pins this self-signed cert.
# Host is force-rewritten to madfrog.online so NL routes identically to the
# real api front. ads.adfox.ru = Yandex adfox, RKN does not block its own SNI.
server {
    server_name ads.adfox.ru;

    location ~ ^/api/(v1/)?mobile/support/stream {
        proxy_pass http://147.45.252.234:80;
        proxy_set_header Host madfrog.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 8s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://147.45.252.234:80;
        proxy_set_header Host madfrog.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-Host $host;
        proxy_http_version 1.1;
        proxy_connect_timeout 8s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/nginx/decoy/adfox.crt;
    ssl_certificate_key /etc/nginx/decoy/adfox.key;
}
