# Updated 2026-05-27: DE (162.19.242.30) retired, upstream switched to NL.
# This relay accepts /api/* on :80 from RU users whose Cloudflare path is
# blocked and forwards to NL backend over HTTP (port 80 only on NL —
# nginx in chameleon-nginx container terminates HTTPS, internal HTTP is
# fine since NL is single-host).
server {
    listen 80 default_server;
    server_name _;

    location /api/ {
        proxy_pass http://147.45.252.234:80;
        proxy_set_header Host api.madfrog.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}
