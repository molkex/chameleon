# RU-DECOY-2ND (PRODUCT-MATURITY-LOOP 2026-06-21) — SPB second decoy leg.
# Deployed to SPB at /etc/nginx/conf.d/decoy-adfox.conf.
#
# WHY: real-data finding 2026-06-21 — RU sign-in transport is only CF + the MSK
# clean-SNI decoy, i.e. the decoy was a single point of failure. This adds a 2nd
# clean-SNI decoy so a sign-in survives one relay dying. It listens on :8443 — a
# SEPARATE port that does NOT touch SPB's live VPN :443 stream passthrough (that
# stays raw TCP → NL:443 Reality, untouched). Same self-signed cert as MSK so the
# iOS client's pin (AppConfig.decoyCertPin 497b4ff…) validates either relay; the
# client races both via AppConfig.decoyRelays [(MSK,443),(SPB,8443)].
#
# Real client IP is preserved ($remote_addr, since this terminates TLS directly —
# not behind the stream) and forwarded to the backend, which trusts SPB's XFF
# (set_real_ip_from 185.218.0.43). Verified from a RU vantage (MSK): 200 in ~0.15s.
#
# UPSTREAM (post-failover 2026-06-29): WAW:8000 (chameleon-failover primary). Was
# NL:80 until the 2026-06-29 NL→WAW failover; NL backend is now stopped (DB replica
# only), so the old upstream 502'd. WAW ufw must allow 185.218.0.43→8000.
#
# Requires: /etc/nginx/decoy/adfox.{crt,key} (copied from MSK) + `ufw allow 8443/tcp`.
# Verify:  curl -k --resolve ads.adfox.ru:8443:185.218.0.43 -H 'Host: api.madfrog.online' \
#            https://ads.adfox.ru:8443/api/v1/mobile/healthcheck   → 200
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name ads.adfox.ru;
    ssl_certificate     /etc/nginx/decoy/adfox.crt;
    ssl_certificate_key /etc/nginx/decoy/adfox.key;

    location ~ ^/api/(v1/)?mobile/support/stream {
        proxy_pass http://217.182.74.70:8000;
        proxy_set_header Host madfrog.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }
    location / {
        proxy_pass http://217.182.74.70:8000;
        proxy_set_header Host madfrog.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_connect_timeout 8s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }
}
