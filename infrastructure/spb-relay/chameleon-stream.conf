# Chameleon VPN — TCP Relay (SprintBox SPB)
# Updated 2026-05-27: DE (162.19.242.30) retired. All upstreams now NL.
# iOS clients with stale configs pointing at :443 / :2096 / :2098 on SPB
# all transparently hit NL:443 — single working VLESS Reality endpoint.
# Updated 2026-06-01: added :2099 → GRA (France) for the SPB→FR whitelist-
# bypass leg (vpn_servers key 'relay-fr' → tag ru-spb-fr). The client does the
# VLESS Reality handshake with GRA *through* this transparent TCP forward, so
# it uses GRA's reality_public_key — nginx only moves raw bytes.
stream {
    upstream chameleon_nl_tcp {
        server 147.45.252.234:443 max_fails=0;
    }

    upstream chameleon_fr_tcp {
        server 54.38.243.162:443 max_fails=0;
    }

    server {
        listen 2096;
        proxy_pass chameleon_nl_tcp;
        proxy_timeout 300s;
        proxy_connect_timeout 15s;
    }

    server {
        listen 2098;
        proxy_pass chameleon_nl_tcp;
        proxy_timeout 300s;
        proxy_connect_timeout 15s;
    }

    server {
        listen 443;
        proxy_pass chameleon_nl_tcp;
        proxy_timeout 300s;
        proxy_connect_timeout 15s;
    }

    server {
        listen 2099;
        proxy_pass chameleon_fr_tcp;
        proxy_timeout 300s;
        proxy_connect_timeout 15s;
    }
}
