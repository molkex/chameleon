# Chameleon VPN — TCP Relay (SprintBox SPB)
# Updated 2026-05-27: DE (162.19.242.30) retired. All upstreams now NL.
# iOS clients with stale configs pointing at :443 / :2096 / :2098 on SPB
# all transparently hit NL:443 — single working VLESS Reality endpoint.
# Updated 2026-07-11: removed :2099 → GRA (France) forward. France exit
# decommissioned (zero real usage in 14d telemetry) — vpn_servers row
# 'relay-fr' (tag ru-spb-fr) deactivated, GRA sing-box stopped. Port 2099
# freed; not reused by anything else as of this change.
stream {
    upstream chameleon_nl_tcp {
        server 147.45.252.234:443 max_fails=0;
    }

    server {
        listen 2096;
        proxy_pass chameleon_nl_tcp;
        proxy_timeout 300s;
        proxy_connect_timeout 15s;
    }

    server {
        listen 2098;
        proxy_pass chameleon_nl_tcp;
        proxy_timeout 300s;
        proxy_connect_timeout 15s;
    }

    server {
        listen 443;
        proxy_pass chameleon_nl_tcp;
        proxy_timeout 300s;
        proxy_connect_timeout 15s;
    }
}
